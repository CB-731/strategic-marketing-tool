        function normalizeAuthToken(token) {
            if (!token || typeof token !== 'object' || typeof token.access_token !== 'string' || !token.access_token.trim()) {
                return null;
            }

            return {
                access_token: token.access_token,
                token_type: typeof token.token_type === 'string' ? token.token_type : 'Bearer',
                scope: typeof token.scope === 'string' ? token.scope : GOOGLE_OAUTH_SCOPES,
                expires_in: Number(token.expires_in) || 0,
                issued_at: Number(token.issued_at) || Date.now()
            };
        }

        function loadAuthToken() {
            try {
                const rawValue = window.localStorage.getItem(AUTH_STORAGE_KEY);
                if (!rawValue) {
                    return null;
                }

                const normalizedToken = normalizeAuthToken(JSON.parse(rawValue));

                if (!normalizedToken) {
                    window.localStorage.removeItem(AUTH_STORAGE_KEY);
                }

                return normalizedToken;
            } catch (error) {
                console.warn('Unable to load auth token from localStorage.', error);
                window.localStorage.removeItem(AUTH_STORAGE_KEY);
                return null;
            }
        }

        function saveAuthToken(token) {
            const normalizedToken = normalizeAuthToken(token);

            if (!normalizedToken) {
                throw new Error('Cannot save an invalid auth token.');
            }

            window.localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(normalizedToken));
            return normalizedToken;
        }

        function clearAuthToken() {
            window.localStorage.removeItem(AUTH_STORAGE_KEY);
        }

        function isTokenExpired(token) {
            if (!token || !token.issued_at || !token.expires_in) {
                return true;
            }

            const expiresAt = token.issued_at + (token.expires_in * 1000);
            return Date.now() >= (expiresAt - TOKEN_EXPIRY_BUFFER_MS);
        }

        function isRememberedAuthExpired(token) {
            if (!token?.issued_at) {
                return true;
            }

            return Date.now() >= (token.issued_at + AUTH_REMEMBER_DURATION_MS);
        }

        function isAuthFailureStatus(status) {
            return status === 401 || status === 403;
        }

        async function fetchGoogleUserProfile(accessToken) {
            if (!accessToken) {
                return null;
            }

            const response = await fetch('https://openidconnect.googleapis.com/v1/userinfo', {
                headers: {
                    Authorization: `Bearer ${accessToken}`
                }
            });

            if (!response.ok) {
                return null;
            }

            const profile = await response.json();

            return {
                name: String(profile.name || profile.given_name || profile.email || '').trim(),
                email: String(profile.email || '').trim(),
                picture: String(profile.picture || '').trim()
            };
        }

        function getProfileInitials(profile) {
            const safeName = String(profile?.name || profile?.email || 'G').trim();

            if (!safeName) {
                return 'G';
            }

            const nameParts = safeName.split(/\s+/).filter(Boolean);

            if (nameParts.length >= 2) {
                return `${nameParts[0][0] || ''}${nameParts[1][0] || ''}`.toUpperCase();
            }

            return safeName.slice(0, 1).toUpperCase();
        }

        const INITIAL_STORED_AUTH_TOKEN = loadAuthToken();
        const INITIAL_AUTH_TOKEN = INITIAL_STORED_AUTH_TOKEN && !isRememberedAuthExpired(INITIAL_STORED_AUTH_TOKEN)
            ? INITIAL_STORED_AUTH_TOKEN

        const INITIAL_AUTH_NOTICE = INITIAL_STORED_AUTH_TOKEN && isRememberedAuthExpired(INITIAL_STORED_AUTH_TOKEN)

        function Stage2SetupModal({
            isOpen,
            isReconfigure,
            elements,

            confirmText,
            onChangeElement,
            onAddElement,
            onRemoveElement,
            onReorderElements,
            onChangeConfirmText,
            onCancel,
            onSubmit
        }) {
            const [draftElement, setDraftElement] = useState('');
            const [editingIndex, setEditingIndex] = useState(null);
            const [dragIndex, setDragIndex] = useState(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const canSubmit = !isSubmitting
                && elements.length > 0
                && elements.every((elementName) => String(elementName || '').trim())
                && (!isReconfigure || confirmText.trim().toLowerCase() === STAGE2_CONFIRM_TEXT);

            useEffect(() => {
                if (!isOpen) {
                    return;
                }

                setDraftElement('');
                setEditingIndex(null);
                setDragIndex(null);
                setDragOverIndex(null);
            }, [isOpen, isReconfigure]);

            const handleSubmitElementDraft = () => {
                const safeDraft = String(draftElement || '').trim();

                if (!safeDraft || isSubmitting) {
                    return;
                }

                let wasSaved = false;

                if (Number.isInteger(editingIndex)) {
                    wasSaved = Boolean(onChangeElement(editingIndex, safeDraft));
                } else {
                    wasSaved = Boolean(onAddElement(safeDraft));
                }

                if (wasSaved) {
                    setDraftElement('');
                    setEditingIndex(null);
                }
            };

            const handleStartEdit = (index) => {
                setDraftElement(String(elements[index] || ''));
                setEditingIndex(index);
            };

            const handleDragStart = (event, index) => {
                if (isSubmitting) {
                    event.preventDefault();
                    return;
                }

                setDragIndex(index);
                setDragOverIndex(index);
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', String(index));
            };

            const handleDragOver = (event, index) => {
                if (isSubmitting || dragIndex === null) {
                    return;
                }

                event.preventDefault();

                if (dragOverIndex !== index) {
                    setDragOverIndex(index);
                }
            };

            const handleDrop = (event, index) => {
                event.preventDefault();

                if (isSubmitting || dragIndex === null || dragIndex === index) {
                    setDragIndex(null);
                    setDragOverIndex(null);
                    return;
                }

                onReorderElements(dragIndex, index);
                setDragIndex(null);
                setDragOverIndex(null);
            };

            const handleDragEnd = () => {
                setDragIndex(null);
                setDragOverIndex(null);
            };

            if (!isOpen) {
                return null;
            }

                                        event.preventDefault();
                                        handleSubmitElementDraft();
                                    }

                                autoFocus
                            />
                            <button
                                className="stage2-push-button"
                                type="button"
                                onClick={handleSubmitElementDraft}
                                disabled={!String(draftElement || '').trim() || isSubmitting}
                                title={editingIndex === null ? 'Add element' : 'Save element'}
                                aria-label={editingIndex === null ? 'Add element' : 'Save element'}
                            >
                                ↵
                            </button>
                        </div>

                        <div className="modal-actions" style={{ justifyContent: 'space-between' }}>
                            <span className="project-meta">
                                {editingIndex === null ? 'Press Enter or arrow to add.' : `Editing element ${editingIndex + 1}. Press Enter or arrow to save.`}
                            </span>
                            <span className="project-meta">{elements.length}/{MAX_STAGE2_ELEMENTS}</span>
                        </div>

                        <div className="stage2-element-list">
                            {!elements.length && (
                                <div className="stage2-empty-state">No elements yet. Add your first funnel element above.</div>
                            )}

                            {elements.map((elementName, index) => (
                                <div
                                    key={`stage2-element-${index}-${elementName}`}
                                    className={`stage2-element-row${dragIndex === index ? ' dragging' : ''}${dragOverIndex === index && dragIndex !== index ? ' drag-over' : ''}`}
                                    draggable={!isSubmitting}
                                    onDragStart={(event) => handleDragStart(event, index)}
                                    onDragOver={(event) => handleDragOver(event, index)}
                                    onDrop={(event) => handleDrop(event, index)}
                                    onDragEnd={handleDragEnd}
                                >
                                    <span className="stage2-element-name">{elementName}</span>
                                    <div className="stage2-element-actions">
                                        <button
                                            className="stage2-icon-button"
                                            type="button"
                                            onClick={() => handleStartEdit(index)}
                                            disabled={isSubmitting}
                                            title={`Edit ${elementName}`}
                                            aria-label={`Edit ${elementName}`}
                                        >
                                            ✎
                                        </button>
                                        <button
                                            className="stage2-icon-button"
                                            type="button"
                                            onClick={() => onRemoveElement(index)}
                                            disabled={isSubmitting}
                                            title={`Delete ${elementName}`}
                                            aria-label={`Delete ${elementName}`}
                                        >
                                            🗑
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {isReconfigure && (
                            <>
                                <p>Type <strong>{STAGE2_CONFIRM_TEXT}</strong> to continue.</p>
                                <input
                                    className="project-name-input"
                                    value={confirmText}
                                    onChange={(event) => onChangeConfirmText(event.target.value)}
                                    placeholder="Type backup"
                                />
                            </>
                        )}

                        {error && <div className="error-box">{error}</div>}

                        <div className="modal-actions">
                            <button className="secondary-action" type="button" disabled={isSubmitting} onClick={onCancel}>Cancel</button>
                            <button className="primary-action" type="submit" disabled={!canSubmit}>
                                {isSubmitting ? 'Applying...' : 'Submit'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        function DraftAssetsSetupModal({
            isOpen,
            funnelItems,
            assetAssignments,
            isSubmitting,
            error,
            onChangeAsset,
            onAddAsset,
            onRemoveAsset,
            onCancel,
            onSubmit
        }) {
            const [draftAssetNames, setDraftAssetNames] = useState({});
            const [editingByFunnelItem, setEditingByFunnelItem] = useState({});
            const totalAssetCount = funnelItems.reduce((count, funnelItemName) => {
                return count + (assetAssignments[funnelItemName]?.length || 0);
            }, 0);
            const canSubmit = !isSubmitting
                && funnelItems.length > 0
                && funnelItems.every((funnelItemName) => {
                    const funnelAssets = assetAssignments[funnelItemName] || [];
                    return funnelAssets.length > 0 && funnelAssets.every((assetName) => String(assetName || '').trim());
                });

            useEffect(() => {
                if (!isOpen) {
                    return;
                }

                const nextDraftNames = {};
                const nextEditingState = {};

                funnelItems.forEach((funnelItemName) => {
                    nextDraftNames[funnelItemName] = '';
                    nextEditingState[funnelItemName] = null;
                });

                setDraftAssetNames(nextDraftNames);
                setEditingByFunnelItem(nextEditingState);
            }, [isOpen, funnelItems]);

            const handleSubmitAssetDraft = (funnelItemName) => {
                const safeDraftName = String(draftAssetNames[funnelItemName] || '').trim();
                const editingIndex = editingByFunnelItem[funnelItemName];

                if (!safeDraftName || isSubmitting) {
                    return;
                }

                let wasSaved = false;

                if (Number.isInteger(editingIndex)) {
                    wasSaved = Boolean(onChangeAsset(funnelItemName, editingIndex, safeDraftName));
                } else {
                    wasSaved = Boolean(onAddAsset(funnelItemName, safeDraftName));
                }

                if (wasSaved) {
                    setDraftAssetNames((previousState) => ({
                        ...previousState,
                        [funnelItemName]: ''
                    }));
                    setEditingByFunnelItem((previousState) => ({
                        ...previousState,
                        [funnelItemName]: null
                    }));
                }
            };

            const handleStartEdit = (funnelItemName, index) => {
                const nextValue = String(assetAssignments[funnelItemName]?.[index] || '');

                setDraftAssetNames((previousState) => ({
                    ...previousState,
                    [funnelItemName]: nextValue
                }));
                setEditingByFunnelItem((previousState) => ({
                    ...previousState,
                    [funnelItemName]: index
                }));
            };

            if (!isOpen) {
                return null;
            }

            return (
                <div className="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="draft-assets-setup-title">
                    <form
                        className="onboarding-modal"
                        onSubmit={(event) => {
                            event.preventDefault();

                            if (canSubmit) {
                                onSubmit();
                            }
                        }}
                    >
                        <h2 id="draft-assets-setup-title">Set draft assets for Task 9</h2>
                        <p>
                            Add draft assets inside each funnel group. On submit, template draft duplicates will be moved under each funnel item and renamed exactly to the draft asset names you entered.
                        </p>

                        <div className="delete-modal-warning">
                            Funnel items detected: {funnelItems.join(' • ')}
                        </div>

                        <div className="modal-actions" style={{ justifyContent: 'space-between' }}>
                            <span className="project-meta">Each funnel item needs at least one draft asset.</span>
                            <span className="project-meta">Total assets: {totalAssetCount}</span>
                        </div>

                        {funnelItems.map((funnelItemName, funnelItemIndex) => {
                            const funnelAssets = assetAssignments[funnelItemName] || [];
                            const editingIndex = editingByFunnelItem[funnelItemName];

                            return (
                                <div key={`draft-funnel-${funnelItemName}-${funnelItemIndex}`} className="stage2-element-list" style={{ marginBottom: '1rem' }}>
                                    <div className="delete-modal-warning" style={{ marginBottom: '0.75rem' }}>
                                        <strong>{funnelItemName}</strong>
                                    </div>

                                    <div className="stage2-element-builder">
                                        <input
                                            className="project-name-input"
                                            value={draftAssetNames[funnelItemName] || ''}
                                            onChange={(event) => setDraftAssetNames((previousState) => ({
                                                ...previousState,
                                                [funnelItemName]: event.target.value
                                            }))}
                                            onKeyDown={(event) => {
                                                if (event.key === 'Enter') {
                                                    event.preventDefault();
                                                    handleSubmitAssetDraft(funnelItemName);
                                                }
                                            }}
                                            placeholder={Number.isInteger(editingIndex)
                                                ? `Edit asset ${editingIndex + 1} for ${funnelItemName}`
                                                : `Add draft asset for ${funnelItemName}`}
                                            autoFocus={funnelItemIndex === 0}
                                        />
                                        <button
                                            className="stage2-push-button"
                                            type="button"
                                            onClick={() => handleSubmitAssetDraft(funnelItemName)}
                                            disabled={!String(draftAssetNames[funnelItemName] || '').trim() || isSubmitting}
                                            title={Number.isInteger(editingIndex) ? 'Save asset' : 'Add asset'}
                                            aria-label={Number.isInteger(editingIndex) ? 'Save asset' : 'Add asset'}
                                        >
                                            ↵
                                        </button>
                                    </div>

                                    <div className="modal-actions" style={{ justifyContent: 'space-between' }}>
                                        <span className="project-meta">
                                            {Number.isInteger(editingIndex)
                                                ? `Editing asset ${editingIndex + 1}. Press Enter or arrow to save.`
                                                : 'Press Enter or arrow to add.'}
                                        </span>
                                        <span className="project-meta">{funnelAssets.length}/{MAX_DRAFT_ASSETS}</span>
                                    </div>

                                    {!funnelAssets.length && (
                                        <div className="stage2-empty-state">No assets for {funnelItemName} yet.</div>
                                    )}

                                    {funnelAssets.map((assetName, assetIndex) => (
                                        <div key={`draft-asset-${funnelItemName}-${assetIndex}-${assetName}`} className="stage2-element-row">
                                            <span className="stage2-element-name">{assetName}</span>
                                            <div className="stage2-element-actions">
                                                <button
                                                    className="stage2-icon-button"
                                                    type="button"
                                                    onClick={() => handleStartEdit(funnelItemName, assetIndex)}
                                                    disabled={isSubmitting}
                                                    title={`Edit ${assetName}`}
                                                    aria-label={`Edit ${assetName}`}
                                                >
                                                    ✎
                                                </button>
                                                <button
                                                    className="stage2-icon-button"
                                                    type="button"
                                                    onClick={() => onRemoveAsset(funnelItemName, assetIndex)}
                                                    disabled={isSubmitting}
                                                    title={`Delete ${assetName}`}
                                                    aria-label={`Delete ${assetName}`}
                                                >
                                                    🗑
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}

                        {error && <div className="error-box">{error}</div>}

                        <div className="modal-actions">
                            <button className="secondary-action" type="button" disabled={isSubmitting} onClick={onCancel}>Cancel</button>
                            <button className="primary-action" type="submit" disabled={!canSubmit}>
                                {isSubmitting ? 'Applying...' : 'Submit'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        function GwsWizardModal({
            isOpen,
            step,
            draft,
            wizardTaskKey,
            onChangeDraft,
            onBack,
            onNext,
            onCancel,
            onStart
        }) {
            if (!isOpen) {
                return null;
            }

            const [ritualChecks, setRitualChecks] = useState(() => ({
                outcome: false,
                attitude: false,
                fuel: false,
                distractions: false,
                timer: false,
                start: false,
                review: false
            }));
            const [taskInput, setTaskInput] = useState('');
            const [taskEditingIndex, setTaskEditingIndex] = useState(null);
            const [taskDragIndex, setTaskDragIndex] = useState(null);
            const [taskDragOverIndex, setTaskDragOverIndex] = useState(null);
            const stepTitles = ['Objective', 'Tasks', 'Ritual', 'Confirm'];
            const ritualItems = [
                {
                    key: 'outcome',
                    label: 'Set a desired outcome and plan actions'
                },
                {
                    key: 'attitude',
                    label: 'Pick an attitude (in 5 seconds Imagine myself hyper-focused or whatever the attitude I want to bring to my GWS)'
                },
                {
                    key: 'fuel',
                    label: 'Hydrate, Caffeinate, Get the blood flowing'
                },
                {
                    key: 'distractions',
                    label: 'Remove distractions'
                },
                {
                    key: 'timer',
                    label: 'Set a timer for 60-90 mins'
                },
                {
                    key: 'start',
                    label: 'Get started'
                },
                {
                    key: 'review',
                    label: 'Evaluate afterwards (Review > Analyze > Make some quick tweaks)'
                }
            ];

            useEffect(() => {
                if (!isOpen) {
                    return;
                }

                setRitualChecks({
                    outcome: false,
                    attitude: false,
                    fuel: false,
                    distractions: false,
                    timer: false,
                    start: false,
                    review: false
                });
            }, [isOpen, wizardTaskKey]);

            useEffect(() => {
                if (!isOpen) {
                    return;
                }

                setTaskInput('');
                setTaskEditingIndex(null);
                setTaskDragIndex(null);
                setTaskDragOverIndex(null);
            }, [isOpen, wizardTaskKey]);

            const taskItems = Array.isArray(draft.plannedTasks) ? draft.plannedTasks : [];

            const updateTaskItems = (nextTaskItems) => {
                onChangeDraft({
                    plannedTasks: nextTaskItems.map((taskItem) => String(taskItem || '').trim()).filter(Boolean)
                });
            };

            const handleCommitTask = () => {
                const normalizedTaskInput = String(taskInput || '').trim();

                if (!normalizedTaskInput) {
                    return;
                }

                const nextTaskItems = [...taskItems];

                if (Number.isInteger(taskEditingIndex) && taskEditingIndex >= 0 && taskEditingIndex < nextTaskItems.length) {
                    nextTaskItems[taskEditingIndex] = normalizedTaskInput;
                } else {
                    nextTaskItems.push(normalizedTaskInput);
                }

                updateTaskItems(nextTaskItems);
                setTaskInput('');
                setTaskEditingIndex(null);
            };

            const handleStartTaskEdit = (index) => {
                setTaskInput(String(taskItems[index] || ''));
                setTaskEditingIndex(index);
            };

            const handleDeleteTask = (index) => {
                const nextTaskItems = taskItems.filter((_, taskIndex) => taskIndex !== index);

                updateTaskItems(nextTaskItems);

                if (taskEditingIndex === index) {
                    setTaskInput('');
                    setTaskEditingIndex(null);
                } else if (Number.isInteger(taskEditingIndex) && taskEditingIndex > index) {
                    setTaskEditingIndex(taskEditingIndex - 1);
                }
            };

            const handleTaskDragStart = (event, index) => {
                setTaskDragIndex(index);
                setTaskDragOverIndex(index);
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', String(index));
            };

            const handleTaskDragOver = (event, index) => {
                if (taskDragIndex === null) {
                    return;
                }

                event.preventDefault();

                if (taskDragOverIndex !== index) {
                    setTaskDragOverIndex(index);
                }
            };

            const handleTaskDrop = (event, index) => {
                event.preventDefault();

                if (taskDragIndex === null || taskDragIndex === index) {
                    setTaskDragIndex(null);
                    setTaskDragOverIndex(null);
                    return;
                }

                const nextTaskItems = [...taskItems];
                const [draggedTask] = nextTaskItems.splice(taskDragIndex, 1);
                nextTaskItems.splice(index, 0, draggedTask);
                updateTaskItems(nextTaskItems);
                setTaskDragIndex(null);
                setTaskDragOverIndex(null);
            };

            const handleTaskDragEnd = () => {
                setTaskDragIndex(null);
                setTaskDragOverIndex(null);
            };

            return (
                <div className="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="gws-wizard-title">
                    <form
                        className="onboarding-modal"
                        onSubmit={(event) => {
                            event.preventDefault();

                            if (step < 3) {
                                onNext();
                                return;
                            }

                            onStart();
                        }}
                    >
                        <h2 id="gws-wizard-title">GWS Wizard</h2>
                        <p>{stepTitles[step] || 'GWS'}</p>

                        {step === 0 && (
                            <>
                                <label className="project-meta">Objective</label>
                                <textarea
                                    className="project-name-input"
                                    rows="4"
                                    value={draft.objective}
                                    onChange={(event) => onChangeDraft({ objective: event.target.value })}
                                    placeholder="What do you want this session to produce?"
                                    autoFocus
                                />
                            </>
                        )}

                        {step === 1 && (
                            <>
                                <label className="project-meta">Tasks to complete</label>
                                <div className="gws-task-builder">
                                    <div className="gws-task-input-row">
                                        <input
                                            className="project-name-input"
                                            value={taskInput}
                                            onChange={(event) => setTaskInput(event.target.value)}
                                            onKeyDown={(event) => {
                                                if (event.key !== 'Enter') {
                                                    return;
                                                }

                                                event.preventDefault();
                                                handleCommitTask();
                                            }}
                                            placeholder="Add a task to complete"
                                            autoFocus
                                        />
                                        <button
                                            className="primary-action gws-task-add-button"
                                            type="button"
                                            onClick={handleCommitTask}
                                            disabled={!String(taskInput || '').trim()}
                                        >
                                            {Number.isInteger(taskEditingIndex) ? 'Save' : 'Add'}
                                        </button>
                                    </div>

                                    <p className="muted-note">Drag to reorder, edit what is already listed, or remove tasks you do not want in this session.</p>

                                    {taskItems.length === 0 && (
                                        <div className="gws-task-empty">No tasks yet. Add one above or leave it empty if you only want the ritual checklist.</div>
                                    )}

                                    {taskItems.length > 0 && (
                                        <div className="gws-task-list">
                                            {taskItems.map((taskItem, index) => {
                                                const isDragging = taskDragIndex === index;
                                                const isDragOver = taskDragOverIndex === index && taskDragIndex !== index;

                                                return (
                                                    <div
                                                        className={`gws-task-row${isDragging ? ' dragging' : ''}${isDragOver ? ' drag-over' : ''}`}
                                                        key={`${taskItem}-${index}`}
                                                        draggable
                                                        onDragStart={(event) => handleTaskDragStart(event, index)}
                                                        onDragOver={(event) => handleTaskDragOver(event, index)}
                                                        onDrop={(event) => handleTaskDrop(event, index)}
                                                        onDragEnd={handleTaskDragEnd}
                                                    >
                                                        <span className="gws-task-handle" aria-hidden="true">⋮⋮</span>
                                                        <span className="gws-task-text">{taskItem}</span>
                                                        <div className="gws-task-actions">
                                                            <button
                                                                className="gws-task-icon-button"
                                                                type="button"
                                                                onClick={() => handleStartTaskEdit(index)}
                                                                title={`Edit ${taskItem}`}
                                                                aria-label={`Edit ${taskItem}`}
                                                            >
                                                                ✎
                                                            </button>
                                                            <button
                                                                className="gws-task-icon-button is-danger"
                                                                type="button"
                                                                onClick={() => handleDeleteTask(index)}
                                                                title={`Delete ${taskItem}`}
                                                                aria-label={`Delete ${taskItem}`}
                                                            >
                                                                🗑
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {step === 2 && (
                            <>
                                <label className="project-meta">Ritual</label>
                                <div className="gws-checklist" style={{ marginTop: '8px' }}>
                                    {ritualItems.map((item) => {
                                        const isChecked = Boolean(ritualChecks[item.key]);

                                        return (
                                            <label className={`gws-checklist-item${isChecked ? ' is-active' : ''}`} key={item.key}>
                                                <input
                                                    type="checkbox"
                                                    checked={isChecked}
                                                    onChange={(event) => {
                                                        const nextChecked = event.target.checked;

                                                        setRitualChecks((previousState) => ({
                                                            ...previousState,
                                                            [item.key]: nextChecked
                                                        }));

                                                        if (item.key === 'attitude') {
                                                            onChangeDraft({ attitude: nextChecked ? 'Hyper-focused' : '' });
                                                        }

                                                        if (item.key === 'fuel') {
                                                            onChangeDraft({
                                                                hydrated: nextChecked,
                                                                caffeinated: nextChecked
                                                            });
                                                        }

                                                        if (item.key === 'distractions') {
                                                            onChangeDraft({ distractionsCleared: nextChecked });
                                                        }

                                                        if (item.key === 'timer') {
                                                            onChangeDraft({ timerMinutes: nextChecked ? 90 : 60 });
                                                        }
                                                    }}
                                                />
                                                <span className="custom-checkbox" aria-hidden="true">{isChecked ? '✓' : ''}</span>
                                                <span>{item.label}</span>
                                            </label>
                                        );
                                    })}
                                </div>
                            </>
                        )}

                        {step === 3 && (
                            <>
                                <div className="delete-modal-warning">
                                    Objective: {draft.objective || 'Not set'}
                                    <br />
                                    Tasks: {draft.plannedTasks.length ? draft.plannedTasks.join(' • ') : 'Not set'}
                                    <br />
                                    Ritual: {ritualItems.filter((item) => ritualChecks[item.key]).map((item) => item.label).join(' • ') || 'Not set'}
                                    <br />
                                    Duration: {draft.timerMinutes} minutes
                                </div>
                                <p>Start sound will play when the session begins.</p>
                            </>
                        )}

                        <div className="modal-actions">
                            <button className="secondary-action" type="button" onClick={onCancel}>Cancel</button>
                            {step > 0 && (
                                <button className="secondary-action" type="button" onClick={onBack}>Back</button>
                            )}
                            {step < 3 && (
                                <button className="primary-action" type="button" onClick={onNext}>Next</button>
                            )}
                            {step === 3 && (
                                <button className="primary-action" type="submit">Start Session</button>
                            )}
                        </div>
                    </form>
                </div>
            );
        }

        function GwsHistoryModal({ isOpen, sessions, activeSession, onClose }) {
            if (!isOpen) {
                return null;
            }

            const [statusFilter, setStatusFilter] = useState('all');
            const [taskFilter, setTaskFilter] = useState('all');
            const [expandedSessionIds, setExpandedSessionIds] = useState(() => new Set());

            useEffect(() => {
                if (!isOpen) {
                    return;
                }

                setStatusFilter('all');
                setTaskFilter('all');
                setExpandedSessionIds(new Set());
            }, [isOpen]);

            const baseSessions = [activeSession, ...(Array.isArray(sessions) ? sessions : [])]
                .map(normalizeGwsSession)
                .filter(Boolean);

            const sortedSessions = [...baseSessions]
                .sort((leftSession, rightSession) => (
                    (rightSession.endAt || rightSession.startAt || 0) - (leftSession.endAt || leftSession.startAt || 0)
                ));

            const taskOptions = Array.from(new Map(sortedSessions.map((session) => [String(session.taskId || ''), {
                value: String(session.taskId || ''),
                label: session.taskTitle || `Task ${session.taskId}`
            }])).values());

            const visibleSessions = sortedSessions.filter((session) => {
                const matchesStatus = statusFilter === 'all' || session.status === statusFilter;
                const matchesTask = taskFilter === 'all' || String(session.taskId || '') === taskFilter;

                return matchesStatus && matchesTask;
            });

            const exportCsv = () => {
                const escapeCsv = (value) => `"${String(value ?? '').replaceAll('"', '""')}"`;
                const rows = [
                    ['sessionId', 'status', 'taskId', 'taskTitle', 'objective', 'plannedMinutes', 'actualSeconds', 'remainingSeconds', 'startAt', 'endAt', 'notes', 'analyze', 'quickTweaks'],
                    ...visibleSessions.map((session) => ([
                        session.sessionId,
                        session.status,
                        session.taskId,
                        session.taskTitle,
                        session.objective,
                        Number(session.plannedMinutes) === 90 ? 90 : 60,
                        Math.max(0, Number(session.actualSeconds) || 0),
                        Math.max(0, Number(session.remainingSeconds) || 0),
                        Number(session.startAt) || 0,
                        Number(session.endAt) || 0,
                        session.notes,
                        session.analyze,
                        session.quickTweaks
                    ]))
                ];

                const csvContent = rows.map((row) => row.map(escapeCsv).join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const downloadUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');

                link.href = downloadUrl;
                link.download = `gws-history-${Date.now()}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(downloadUrl);
            };

            const toggleSessionDetails = (sessionId) => {
                setExpandedSessionIds((previousExpanded) => {
                    const nextExpanded = new Set(previousExpanded);

                    if (nextExpanded.has(sessionId)) {
                        nextExpanded.delete(sessionId);
                    } else {
                        nextExpanded.add(sessionId);
                    }

                    return nextExpanded;
                });
            };

            const completedCount = visibleSessions.filter((session) => session.status === 'completed').length;
            const totalPlannedSeconds = visibleSessions.reduce((accumulator, session) => (
                accumulator + ((Number(session.plannedMinutes) === 90 ? 90 : 60) * 60)
            ), 0);
            const totalActualSeconds = visibleSessions.reduce((accumulator, session) => (
                accumulator + Math.max(0, Number(session.actualSeconds) || 0)
            ), 0);
            const avgFocusMinutes = visibleSessions.length
                ? Math.round((totalActualSeconds / visibleSessions.length) / 60)
                : 0;
            const adherencePercent = totalPlannedSeconds > 0
                ? Math.min(100, Math.round((totalActualSeconds / totalPlannedSeconds) * 100))
                : 0;

            return (
                <div className="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="gws-history-title">
                    <div className="onboarding-modal gws-history-modal">
                        <h2 id="gws-history-title">GWS History</h2>
                        <p>Track your recent sessions and compare planned versus actual focus time.</p>

                        <div className="gws-history-toolbar">
                            <div className="gws-history-toolbar-row">
                                <div className="gws-history-filter-group" aria-label="History status filters">
                                    {['all', 'running', 'completed', 'paused', 'stopped', 'abandoned'].map((statusKey) => (
                                        <button
                                            key={statusKey}
                                            className={`gws-history-filter-chip${statusFilter === statusKey ? ' is-active' : ''}`}
                                            type="button"
                                            onClick={() => setStatusFilter(statusKey)}
                                        >
                                            {statusKey === 'all' ? 'All' : statusKey}
                                        </button>
                                    ))}
                                </div>

                                <button className="gws-action-button" type="button" onClick={exportCsv} disabled={visibleSessions.length === 0}>
                                    Export CSV
                                </button>
                            </div>

                            <div className="gws-history-toolbar-row">
                                <div style={{ display: 'grid', gap: '6px', width: '100%' }}>
                                    <p className="gws-history-filter-label">Task filter</p>
                                    <select
                                        className="gws-history-select"
                                        value={taskFilter}
                                        onChange={(event) => setTaskFilter(event.target.value)}
                                    >
                                        <option value="all">All tasks</option>
                                        {taskOptions.map((taskOption) => (
                                            <option key={taskOption.value} value={taskOption.value}>
                                                {taskOption.label}
                                            </option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div className="gws-history-stats">
                            <div className="gws-history-stat">
                                <p className="gws-history-stat-label">Total Sessions</p>
                                <p className="gws-history-stat-value">{visibleSessions.length}</p>
                            </div>
                            <div className="gws-history-stat">
                                <p className="gws-history-stat-label">Completed</p>
                                <p className="gws-history-stat-value">{completedCount}</p>
                            </div>
                            <div className="gws-history-stat">
                                <p className="gws-history-stat-label">Avg Focus</p>
                                <p className="gws-history-stat-value">{avgFocusMinutes}m</p>
                            </div>
                            <div className="gws-history-stat">
                                <p className="gws-history-stat-label">Adherence</p>
                                <p className="gws-history-stat-value">{adherencePercent}%</p>
                            </div>
                        </div>

                        {visibleSessions.length === 0 ? (
                            <div className="gws-history-empty">No sessions yet. Start and finish a GWS to populate history.</div>
                        ) : (
                            <div className="gws-history-list">
                                {visibleSessions.slice(0, 30).map((session) => {
                                    const plannedMinutes = Number(session.plannedMinutes) === 90 ? 90 : 60;
                                    const actualMinutes = Math.round((Math.max(0, Number(session.actualSeconds) || 0)) / 60);
                                    const plannedSeconds = plannedMinutes * 60;
                                    const actualSeconds = Math.max(0, Number(session.actualSeconds) || 0);
                                    const timeDeltaSeconds = plannedSeconds - actualSeconds;
                                    const sessionDate = new Date(Number(session.endAt) || Number(session.startAt) || Date.now());
                                    const statusClass = session.status === 'completed'
                                        ? 'is-completed'
                                        : (session.status === 'stopped' ? 'is-stopped' : '');
                                    const isExpanded = expandedSessionIds.has(session.sessionId);
                                    const ritualLines = [
                                        session.ritual?.attitude ? `Attitude: ${session.ritual.attitude}` : null,
                                        session.ritual?.hydrated ? 'Hydrated' : null,
                                        session.ritual?.caffeinated ? 'Caffeinated' : null,
                                        session.ritual?.distractionsCleared ? 'No distractions' : null,
                                        Number(session.ritual?.timerMinutes) === 90 ? 'Timer: 90 min' : 'Timer: 60 min'
                                    ].filter(Boolean);
                                    const taskLines = Array.isArray(session.plannedTasks) && session.plannedTasks.length
                                        ? session.plannedTasks
                                        : [];

                                    return (
                                        <article className="gws-history-item" key={session.sessionId}>
                                            <button
                                                className="gws-history-item-button"
                                                type="button"
                                                onClick={() => toggleSessionDetails(session.sessionId)}
                                                aria-expanded={isExpanded}
                                            >
                                                <div className="gws-history-item-head">
                                                    <p className="gws-history-item-title">{session.taskTitle || `Task ${session.taskId}`}</p>
                                                    <span className={`gws-status-badge ${statusClass}`}>{session.status}</span>
                                                </div>
                                                <p className="gws-history-item-meta">
                                                    {sessionDate.toLocaleString()} • Planned {plannedMinutes}m • Actual {actualMinutes}m
                                                </p>
                                                <span className="gws-history-item-toggle">
                                                    {isExpanded ? 'Hide details' : 'Show details'}
                                                </span>
                                            </button>

                                            {isExpanded && (
                                                <div className="gws-history-item-details">
                                                    <div className="gws-history-detail-grid">
                                                        <div className="gws-history-detail-card">
                                                            <h4>Objective</h4>
                                                            <p>{session.objective || 'Not set'}</p>
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Ritual</h4>
                                                            {ritualLines.length ? (
                                                                <ul>
                                                                    {ritualLines.map((ritualLine) => <li key={ritualLine}>{ritualLine}</li>)}
                                                                </ul>
                                                            ) : (
                                                                <p className="gws-history-detail-empty">No ritual saved.</p>
                                                            )}
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Tasks</h4>
                                                            {taskLines.length ? (
                                                                <ul>
                                                                    {taskLines.map((taskLine) => <li key={taskLine}>{taskLine}</li>)}
                                                                </ul>
                                                            ) : (
                                                                <p className="gws-history-detail-empty">No planned tasks saved.</p>
                                                            )}
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Review Notes</h4>
                                                            <p>{session.notes || 'No review notes saved.'}</p>
                                                        </div>
                                                    </div>

                                                    <div className="gws-history-detail-metrics">
                                                        <div className="gws-history-metric">
                                                            <p className="gws-history-metric-label">Planned vs Actual</p>
                                                            <p className="gws-history-metric-value">
                                                                {plannedMinutes}m / {actualMinutes}m
                                                            </p>
                                                        </div>
                                                        <div className="gws-history-metric">
                                                            <p className="gws-history-metric-label">Time Delta</p>
                                                            <p className="gws-history-metric-value">
                                                                {timeDeltaSeconds >= 0 ? '-' : '+'}{Math.abs(Math.round(timeDeltaSeconds / 60))}m
                                                            </p>
                                                        </div>
                                                        <div className="gws-history-metric">
                                                            <p className="gws-history-metric-label">Progress</p>
                                                            <p className="gws-history-metric-value">
                                                                {Array.isArray(session.completedChecklistItems) && session.completedChecklistItems.length
                                                                    ? `${session.completedChecklistItems.length} checklist items`
                                                                    : 'No checklist snapshot'}
                                                            </p>
                                                        </div>
                                                    </div>

                                                    <div className="gws-history-detail-grid">
                                                        <div className="gws-history-detail-card">
                                                            <h4>Analyze</h4>
                                                            <p>{session.analyze || 'No analysis saved.'}</p>
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Quick Tweaks</h4>
                                                            <p>{session.quickTweaks || 'No quick tweaks saved.'}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </article>
                                    );
                                })}
                            </div>
                        )}

                        <div className="modal-actions">
                            <button className="secondary-action" type="button" onClick={() => {
                                setStatusFilter('all');
                                setTaskFilter('all');
                            }}>
                                Reset Filters
                            </button>
                            <button className="primary-action" type="button" onClick={onClose}>Close</button>
                        </div>
                    </div>
                </div>
            );
        }

        function GwsDashboardPanel({
            currentProject,
            sessions,
            activeSession,
            currentTaskDefinition,
            isGwsRunning,
            isGwsPaused,
            gwsRemainingSeconds,
            onStartSession,
            onPauseSession,
            onResumeSession,
            onEndSession,
            onDeleteSession
        }) {
            const [statusFilter, setStatusFilter] = useState('all');
            const [taskFilter, setTaskFilter] = useState('all');
            const [rangeFilter, setRangeFilter] = useState('30d');
            const [dashboardView, setDashboardView] = useState('overview');
            const [expandedSessionIds, setExpandedSessionIds] = useState(() => new Set());
            const [pendingDeleteSessionId, setPendingDeleteSessionId] = useState('');

            useEffect(() => {
                setStatusFilter('all');
                setTaskFilter('all');
                setRangeFilter('30d');
                setDashboardView('overview');
                setExpandedSessionIds(new Set());
                setPendingDeleteSessionId('');
            }, [currentProject?.id]);

            const baseSessions = [activeSession, ...(Array.isArray(sessions) ? sessions : [])]
                .map(normalizeGwsSession)
                .filter(Boolean);

            const sortedSessions = [...baseSessions]
                .sort((leftSession, rightSession) => (
                    (rightSession.endAt || rightSession.startAt || 0) - (leftSession.endAt || leftSession.startAt || 0)
                ));

            const rangeDays = rangeFilter === '7d'
                ? 7
                : (rangeFilter === '30d'
                    ? 30
                    : (rangeFilter === '90d' ? 90 : 0));
            const now = Date.now();
            const rangeStartTimestamp = rangeDays > 0
                ? now - ((rangeDays - 1) * 24 * 60 * 60 * 1000)
                : 0;
            const rangeSessions = rangeDays > 0
                ? sortedSessions.filter((session) => {
                    const timestamp = Number(session.endAt) || Number(session.startAt) || 0;
                    return timestamp >= rangeStartTimestamp;
                })
                : sortedSessions;

            const taskOptions = Array.from(new Map(rangeSessions.map((session) => [String(session.taskId || ''), {
                value: String(session.taskId || ''),
                label: session.taskTitle || `Task ${session.taskId}`
            }])).values());

            const visibleSessions = rangeSessions.filter((session) => {
                const matchesStatus = statusFilter === 'all' || session.status === statusFilter;
                const matchesTask = taskFilter === 'all' || String(session.taskId || '') === taskFilter;
                return matchesStatus && matchesTask;
            });

            const completedCount = visibleSessions.filter((session) => session.status === 'completed').length;
            const totalPlannedSeconds = visibleSessions.reduce((accumulator, session) => accumulator + ((Number(session.plannedMinutes) === 90 ? 90 : 60) * 60), 0);
            const totalActualSeconds = visibleSessions.reduce((accumulator, session) => accumulator + Math.max(0, Number(session.actualSeconds) || 0), 0);
            const avgFocusMinutes = visibleSessions.length
                ? Math.round((totalActualSeconds / visibleSessions.length) / 60)
                : 0;
            const adherencePercent = totalPlannedSeconds > 0
                ? Math.min(100, Math.round((totalActualSeconds / totalPlannedSeconds) * 100))
                : 0;
            const totalTimeMinutes = Math.round(totalActualSeconds / 60);
            const totalPauseCount = visibleSessions.reduce((accumulator, session) => accumulator + Math.max(0, Number(session.pauseCount) || 0), 0);
            const taskBreakdown = Array.from(visibleSessions.reduce((accumulator, session) => {
                const key = String(session.taskTitle || `Task ${session.taskId}`).trim();
                const currentEntry = accumulator.get(key) || { count: 0, seconds: 0 };
                accumulator.set(key, {
                    count: currentEntry.count + 1,
                    seconds: currentEntry.seconds + Math.max(0, Number(session.actualSeconds) || 0)
                });
                return accumulator;
            }, new Map()).entries())
                .map(([taskTitle, stats]) => ({ taskTitle, ...stats }))
                .sort((leftEntry, rightEntry) => rightEntry.seconds - leftEntry.seconds)
                .slice(0, 4);
            const sessionsByDay = visibleSessions.reduce((accumulator, session) => {
                const timestamp = Number(session.endAt) || Number(session.startAt) || 0;
                const dateKey = timestamp ? new Date(timestamp).toISOString().slice(0, 10) : '';

                if (!dateKey) {
                    return accumulator;
                }

                accumulator[dateKey] = (accumulator[dateKey] || 0) + 1;
                return accumulator;
            }, {});
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const last7DaysCount = Array.from({ length: 7 }).reduce((accumulator, _, dayOffset) => {
                const date = new Date(today);
                date.setDate(today.getDate() - dayOffset);
                const key = date.toISOString().slice(0, 10);
                return accumulator + (sessionsByDay[key] || 0);
            }, 0);
            const previous7DaysCount = Array.from({ length: 7 }).reduce((accumulator, _, dayOffset) => {
                const date = new Date(today);
                date.setDate(today.getDate() - (dayOffset + 7));
                const key = date.toISOString().slice(0, 10);
                return accumulator + (sessionsByDay[key] || 0);
            }, 0);
            const cadenceDelta = last7DaysCount - previous7DaysCount;
            const cadenceTrendLabel = cadenceDelta > 0
                ? `Up by ${cadenceDelta} sessions vs previous 7 days`
                : (cadenceDelta < 0
                    ? `Down by ${Math.abs(cadenceDelta)} sessions vs previous 7 days`
                    : 'Flat vs previous 7 days');

            const taskWorkloadRows = Array.from(visibleSessions.reduce((accumulator, session) => {
                const key = String(session.taskTitle || `Task ${session.taskId}`).trim();
                const currentEntry = accumulator.get(key) || { count: 0, plannedSeconds: 0, actualSeconds: 0 };
                accumulator.set(key, {
                    count: currentEntry.count + 1,
                    plannedSeconds: currentEntry.plannedSeconds + ((Number(session.plannedMinutes) === 90 ? 90 : 60) * 60),
                    actualSeconds: currentEntry.actualSeconds + Math.max(0, Number(session.actualSeconds) || 0)
                });
                return accumulator;
            }, new Map()).entries())
                .map(([taskTitle, stats]) => ({ taskTitle, ...stats }))
                .sort((leftRow, rightRow) => rightRow.actualSeconds - leftRow.actualSeconds)
                .slice(0, 6);

            const maxTaskSeconds = Math.max(
                1,
                ...taskWorkloadRows.map((row) => Math.max(row.plannedSeconds, row.actualSeconds))
            );

            const weekdayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const weekdayCounts = weekdayLabels.map((label, dayIndex) => {
                const count = visibleSessions.reduce((accumulator, session) => {
                    const timestamp = Number(session.endAt) || Number(session.startAt) || 0;

                    if (!timestamp) {
                        return accumulator;
                    }

                    return accumulator + (new Date(timestamp).getDay() === dayIndex ? 1 : 0);
                }, 0);

                return { label, count };
            });
            const maxWeekdayCount = Math.max(1, ...weekdayCounts.map((entry) => entry.count));

            const overrunCount = visibleSessions.filter((session) => {
                const plannedSeconds = (Number(session.plannedMinutes) === 90 ? 90 : 60) * 60;
                return Math.max(0, Number(session.actualSeconds) || 0) > plannedSeconds;
            }).length;
            const interruptionHeavyCount = visibleSessions.filter((session) => Math.max(0, Number(session.pauseCount) || 0) >= 2).length;
            const lowOutputCount = visibleSessions.filter((session) => {
                const plannedSeconds = (Number(session.plannedMinutes) === 90 ? 90 : 60) * 60;
                return Math.max(0, Number(session.actualSeconds) || 0) < (plannedSeconds * 0.55);
            }).length;
            const cadenceRiskLabel = overrunCount >= 3
                ? 'Cadence risk: frequent overruns'
                : (interruptionHeavyCount >= 3
                    ? 'Cadence risk: high interruption density'
                    : (lowOutputCount >= 3 ? 'Cadence risk: under-delivery pattern' : 'Cadence stable this range'));

            const exportCsv = () => {
                const csvRows = [
                    ['sessionId', 'status', 'taskId', 'taskTitle', 'startAt', 'endAt', 'plannedMinutes', 'actualSeconds', 'pauseCount', 'plannedTasks', 'achievedTasks', 'objective']
                ];

                visibleSessions.forEach((session) => {
                    csvRows.push([
                        session.sessionId,
                        session.status,
                        session.taskId,
                        session.taskTitle || '',
                        session.startAt || '',
                        session.endAt || '',
                        session.plannedMinutes || '',
                        session.actualSeconds || '',
                        session.pauseCount || 0,
                        Array.isArray(session.plannedTasks) ? session.plannedTasks.join(' | ') : '',
                        Array.isArray(session.achievedTasks) ? session.achievedTasks.join(' | ') : '',
                        session.objective || ''
                    ]);
                });

                const csvContent = csvRows.map((row) => row.map((value) => `"${String(value).replaceAll('"', '""')}"`).join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const downloadUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');

                link.href = downloadUrl;
                link.download = `gws-history-${Date.now()}.csv`;
                link.click();
                URL.revokeObjectURL(downloadUrl);
            };

            const toggleSessionDetails = (sessionId) => {
                setExpandedSessionIds((previousExpanded) => {
                    const nextExpanded = new Set(previousExpanded);

                    if (nextExpanded.has(sessionId)) {
                        nextExpanded.delete(sessionId);
                    } else {
                        nextExpanded.add(sessionId);
                    }

                    return nextExpanded;
                });
            };

            const handleConfirmDeleteSession = (sessionId) => {
                const safeSessionId = String(sessionId || '').trim();

                if (!safeSessionId || typeof onDeleteSession !== 'function') {
                    setPendingDeleteSessionId('');
                    return;
                }

                onDeleteSession(safeSessionId);
                setPendingDeleteSessionId('');
                setExpandedSessionIds((previousExpanded) => {
                    if (!previousExpanded.has(safeSessionId)) {
                        return previousExpanded;
                    }

                    const nextExpanded = new Set(previousExpanded);
                    nextExpanded.delete(safeSessionId);
                    return nextExpanded;
                });
            };

            return (
                <section className="gws-dashboard-panel" aria-label="GWS dashboard">
                    <header className="gws-dashboard-header">
                        <h2>GWS Dashboard</h2>
                        <p>Review your active session, recent history, and focus patterns without leaving the main workspace.</p>
                        <div className="gws-dashboard-view-controls" aria-label="Dashboard view selector">
                            {[
                                { key: 'overview', label: 'Overview' },
                                { key: 'workload', label: 'Workload' },
                                { key: 'cadence', label: 'Cadence' }
                            ].map((viewOption) => (
                                <button
                                    key={viewOption.key}
                                    className={`gws-action-button is-secondary gws-dashboard-view-chip${dashboardView === viewOption.key ? ' is-active' : ''}`}
                                    type="button"
                                    onClick={() => setDashboardView(viewOption.key)}
                                >
                                    {viewOption.label}
                                </button>
                            ))}
                        </div>
                        <div className="gws-dashboard-view-controls" aria-label="Dashboard date range selector">
                            {[
                                { key: '7d', label: '7d' },
                                { key: '30d', label: '30d' },
                                { key: '90d', label: '90d' },
                                { key: 'all', label: 'All' }
                            ].map((rangeOption) => (
                                <button
                                    key={rangeOption.key}
                                    className={`gws-action-button is-secondary gws-dashboard-view-chip${rangeFilter === rangeOption.key ? ' is-active' : ''}`}
                                    type="button"
                                    onClick={() => setRangeFilter(rangeOption.key)}
                                >
                                    {rangeOption.label}
                                </button>
                            ))}
                        </div>
                        <div className="gws-dashboard-header-actions">
                            {isGwsRunning && (
                                <button className="gws-action-button is-secondary" type="button" onClick={() => onPauseSession?.()}>
                                    Pause Session
                                </button>
                            )}
                            {isGwsPaused && (
                                <button className="gws-action-button is-secondary" type="button" onClick={() => onResumeSession?.()}>
                                    Resume Session
                                </button>
                            )}
                            {(isGwsRunning || isGwsPaused) && (
                                <button className="gws-action-button is-secondary" type="button" onClick={() => onEndSession?.()}>
                                    End Session
                                </button>
                            )}
                        </div>
                        {(isGwsRunning || isGwsPaused) && (
                            <p className="gws-dashboard-header-timer">
                                Live timer: {formatCountdownTime(gwsRemainingSeconds)}
                            </p>
                        )}
                        <div className="gws-dashboard-topline">
                            <div className="gws-history-stat">
                                <p className="gws-history-stat-label">Sessions</p>
                                <p className="gws-history-stat-value">{visibleSessions.length}</p>
                            </div>
                            <div className="gws-history-stat">
                                <p className="gws-history-stat-label">Completed</p>
                                <p className="gws-history-stat-value">{completedCount}</p>
                            </div>
                            <div className="gws-history-stat">
                                <p className="gws-history-stat-label">Avg Focus</p>
                                <p className="gws-history-stat-value">{avgFocusMinutes}m</p>
                            </div>
                        </div>
                        <div className="gws-dashboard-summary-grid">
                            <div className="gws-dashboard-summary-card">
                                <h4>Summary Metrics</h4>
                                <p>Total time: {totalTimeMinutes}m</p>
                                <p>Session count: {visibleSessions.length}</p>
                                <p>Pause count: {totalPauseCount}</p>
                                <p>Adherence: {adherencePercent}%</p>
                            </div>
                            <div className="gws-dashboard-summary-card">
                                <h4>Project Breakdown</h4>
                                {taskBreakdown.length ? (
                                    <ul className="gws-dashboard-breakdown-list">
                                        {taskBreakdown.map((entry) => (
                                            <li key={entry.taskTitle}>{entry.taskTitle} - {Math.round(entry.seconds / 60)}m across {entry.count} sessions</li>
                                        ))}
                                    </ul>
                                ) : (
                                    <p>No session data yet.</p>
                                )}
                            </div>
                            <div className="gws-dashboard-summary-card">
                                <h4>Cadence Trend</h4>
                                <p>Last 7 days: {last7DaysCount} sessions</p>
                                <p>Previous 7 days: {previous7DaysCount} sessions</p>
                                <p>{cadenceTrendLabel}</p>
                            </div>
                        </div>
                    </header>

                    <section className="gws-dashboard-visuals" aria-label="GWS visual analytics">
                        {dashboardView === 'overview' && (
                            <div className="gws-dashboard-visual-grid">
                                <article className="gws-dashboard-visual-card">
                                    <h4>Cadence Insight</h4>
                                    <p>{cadenceRiskLabel}</p>
                                    <ul className="gws-dashboard-insights-list">
                                        <li>Overrun sessions: {overrunCount}</li>
                                        <li>High interruption sessions: {interruptionHeavyCount}</li>
                                        <li>Low-output sessions: {lowOutputCount}</li>
                                    </ul>
                                </article>

                                <article className="gws-dashboard-visual-card">
                                    <h4>Range Snapshot</h4>
