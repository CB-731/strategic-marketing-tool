        function DiagramLightbox({ taskDefinition, zoomIndex, onClose, onCycleZoom }) {
            const [hasLightboxImageError, setHasLightboxImageError] = useState(false);
            const zoomLevel = DIAGRAM_ZOOM_LEVELS[zoomIndex] || 1;

            useEffect(() => {
                setHasLightboxImageError(false);
            }, [taskDefinition?.taskId]);

            if (!taskDefinition) {
                return null;
            }

            return (
                <div className="diagram-lightbox-backdrop" role="dialog" aria-modal="true" aria-label="Diagram viewer" onClick={onClose}>
                    <button
                        className="diagram-lightbox-close"
                        type="button"
                        aria-label="Close diagram"
                        onClick={onClose}
                    >
                        ×
                    </button>

                    <div className="diagram-lightbox-content" onClick={(event) => event.stopPropagation()}>
                        <div className="diagram-lightbox-toolbar">
                            <button type="button" onClick={() => onCycleZoom(-1)}>− Zoom</button>
                            <span>{Math.round(zoomLevel * 100)}%</span>
                            <button type="button" onClick={() => onCycleZoom(1)}>+ Zoom</button>
                        </div>

                        <div className="diagram-lightbox-scroll">
                            {!hasLightboxImageError ? (
                                <img
                                    className="diagram-lightbox-image"
                                    src={taskDefinition.diagram.src}
                                    alt={taskDefinition.diagram.caption}
                                    style={{ transform: `scale(${zoomLevel})` }}
                                    onError={() => setHasLightboxImageError(true)}
                                />
                            ) : (
                                <div className="diagram-lightbox-fallback">
                                    Diagram preview unavailable. {taskDefinition.diagram.caption}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const firstTask = getTaskDefinition(1);
            const [appState, setAppState] = useState(() => loadState());
            const [authToken, setAuthToken] = useState(() => INITIAL_AUTH_TOKEN);
            const [authReady, setAuthReady] = useState(false);
            const [authLoading, setAuthLoading] = useState(false);
            const [authTokenClient, setAuthTokenClient] = useState(null);
            const [authNotice, setAuthNotice] = useState(() => INITIAL_AUTH_NOTICE || (isPlaceholderClientId() ? 'Google OAuth is implemented, but the client ID is still a placeholder.' : ''));
            const authRequestRef = useRef(null);
            const [isOnboardingOpen, setIsOnboardingOpen] = useState(false);
            const [creationState, setCreationState] = useState({
                isCreating: false,
                createdCount: 0,
                message: '',
                error: ''
            });
            const [expandedProjectIds, setExpandedProjectIds] = useState(() => appState.currentProjectId ? [appState.currentProjectId] : []);
            const [lockedTaskMessage, setLockedTaskMessage] = useState('');
            const [diagramLightboxTask, setDiagramLightboxTask] = useState(null);
            const [diagramZoomIndex, setDiagramZoomIndex] = useState(0);
            const [deleteProjectState, setDeleteProjectState] = useState({
                projectId: null,
                isDeleting: false,
                error: ''
            });
            const [renameProjectState, setRenameProjectState] = useState({
                projectId: null,
                isRenaming: false,
                error: ''
            });

            useEffect(() => {
                let isActive = true;
                let intervalId = null;

                const initializeGoogleClient = () => {
                    if (!isActive || !window.google?.accounts?.oauth2) {
                        return;
                    }

                    if (isPlaceholderClientId()) {
                        setAuthReady(true);
                        if (intervalId) {
                            window.clearInterval(intervalId);
                        }
                        return;
                    }

                    try {
                        const tokenClient = window.google.accounts.oauth2.initTokenClient({
                            client_id: GOOGLE_OAUTH_CLIENT_ID,
                            scope: GOOGLE_OAUTH_SCOPES,
                            callback: (response) => {
                                const pendingRequest = authRequestRef.current;
                                authRequestRef.current = null;
                                setAuthLoading(false);

                                if (!response || response.error) {
                                    const errorMessage = response?.error_description || response?.error || 'Google sign-in did not complete. Please try again.';

                                    if (!pendingRequest?.silent) {
                                        setAuthNotice(errorMessage);
                                    }

                                    pendingRequest?.reject(new Error(errorMessage));
                                    return;
                                }

                                const savedToken = saveAuthToken({
                                    access_token: response.access_token,
                                    token_type: response.token_type,
                                    scope: response.scope,
                                    expires_in: response.expires_in,
                                    issued_at: Date.now()
                                });

                                setAuthToken(savedToken);
                                setAuthNotice('');
                                pendingRequest?.resolve(savedToken);
                            }
                        });

                        setAuthTokenClient(tokenClient);
                        setAuthReady(true);

                        if (intervalId) {
                            window.clearInterval(intervalId);
                        }
                    } catch (error) {
                        setAuthLoading(false);
                        setAuthReady(false);
                        setAuthNotice('Unable to initialize Google OAuth. Check the client ID configuration and try again.');
                    }
                };

                initializeGoogleClient();
                intervalId = window.setInterval(initializeGoogleClient, 150);

                return () => {
                    isActive = false;
                    if (intervalId) {
                        window.clearInterval(intervalId);
                    }
                };
            }, []);

            useEffect(() => {
                const handleStorage = (event) => {
                    if (event.key === STATE_STORAGE_KEY) {
                        setAppState(loadState());
                    }

                    if (event.key === AUTH_STORAGE_KEY) {
                        const latestToken = loadAuthToken();
                        setAuthToken(latestToken && !isRememberedAuthExpired(latestToken) ? latestToken : null);
                    }
                };

                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, []);

            useEffect(() => {
                if (authToken && appState.projects.length === 0) {
                    setIsOnboardingOpen(true);
                }
            }, [authToken, appState.projects.length]);

            useEffect(() => {
                if (!diagramLightboxTask) {
                    return undefined;
                }

                const handleEscape = (event) => {
                    if (event.key === 'Escape') {
                        setDiagramLightboxTask(null);
                        setDiagramZoomIndex(0);
                    }
                };

                window.addEventListener('keydown', handleEscape);
                return () => window.removeEventListener('keydown', handleEscape);
            }, [diagramLightboxTask]);

            useEffect(() => {
                if (!appState.currentProjectId) {
                    return;
                }

                setExpandedProjectIds((previousProjectIds) => (
                    previousProjectIds.includes(appState.currentProjectId)
                        ? previousProjectIds
                        : [...previousProjectIds, appState.currentProjectId]
                ));
            }, [appState.currentProjectId]);

            useEffect(() => {
                window.StrategicMarketingBootcampAuthRuntime = {
                    requireReauth: (reason = 'Your Google session needs to be refreshed. Continue with Google to re-authenticate.') => {
                        setAuthNotice(reason);
                    },
                    handleApiAuthFailure: (status) => {
                        if (isAuthFailureStatus(status)) {
                            setAuthNotice('Google API access expired or was rejected. Continue with Google to re-authenticate.');
                            return true;
                        }

                        return false;
                    }
                };

                return () => {
                    delete window.StrategicMarketingBootcampAuthRuntime;
                };
            }, []);

            useEffect(() => {
                if (!authReady || !authToken || !isTokenExpired(authToken)) {
                    return;
                }

                requestGoogleAccess('', { silent: true }).catch(() => {
                    setAuthNotice('Google access expired. Reconnect Google before making Drive changes. Your projects remain saved.');
                });
            }, [authReady, authToken, authTokenClient]);

            const currentProject = useMemo(() => getCurrentProject(appState), [appState]);
            const currentTask = useMemo(() => getCurrentTask(currentProject), [currentProject]);
            const currentTaskDefinition = useMemo(() => getTaskDefinition(currentTask?.taskId || firstTask.taskId), [currentTask, firstTask.taskId]);
            const projectPendingDelete = useMemo(() => (
                appState.projects.find((project) => project.id === deleteProjectState.projectId) || null
            ), [appState.projects, deleteProjectState.projectId]);
            const projectPendingRename = useMemo(() => (
                appState.projects.find((project) => project.id === renameProjectState.projectId) || null
            ), [appState.projects, renameProjectState.projectId]);

            const persistState = (nextState) => {
                const savedState = saveState(nextState);
                setAppState(savedState);
            };

            const handleSelectProject = (projectId) => {
                persistState(selectProject(appState, projectId));
            };

            const handleToggleProject = (projectId) => {
                setLockedTaskMessage('');
                handleSelectProject(projectId);
                setExpandedProjectIds((previousProjectIds) => (
                    previousProjectIds.includes(projectId)
                        ? previousProjectIds.filter((expandedProjectId) => expandedProjectId !== projectId)
                        : [...previousProjectIds, projectId]
                ));
            };

            const handleSelectTask = (taskId) => {
                persistState(selectTask(appState, taskId));
            };

            const handleSelectProjectTask = (projectId, taskId) => {
                setLockedTaskMessage('');
                const nextSelectedState = selectTask(selectProject(appState, projectId), taskId);
                persistState(nextSelectedState);
            };

            const handleLockedTaskClick = (taskId) => {
                setLockedTaskMessage(`Task ${taskId} is locked. Complete Task ${taskId - 1} before opening it.`);
            };

            const requestGoogleAccess = (promptMode = '', options = {}) => {
                const isSilent = Boolean(options.silent);

                if (isPlaceholderClientId()) {
                    const error = new Error('Replace the Google OAuth client ID placeholder before testing sign-in.');

                    if (!isSilent) {
                        setAuthNotice(error.message);
                    }

                    return Promise.reject(error);
                }

                if (!authTokenClient) {
                    const error = new Error('Google sign-in is still initializing. Please try again in a moment.');

                    if (!isSilent) {
                        setAuthNotice(error.message);
                    }

                    return Promise.reject(error);
                }

                if (authRequestRef.current) {
                    authRequestRef.current.reject(new Error('A newer Google connection request started.'));
                }

                setAuthLoading(!isSilent);

                if (!isSilent) {
                    setAuthNotice('');
                }

                return new Promise((resolve, reject) => {
                    authRequestRef.current = { resolve, reject, silent: isSilent };

                    try {
                        authTokenClient.requestAccessToken({ prompt: promptMode });
                    } catch (error) {
                        authRequestRef.current = null;
                        setAuthLoading(false);
                        reject(error);
                    }
                });
            };

            const getValidGoogleToken = async (failureNotice = 'Reconnect Google before making Drive changes. Your projects remain saved.') => {
                const latestToken = loadAuthToken() || authToken;

                if (latestToken && !isRememberedAuthExpired(latestToken) && !isTokenExpired(latestToken)) {
                    return latestToken;
                }

                try {
                    return await requestGoogleAccess('', { silent: true });
                } catch (error) {
                    setAuthNotice(failureNotice);
                    throw new Error('Google access needs to be refreshed. Reconnect Google and try again.');
                }
            };

            const handleRenameProject = async (projectId) => {
                const project = appState.projects.find((projectItem) => projectItem.id === projectId);

                if (!project) {
                    return;
                }

                setRenameProjectState({
                    projectId,
                    isRenaming: false,
                    error: ''
                });
            };

            const handleCancelRenameProject = () => {
                if (renameProjectState.isRenaming) {
                    return;
                }

                setRenameProjectState({
                    projectId: null,
                    isRenaming: false,
                    error: ''
                });
            };

            const handleConfirmRenameProject = async (nextName) => {
                const project = projectPendingRename;

                if (!project || renameProjectState.isRenaming) {
                    return;
                }

                const safeName = String(nextName || '').trim();

                if (!safeName || safeName === project.name) {
                    handleCancelRenameProject();
                    return;
                }

                setRenameProjectState((previousState) => ({
                    ...previousState,
                    isRenaming: true,
                    error: ''
                }));

                const reservedProjectNames = appState.projects
                    .filter((projectItem) => projectItem.id !== project.id)
                    .map((projectItem) => projectItem.name);
                let finalProjectName = getUniqueProjectName(safeName, reservedProjectNames);

                if (project.folderId) {
                    try {
                        const driveToken = await getValidGoogleToken('Reconnect with Google before renaming the Drive project folder. Your local project was not changed.');
                        const rootFolder = await getOrCreateDriveFolder(driveToken, MARKETING_PROJECTS_FOLDER_NAME, 'root');
                        finalProjectName = await getAvailableProjectFolderName(
                            driveToken,
                            safeName,
                            rootFolder.id,
                            reservedProjectNames,
                            project.folderId
                        );
                        await renameDriveFolder(driveToken, project.folderId, finalProjectName);
                    } catch (error) {
                        setRenameProjectState((previousState) => ({
                            ...previousState,
                            isRenaming: false,
                            error: error.message || 'Unable to rename the Drive folder. Try again.'
                        }));
                        return;
                    }
                }

                persistState(renameProjectInState(appState, project.id, finalProjectName));
                setLockedTaskMessage(
                    finalProjectName === safeName
                        ? 'Project name updated.'
                        : `Project renamed to "${finalProjectName}" to avoid a duplicate.`
                );
                setRenameProjectState({
                    projectId: null,
                    isRenaming: false,
                    error: ''
                });
            };

            const handleDeleteProject = (projectId) => {
                const project = appState.projects.find((projectItem) => projectItem.id === projectId);

                if (!project) {
                    return;
                }

                setDeleteProjectState({
                    projectId,
                    isDeleting: false,
                    error: ''
                });
            };

            const handleCancelDeleteProject = () => {
                if (deleteProjectState.isDeleting) {
                    return;
                }

                setDeleteProjectState({
                    projectId: null,
                    isDeleting: false,
                    error: ''
                });
            };

            const handleConfirmDeleteProject = async () => {
                if (!projectPendingDelete || deleteProjectState.isDeleting) {
                    return;
                }

                setDeleteProjectState((previousState) => ({
                    ...previousState,
                    isDeleting: true,
                    error: ''
                }));

                try {
                    if (projectPendingDelete.folderId) {
                        const driveToken = await getValidGoogleToken('Reconnect Google before deleting the Drive project folder. Your project was not deleted.');
                        await trashDriveFolder(driveToken, projectPendingDelete.folderId);
                    }

                    const deletedProjectName = projectPendingDelete.name;
                    persistState(deleteProjectFromState(appState, projectPendingDelete.id));
                    setExpandedProjectIds((previousProjectIds) => previousProjectIds.filter((expandedProjectId) => expandedProjectId !== projectPendingDelete.id));
                    setLockedTaskMessage(`${deletedProjectName} deleted. Google Drive folder moved to trash.`);
                    setDeleteProjectState({
                        projectId: null,
                        isDeleting: false,
                        error: ''
                    });
                } catch (error) {
                    setDeleteProjectState((previousState) => ({
                        ...previousState,
                        isDeleting: false,
                        error: error.message || 'Unable to delete the Drive folder. Project was not removed from this app.'
                    }));
                }
            };

            const handleToggleChecklistItem = (checklistIndex, checked) => {
                if (!currentProject || !currentTask) {
                    return;
                }

                const nextState = updateTaskChecklistItem(
                    appState,
                    currentProject.id,
                    currentTask.taskId,
                    checklistIndex,
                    checked
                );

                persistState(nextState);
            };

            const handleOpenDiagram = (taskDefinition) => {
                setDiagramLightboxTask(taskDefinition);
                setDiagramZoomIndex(0);
            };

            const handleCloseDiagram = () => {
                setDiagramLightboxTask(null);
                setDiagramZoomIndex(0);
            };

            const handleCycleDiagramZoom = (direction) => {
                setDiagramZoomIndex((currentIndex) => {
                    const totalZoomLevels = DIAGRAM_ZOOM_LEVELS.length;
                    return (currentIndex + direction + totalZoomLevels) % totalZoomLevels;
                });
            };

            const resetCreationState = () => {
                setCreationState({
                    isCreating: false,
                    createdCount: 0,
                    message: '',
                    error: ''
                });
            };

            const handleOpenNewProject = () => {
                resetCreationState();
                setIsOnboardingOpen(true);
            };

            const handleCancelOnboarding = () => {
                if (appState.projects.length === 0 || creationState.isCreating) {
                    return;
                }

                resetCreationState();
                setIsOnboardingOpen(false);
            };

            const handleCreateProject = async (projectName) => {
                setCreationState({
                    isCreating: true,
                    createdCount: 0,
                    message: 'Checking Google connection...',
                    error: ''
                });

                try {
                    const driveToken = await getValidGoogleToken('Reconnect Google before creating a project. Your saved projects were not changed.');
                    setCreationState({
                        isCreating: true,
                        createdCount: 0,
                        message: 'Creating your project document... (0/1 file created)',
                        error: ''
                    });
                    const createdProject = await createProjectInDrive(
                        driveToken,
                        projectName,
                        (progress) => {
                            setCreationState({
                                isCreating: true,
                                createdCount: progress.createdCount || 0,
                                message: progress.message || `Creating your project document... (${progress.createdCount || 0}/${PROJECT_DOCUMENT_COPY_COUNT} file created)`,
                                error: ''
                            });
                        },
                        appState.projects.map((project) => project.name)
                    );
                    const nextState = saveState({
                        projects: [...appState.projects, createdProject],
                        currentProjectId: createdProject.id
                    });

                    setAppState(nextState);
                    setCreationState({
                        isCreating: false,
                        createdCount: PROJECT_DOCUMENT_COPY_COUNT,
                        message: '',
                        error: ''
                    });
                    setIsOnboardingOpen(false);
                } catch (error) {
                    setCreationState((previousState) => ({
                        ...previousState,
                        isCreating: false,
                        error: error.message || 'Unable to create the project. Please retry.'
                    }));
                }
            };

            const handleContinueWithGoogle = () => {
                requestGoogleAccess(authToken ? '' : 'consent').catch(() => {});
            };

            const handleSignOut = () => {
                clearAuthToken();
                setAuthToken(null);
                setAuthNotice('You have been signed out. Continue with Google to sign in again.');
            };

            if (!authToken) {
                return (
                    <LoginScreen
                        authReady={authReady}
                        authLoading={authLoading}
                        authNotice={authNotice}
                        onContinueWithGoogle={handleContinueWithGoogle}
                    />
                );
            }

            return (
                <main className="app-shell">
                    {authToken && authNotice && (
                        <div className="auth-refresh-banner" role="status">
                            <span>{authNotice}</span>
                            <button type="button" disabled={authLoading || !authReady} onClick={handleContinueWithGoogle}>
                                {authLoading ? 'Connecting...' : 'Reconnect Google'}
                            </button>
                        </div>
                    )}

                    <aside className="left-sidebar" aria-label="Project navigation">
                        <div className="brand-block">
                            <h1 className="brand-label">Strategic Marketing Bootcamp</h1>
                            <button className="new-project-button" type="button" onClick={handleOpenNewProject}>+ New Project</button>
                        </div>

                        <section className="project-section project-navigation-section" aria-label="Projects">
                            <h2 className="section-heading">Projects</h2>
                            <ProjectNavigation
                                projects={appState.projects}
                                currentProjectId={appState.currentProjectId}
                                expandedProjectIds={expandedProjectIds}
                                lockedTaskMessage={lockedTaskMessage}
                                onToggleProject={handleToggleProject}
                                onSelectTask={handleSelectProjectTask}
                                onLockedTaskClick={handleLockedTaskClick}
                                onRenameProject={handleRenameProject}
                                onDeleteProject={handleDeleteProject}
                            />
                        </section>

                        <section className="project-section auth-section" aria-label="Authentication status">
                            <h2 className="section-heading">Authentication</h2>
                            <div className="status-card">
                                <button className="simple-sign-out-button" type="button" onClick={handleSignOut}>Sign out</button>
                            </div>
                        </section>

                    </aside>

                    <section className={`center-panel ${currentProject ? '' : 'is-empty'}`} aria-label="Main workspace">
                        <CenterWorkspace
                            currentProject={currentProject}
                            currentTask={currentTask}
                            currentTaskDefinition={currentTaskDefinition}
                        />
                    </section>

                    <aside className="right-sidebar" aria-label="Task guidance panel">
                        <GuidancePanel
                            currentTask={currentProject ? currentTask : null}
                            currentTaskDefinition={currentProject ? currentTaskDefinition : null}
                            onOpenDiagram={handleOpenDiagram}
                            onToggleChecklistItem={handleToggleChecklistItem}
                        />
                    </aside>

                    {diagramLightboxTask && (
                        <DiagramLightbox
                            taskDefinition={diagramLightboxTask}
                            zoomIndex={diagramZoomIndex}
                            onClose={handleCloseDiagram}
                            onCycleZoom={handleCycleDiagramZoom}
                        />
                    )}

                    {isOnboardingOpen && (
                        <OnboardingModal
                            isFirstProject={appState.projects.length === 0}
                            creationState={creationState}
                            onCreateProject={handleCreateProject}
                            onCancel={handleCancelOnboarding}
                        />
                    )}

                    {projectPendingDelete && (
                        <DeleteProjectModal
                            project={projectPendingDelete}
                            deleteState={deleteProjectState}
                            onCancel={handleCancelDeleteProject}
                            onConfirm={handleConfirmDeleteProject}
                        />
                    )}

                    {projectPendingRename && (
                        <RenameProjectModal
                            project={projectPendingRename}
                            renameState={renameProjectState}
                            onCancel={handleCancelRenameProject}
                            onConfirm={handleConfirmRenameProject}
                        />
                    )}
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
