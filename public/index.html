                                    <p>Completion rate: {visibleSessions.length ? Math.round((completedCount / visibleSessions.length) * 100) : 0}%</p>
                                    <p>Average focus per session: {avgFocusMinutes}m</p>
                                    <p>Pause density: {visibleSessions.length ? (totalPauseCount / visibleSessions.length).toFixed(1) : '0.0'} pauses / session</p>
                                </article>
                            </div>
                        )}

                        {dashboardView === 'workload' && (
                            <div className="gws-dashboard-visual-grid">
                                <article className="gws-dashboard-visual-card">
                                    <h4>Focus Distribution by Task</h4>
                                    {taskWorkloadRows.length ? (
                                        <div className="gws-dashboard-graph" role="img" aria-label="Task focus distribution chart">
                                            {taskWorkloadRows.map((row) => (
                                                <div className="gws-dashboard-graph-column" key={`task-focus-${row.taskTitle}`}>
                                                    <div
                                                        className="gws-dashboard-graph-bar"
                                                        style={{ height: `${Math.max(8, Math.round((row.actualSeconds / maxTaskSeconds) * 84))}px` }}
                                                        title={`${Math.round(row.actualSeconds / 60)}m`}
                                                    ></div>
                                                    <span className="gws-dashboard-graph-label">{(row.taskTitle || '').slice(0, 6)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p>No workload data in the current filters.</p>
                                    )}
                                </article>

                                <article className="gws-dashboard-visual-card">
                                    <h4>Planned vs Actual by Task</h4>
                                    {taskWorkloadRows.length ? (
                                        <div className="gws-history-detail-grid">
                                            {taskWorkloadRows.map((row) => (
                                                <div className="gws-history-detail-card" key={`task-compare-${row.taskTitle}`}>
                                                    <h4>{row.taskTitle}</h4>
                                                    <p>Planned: {Math.round(row.plannedSeconds / 60)}m</p>
                                                    <div className="gws-dashboard-cadence-progress" aria-hidden="true">
                                                        <span style={{ width: `${Math.max(3, Math.round((row.plannedSeconds / maxTaskSeconds) * 100))}%` }}></span>
                                                    </div>
                                                    <p>Actual: {Math.round(row.actualSeconds / 60)}m</p>
                                                    <div className="gws-dashboard-cadence-progress" aria-hidden="true">
                                                        <span style={{ width: `${Math.max(3, Math.round((row.actualSeconds / maxTaskSeconds) * 100))}%` }}></span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p>No workload comparison data in the current filters.</p>
                                    )}
                                </article>
                            </div>
                        )}

                        {dashboardView === 'cadence' && (
                            <div className="gws-dashboard-visual-grid">
                                <article className="gws-dashboard-visual-card">
                                    <h4>Cadence Comparison</h4>
                                    <div className="gws-dashboard-cadence-bands">
                                        <div className="gws-dashboard-cadence-band">
                                            <span>Last 7 days</span>
                                            <strong>{last7DaysCount} sessions</strong>
                                            <div className="gws-dashboard-cadence-progress" aria-hidden="true">
                                                <span style={{ width: `${Math.max(3, Math.round((last7DaysCount / Math.max(1, last7DaysCount, previous7DaysCount)) * 100))}%` }}></span>
                                            </div>
                                        </div>
                                        <div className="gws-dashboard-cadence-band">
                                            <span>Previous 7 days</span>
                                            <strong>{previous7DaysCount} sessions</strong>
                                            <div className="gws-dashboard-cadence-progress" aria-hidden="true">
                                                <span style={{ width: `${Math.max(3, Math.round((previous7DaysCount / Math.max(1, last7DaysCount, previous7DaysCount)) * 100))}%` }}></span>
                                            </div>
                                        </div>
                                    </div>
                                    <p>{cadenceTrendLabel}</p>
                                </article>

                                <article className="gws-dashboard-visual-card">
                                    <h4>Weekly Rhythm Matrix</h4>
                                    <div className="gws-dashboard-weekday-grid" role="img" aria-label="Sessions per weekday rhythm chart">
                                        {weekdayCounts.map((entry) => (
                                            <div
                                                className="gws-dashboard-weekday-cell"
                                                key={`weekday-${entry.label}`}
                                                style={{
                                                    background: `rgba(212, 168, 67, ${0.08 + ((entry.count / maxWeekdayCount) * 0.42)})`,
                                                    borderColor: `rgba(212, 168, 67, ${0.12 + ((entry.count / maxWeekdayCount) * 0.5)})`
                                                }}
                                            >
                                                <span>{entry.label}</span>
                                                <strong>{entry.count}</strong>
                                            </div>
                                        ))}
                                    </div>
                                </article>

                                <article className="gws-dashboard-visual-card">
                                    <h4>Cadence Warnings</h4>
                                    <ul className="gws-dashboard-insights-list">
                                        <li>{overrunCount > 0 ? `${overrunCount} sessions exceeded planned duration.` : 'No overrun tendency detected.'}</li>
                                        <li>{interruptionHeavyCount > 0 ? `${interruptionHeavyCount} sessions had 2+ pauses.` : 'Interruptions are currently low.'}</li>
                                        <li>{lowOutputCount > 0 ? `${lowOutputCount} sessions finished far below planned output.` : 'Output consistency is healthy.'}</li>
                                    </ul>
                                </article>

                                <article className="gws-dashboard-visual-card">
                                    <h4>Consistency Score</h4>
                                    <p>
                                        {Math.max(0, 100 - (overrunCount * 8) - (interruptionHeavyCount * 6) - (lowOutputCount * 5))}%
                                    </p>
                                    <p>{cadenceRiskLabel}</p>
                                </article>
                            </div>
                        )}
                    </section>

                    <section className="gws-dashboard-current">
                        <h3>Current Session</h3>
                        {activeSession ? (
                            <>
                                <p className="gws-dashboard-current-title">{activeSession.taskTitle || `Task ${activeSession.taskId}`}</p>
                                <p>{activeSession.objective || 'No objective saved yet.'}</p>
                                <p>Status: {activeSession.status} • Planned {Number(activeSession.plannedMinutes) || 60}m</p>
                            </>
                        ) : (
                            <p>No session is currently running. Start one from the timer to see it appear here.</p>
                        )}
                    </section>

                    <section className="gws-dashboard-recent">
                        <div className="gws-history-toolbar">
                            <div className="gws-history-toolbar-row">
                                <div className="gws-history-filter-group" aria-label="Dashboard status filters">
                                    {['all', 'running', 'completed', 'paused', 'stopped', 'abandoned'].map((statusKey) => (
                                        <button
                                            className={`gws-history-filter-chip${statusFilter === statusKey ? ' is-active' : ''}`}
                                            key={statusKey}
                                            type="button"
                                            onClick={() => setStatusFilter(statusKey)}
                                        >
                                            {statusKey}
                                        </button>
                                    ))}
                                </div>
                                <button className="gws-action-button is-secondary" type="button" onClick={exportCsv}>
                                    Export CSV
                                </button>
                            </div>

                            <div className="gws-history-toolbar-row">
                                <div>
                                    <p className="gws-history-filter-label">Task filter</p>
                                    <select
                                        className="gws-history-select"
                                        value={taskFilter}
                                        onChange={(event) => setTaskFilter(event.target.value)}
                                    >
                                        <option value="all">All tasks</option>
                                        {taskOptions.map((option) => (
                                            <option key={option.value} value={option.value}>{option.label}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {visibleSessions.length === 0 ? (
                            <div className="gws-history-empty">No sessions yet. Start and finish a GWS to populate history.</div>
                        ) : (
                            <div className="gws-history-list">
                                {visibleSessions.slice(0, 20).map((session) => {
                                    const plannedMinutes = Number(session.plannedMinutes) === 90 ? 90 : 60;
                                    const actualMinutes = Math.round((Math.max(0, Number(session.actualSeconds) || 0)) / 60);
                                    const plannedSeconds = plannedMinutes * 60;
                                    const actualSeconds = Math.max(0, Number(session.actualSeconds) || 0);
                                    const timeDeltaSeconds = plannedSeconds - actualSeconds;
                                    const sessionDate = new Date(Number(session.endAt) || Number(session.startAt) || Date.now());
                                    const statusClass = session.status === 'completed'
                                        ? 'is-completed'
                                        : (session.status === 'stopped' ? 'is-stopped' : '');
                                    const isExpanded = expandedSessionIds.has(session.sessionId);
                                    const ritualLines = [
                                        session.ritual?.attitude ? `Attitude: ${session.ritual.attitude}` : null,
                                        session.ritual?.hydrated ? 'Hydrated' : null,
                                        session.ritual?.caffeinated ? 'Caffeinated' : null,
                                        session.ritual?.distractionsCleared ? 'No distractions' : null,
                                        Number(session.ritual?.timerMinutes) === 90 ? 'Timer: 90 min' : 'Timer: 60 min'
                                    ].filter(Boolean);
                                    const plannedTaskLines = Array.isArray(session.plannedTasks) ? session.plannedTasks : [];
                                    const achievedTaskLines = Array.isArray(session.achievedTasks) ? session.achievedTasks : [];
                                    const normalizeTaskKey = (taskName) => String(taskName || '').trim().toLowerCase();
                                    const achievedTaskKeys = new Set(achievedTaskLines.map((taskName) => normalizeTaskKey(taskName)).filter(Boolean));
                                    const plannedTaskKeys = new Set(plannedTaskLines.map((taskName) => normalizeTaskKey(taskName)).filter(Boolean));
                                    const isDeleteConfirmOpen = pendingDeleteSessionId === session.sessionId;

                                    return (
                                        <article className="gws-history-item" key={session.sessionId}>
                                            <button
                                                className="gws-history-item-button"
                                                type="button"
                                                onClick={() => toggleSessionDetails(session.sessionId)}
                                                aria-expanded={isExpanded}
                                            >
                                                <div className="gws-history-item-head">
                                                    <p className="gws-history-item-title">{session.taskTitle || `Task ${session.taskId}`}</p>
                                                    <span className={`gws-status-badge ${statusClass}`}>{session.status}</span>
                                                </div>
                                                <p className="gws-history-item-meta">
                                                    {sessionDate.toLocaleString()} • Planned {plannedMinutes}m • Actual {actualMinutes}m
                                                </p>
                                                <span className="gws-history-item-toggle">{isExpanded ? 'Hide details' : 'Show details'}</span>
                                            </button>

                                            <div className="gws-history-item-actions">
                                                {!isDeleteConfirmOpen ? (
                                                    <button
                                                        className="gws-action-button gws-history-item-delete"
                                                        type="button"
                                                        aria-label="Delete session"
                                                        title="Delete session"
                                                        onClick={() => setPendingDeleteSessionId(session.sessionId)}
                                                    >
                                                        <span aria-hidden="true">🗑</span>
                                                    </button>
                                                ) : (
                                                    <div className="gws-history-inline-confirm" role="alert">
                                                        <p>Delete this session permanently?</p>
                                                        <button
                                                            className="gws-action-button is-danger"
                                                            type="button"
                                                            onClick={() => handleConfirmDeleteSession(session.sessionId)}
                                                        >
                                                            Delete
                                                        </button>
                                                        <button
                                                            className="gws-action-button is-secondary"
                                                            type="button"
                                                            onClick={() => setPendingDeleteSessionId('')}
                                                        >
                                                            Cancel
                                                        </button>
                                                    </div>
                                                )}
                                            </div>

                                            {isExpanded && (
                                                <div className="gws-history-item-details">
                                                    <div className="gws-history-detail-grid">
                                                        <div className="gws-history-detail-card">
                                                            <h4>Objective</h4>
                                                            <p>{session.objective || 'Not set'}</p>
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Ritual</h4>
                                                            {ritualLines.length ? (
                                                                <ul>
                                                                    {ritualLines.map((ritualLine) => <li key={ritualLine}>{ritualLine}</li>)}
                                                                </ul>
                                                            ) : (
                                                                <p className="gws-history-detail-empty">No ritual saved.</p>
                                                            )}
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Planned vs Actual Tasks</h4>
                                                            <div className="gws-comparison-grid">
                                                                <div className="gws-comparison-column">
                                                                    <h5>Planned at Start</h5>
                                                                    {plannedTaskLines.length ? (
                                                                        <ul className="gws-comparison-list">
                                                                            {plannedTaskLines.map((taskLine, taskIndex) => {
                                                                                const key = normalizeTaskKey(taskLine);
                                                                                const isMatch = key && achievedTaskKeys.has(key);

                                                                                return (
                                                                                    <li
                                                                                        className={`gws-comparison-item ${isMatch ? 'is-match' : 'is-gap'}`}
                                                                                        key={`${taskLine}-${taskIndex}`}
                                                                                    >
                                                                                        {isMatch ? '✓ ' : '✕ '}{taskLine}
                                                                                    </li>
                                                                                );
                                                                            })}
                                                                        </ul>
                                                                    ) : (
                                                                        <p className="gws-history-detail-empty">No planned tasks saved.</p>
                                                                    )}
                                                                </div>
                                                                <div className="gws-comparison-column">
                                                                    <h5>Actually Achieved</h5>
                                                                    {achievedTaskLines.length ? (
                                                                        <ul className="gws-comparison-list">
                                                                            {achievedTaskLines.map((taskLine, taskIndex) => {
                                                                                const key = normalizeTaskKey(taskLine);
                                                                                const isMatch = key && plannedTaskKeys.has(key);

                                                                                return (
                                                                                    <li
                                                                                        className={`gws-comparison-item ${isMatch ? 'is-match' : 'is-extra'}`}
                                                                                        key={`${taskLine}-${taskIndex}`}
                                                                                    >
                                                                                        {isMatch ? '✓ ' : '+ '}{taskLine}
                                                                                    </li>
                                                                                );
                                                                            })}
                                                                        </ul>
                                                                    ) : (
                                                                        <p className="gws-history-detail-empty">No achieved tasks captured yet.</p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Review Notes</h4>
                                                            <p>{session.notes || 'No review notes saved.'}</p>
                                                        </div>
                                                    </div>

                                                    <div className="gws-history-detail-metrics">
                                                        <div className="gws-history-metric">
                                                            <p className="gws-history-metric-label">Planned vs Actual</p>
                                                            <p className="gws-history-metric-value">{plannedMinutes}m / {actualMinutes}m</p>
                                                        </div>
                                                        <div className="gws-history-metric">
                                                            <p className="gws-history-metric-label">Time Delta</p>
                                                            <p className="gws-history-metric-value">{timeDeltaSeconds >= 0 ? '-' : '+'}{Math.abs(Math.round(timeDeltaSeconds / 60))}m</p>
                                                        </div>
                                                        <div className="gws-history-metric">
                                                            <p className="gws-history-metric-label">Progress</p>
                                                            <p className="gws-history-metric-value">
                                                                {Array.isArray(session.completedChecklistItems) && session.completedChecklistItems.length
                                                                    ? `${session.completedChecklistItems.length} checklist items`
                                                                    : 'No checklist snapshot'}
                                                            </p>
                                                        </div>
                                                    </div>

                                                    <div className="gws-history-detail-grid">
                                                        <div className="gws-history-detail-card">
                                                            <h4>Analyze</h4>
                                                            <p>{session.analyze || 'No analysis saved.'}</p>
                                                        </div>
                                                        <div className="gws-history-detail-card">
                                                            <h4>Quick Tweaks</h4>
                                                            <p>{session.quickTweaks || 'No quick tweaks saved.'}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </article>
                                    );
                                })}
                            </div>
                        )}
                    </section>
                </section>
            );
        }

        function ProjectNavigation({
            projects,
            currentProjectId,
            expandedProjectIds,
            lockedTaskMessage,
            onToggleProject,
            onSelectTask,
            onLockedTaskClick,
            onRenameProject,
            onDeleteProject
        }) {
            if (!projects.length) {
                return (
                    <div className="project-list-placeholder">
                        No project has been created yet. Complete onboarding to create your first Drive project.
                    </div>
                );
            }

            return (
                <div className="project-accordion-list">
                    {lockedTaskMessage && <div className="locked-task-message" role="status">{lockedTaskMessage}</div>}
                    {projects.map((project) => {
                        const projectTaskDefinitions = getProjectTaskDefinitions(project);
                        const isCurrentProject = project.id === currentProjectId;
                        const isExpanded = expandedProjectIds.includes(project.id);
                        const completion = getProjectCompletion(project);

                        return (
                            <article className={`project-accordion ${isCurrentProject ? 'is-current' : ''}`} key={project.id}>
                                <button
                                    className="project-accordion-header"
                                    type="button"
                                    aria-expanded={isExpanded}
                                    onClick={() => onToggleProject(project.id)}
                                >
                                    <span>
                                        <span className="project-title">{project.name}</span>
                                        <span className="project-meta">{completion.completedCount}/{completion.totalCount} tasks complete</span>
                                    </span>
                                    <span className="project-toggle" aria-hidden="true">{isExpanded ? '▾' : '▸'}</span>
                                </button>

                                {isExpanded && (
                                    <>
                                        <div className="project-actions" aria-label={`${project.name} actions`}>
                                            <button
                                                className="project-action-button"
                                                type="button"
                                                aria-label={`Rename project ${project.name}`}
                                                title="Rename project"
                                                onClick={() => onRenameProject(project.id)}
                                            >
                                                <span aria-hidden="true">✎</span>
                                            </button>
                                            <button
                                                className="project-action-button is-danger"
                                                type="button"
                                                aria-label={`Delete project ${project.name}`}
                                                title="Delete project"
                                                onClick={() => onDeleteProject(project.id)}
                                            >
                                                <span aria-hidden="true">🗑</span>
                                            </button>
                                        </div>

                                        <div className="project-phases">
                                            {PHASE_DEFINITIONS.map((phaseDefinition) => {
                                                const phaseTasks = projectTaskDefinitions.filter((taskDefinition) => taskDefinition.phase === phaseDefinition.phase);

                                                return (
                                                    <div className="phase-group" key={`${project.id}-phase-${phaseDefinition.phase}`}>
                                                        <p className="phase-label">Phase {phaseDefinition.phase} · {phaseDefinition.phaseName}</p>

                                                        {phaseDefinition.phase !== 2 && phaseTasks.map((taskDefinition) => {
                                                            const projectTask = getProjectTask(project, taskDefinition.taskId);
                                                            const isComplete = isTaskComplete(projectTask);
                                                            const isUnlocked = isTaskUnlocked(project, taskDefinition.taskId);
                                                            const isActive = isCurrentProject && project.lastOpenedTask === taskDefinition.taskId;
                                                            const statusIcon = !isUnlocked ? '🔒' : (isComplete ? '✅' : '🔲');

                                                            return (
                                                                <button
                                                                    className={`task-nav-button ${isActive ? 'is-active' : ''} ${isUnlocked ? '' : 'is-locked'}`}
                                                                    type="button"
                                                                    key={`${project.id}-task-${taskDefinition.taskId}`}
                                                                    aria-current={isActive ? 'page' : undefined}
                                                                    aria-disabled={!isUnlocked}
                                                                    title={isUnlocked ? taskDefinition.fullDocTitle : `Complete previous tasks to unlock this task.`}
                                                                    onClick={() => {
                                                                        if (!isUnlocked) {
                                                                            onLockedTaskClick(taskDefinition.taskId);
                                                                            return;
                                                                        }

                                                                        onSelectTask(project.id, taskDefinition.taskId);
                                                                    }}
                                                                >
                                                                    <span className="task-status-icon" aria-hidden="true">{statusIcon}</span>
                                                                    <span>
                                                                        <span className="task-nav-title">Task {taskDefinition.displayTaskNumber || taskDefinition.taskId}: {taskDefinition.shortTitle}</span>
                                                                        <span className="task-nav-subtitle">{taskDefinition.lessonNumber}</span>
                                                                    </span>
                                                                </button>
                                                            );
                                                        })}

                                                        {phaseDefinition.phase === 2 && (
                                                            <>
                                                                {phaseTasks
                                                                    .filter((taskDefinition) => !taskDefinition.isGeneratedStage2)
                                                                    .map((taskDefinition) => {
                                                                        const projectTask = getProjectTask(project, taskDefinition.taskId);
                                                                        const isComplete = isTaskComplete(projectTask);
                                                                        const isUnlocked = isTaskUnlocked(project, taskDefinition.taskId);
                                                                        const isActive = isCurrentProject && project.lastOpenedTask === taskDefinition.taskId;
                                                                        const statusIcon = !isUnlocked ? '🔒' : (isComplete ? '✅' : '🔲');

                                                                        return (
                                                                            <button
                                                                                className={`task-nav-button ${isActive ? 'is-active' : ''} ${isUnlocked ? '' : 'is-locked'}`}
                                                                                type="button"
                                                                                key={`${project.id}-task-${taskDefinition.taskId}`}
                                                                                aria-current={isActive ? 'page' : undefined}
                                                                                aria-disabled={!isUnlocked}
                                                                                title={isUnlocked ? taskDefinition.fullDocTitle : `Complete previous tasks to unlock this task.`}
                                                                                onClick={() => {
                                                                                    if (!isUnlocked) {
                                                                                        onLockedTaskClick(taskDefinition.taskId);
                                                                                        return;
                                                                                    }

                                                                                    onSelectTask(project.id, taskDefinition.taskId);
                                                                                }}
                                                                            >
                                                                                <span className="task-status-icon" aria-hidden="true">{statusIcon}</span>
                                                                                <span>
                                                                                    <span className="task-nav-title">Task {taskDefinition.displayTaskNumber || taskDefinition.taskId}: {taskDefinition.shortTitle}</span>
                                                                                    <span className="task-nav-subtitle">{taskDefinition.lessonNumber}</span>
                                                                                </span>
                                                                            </button>
                                                                        );
                                                                    })}

                                                                {getProjectStage2Elements(project).map((elementName, elementIndex) => {
                                                                    const elementTasks = phaseTasks.filter((taskDefinition) => (
                                                                        taskDefinition.isGeneratedStage2 && taskDefinition.stage2ElementIndex === elementIndex
                                                                    ));

                                                                    if (!elementTasks.length) {
                                                                        return null;
                                                                    }

                                                                    return (
                                                                        <div className="phase-group" key={`${project.id}-stage2-element-${elementIndex}`}>
                                                                            <p className="phase-label">{elementName}</p>
                                                                            {elementTasks.map((taskDefinition) => {
                                                                                const projectTask = getProjectTask(project, taskDefinition.taskId);
                                                                                const isComplete = isTaskComplete(projectTask);
                                                                                const isUnlocked = isTaskUnlocked(project, taskDefinition.taskId);
                                                                                const isActive = isCurrentProject && project.lastOpenedTask === taskDefinition.taskId;
                                                                                const statusIcon = !isUnlocked ? '🔒' : (isComplete ? '✅' : '🔲');

                                                                                return (
                                                                                    <button
                                                                                        className={`task-nav-button ${isActive ? 'is-active' : ''} ${isUnlocked ? '' : 'is-locked'}`}
                                                                                        type="button"
                                                                                        key={`${project.id}-task-${taskDefinition.taskId}`}
                                                                                        aria-current={isActive ? 'page' : undefined}
                                                                                        aria-disabled={!isUnlocked}
                                                                                        title={isUnlocked ? taskDefinition.fullDocTitle : `Complete previous tasks to unlock this task.`}
                                                                                        onClick={() => {
                                                                                            if (!isUnlocked) {
                                                                                                onLockedTaskClick(taskDefinition.taskId);
                                                                                                return;
                                                                                            }

                                                                                            onSelectTask(project.id, taskDefinition.taskId);
                                                                                        }}
                                                                                    >
                                                                                        <span className="task-status-icon" aria-hidden="true">{statusIcon}</span>
                                                                                        <span>
                                                                                            <span className="task-nav-title">Task {taskDefinition.displayTaskNumber || taskDefinition.taskId}: {taskDefinition.shortTitle}</span>
                                                                                            <span className="task-nav-subtitle">{taskDefinition.lessonNumber}</span>
                                                                                        </span>
                                                                                    </button>
                                                                                );
                                                                            })}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </>
                                )}
                            </article>
                        );
                    })}
                </div>
            );
        }

        function CenterWorkspace({
            currentProject,
            currentTask,
            currentTaskDefinition,
            workspaceTab,
            isDashboardTabOpen,
            isGwsRunning,
            isGwsPaused,
            gwsRemainingSeconds,
            onStartSession,
            onPauseSession,
            onResumeSession,
            onEndSession,
            onDeleteSession,
            onSelectWorkspaceTab,
            onCloseDashboardTab
        }) {
            const [isFrameLoading, setIsFrameLoading] = useState(false);
            const [showFrameFallback, setShowFrameFallback] = useState(false);
            const fallbackTimerRef = useRef(null);
            const documentReference = getProjectDocumentReference(currentProject, currentTask, currentTaskDefinition);
            const docUrl = getGoogleDocEditUrl(documentReference.docId, false, documentReference.tabId);
            const embeddedDocUrl = getGoogleDocEditUrl(documentReference.docId, true, documentReference.tabId);
            const isDashboardTab = isDashboardTabOpen && workspaceTab === 'gws';

            useEffect(() => {
                if (fallbackTimerRef.current) {
                    window.clearTimeout(fallbackTimerRef.current);
                }

                if (!embeddedDocUrl) {
                    setIsFrameLoading(false);
                    setShowFrameFallback(false);
                    return undefined;
                }

                setIsFrameLoading(true);
                setShowFrameFallback(false);

                fallbackTimerRef.current = window.setTimeout(() => {
                    setShowFrameFallback(true);
                }, 8000);

                return () => {
                    if (fallbackTimerRef.current) {
                        window.clearTimeout(fallbackTimerRef.current);
                    }
                };
            }, [embeddedDocUrl]);

            if (!currentProject) {
                return (
                    <div className="center-placeholder">
                        <div className="placeholder-kicker">Task Workspace</div>
                        <h2>Select a task to begin</h2>
                        <p>
                            Create a project first, then choose an unlocked task from the left sidebar to load its Google Doc here.
                        </p>
                    </div>
                );
            }

            const docsTabPanel = !currentTask || !currentTaskDefinition || !embeddedDocUrl
                ? (
                    <div className="center-placeholder recovery-card">
                        <div className="placeholder-kicker">Recovery State</div>
                        <h2>{currentProject.projectDocId ? 'Project document is missing' : 'Task document is missing'}</h2>
                        <p>
                            {currentProject.projectDocId
                                ? 'This project exists, but its project-level Google Doc ID is missing or invalid. Create a new project or restore this project from a valid saved state.'
                                : 'This legacy project exists, but the selected task is missing its Google Doc ID. Create a new project or restore this project from a valid saved state.'}
                        </p>
                        <div className="recovery-actions">
                            <span className="recovery-action-link">Use + New Project in the sidebar</span>
                        </div>
                    </div>
                )
                : (
                    <div className="doc-workspace">
                        <div className="doc-frame-shell">
                            <iframe
                                className="doc-frame"
                                key={embeddedDocUrl}
                                title={`${currentProject.name} — ${currentTaskDefinition.fullDocTitle}`}
                                src={embeddedDocUrl}
                                onLoad={() => {
                                    if (fallbackTimerRef.current) {
                                        window.clearTimeout(fallbackTimerRef.current);
                                    }

                                    setIsFrameLoading(false);
                                    setShowFrameFallback(false);
                                }}
                            ></iframe>

                            <a className="open-doc-button floating-open-doc-button" href={docUrl} target="_blank" rel="noopener noreferrer">
                                Open in Google Docs ↗
                            </a>

                            {isFrameLoading && (
                                <div className="doc-loading-overlay" aria-live="polite">
                                    <div className="doc-loading-card">
                                        <div className="spinner" aria-hidden="true"></div>
                                        <p>Loading {currentTaskDefinition.fullDocTitle}...</p>
                                    </div>
                                </div>
                            )}

                            {showFrameFallback && (
                                <div className="doc-fallback-overlay" aria-live="polite">
                                    <div className="doc-fallback-card">
                                        <p>If Google Docs is blocked in the iframe, open the task directly in Google Docs.</p>
                                        <a className="open-doc-button" href={docUrl} target="_blank" rel="noopener noreferrer">
                                            Open in Google Docs ↗
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );

            const dashboardPanel = (
                <GwsDashboardPanel
                    currentProject={currentProject}
                    activeSession={currentProject?.gws?.activeSession || null}
                    sessions={currentProject?.gws?.sessions || []}
                    currentTaskDefinition={currentTaskDefinition}
                    isGwsRunning={isGwsRunning}
                    isGwsPaused={isGwsPaused}
                    gwsRemainingSeconds={gwsRemainingSeconds}
                    onStartSession={onStartSession}
                    onPauseSession={onPauseSession}
                    onResumeSession={onResumeSession}
                    onEndSession={onEndSession}
                    onDeleteSession={onDeleteSession}
                />
            );

            if (!isDashboardTabOpen) {
                return docsTabPanel;
            }

            if (!currentTask || !currentTaskDefinition || !embeddedDocUrl) {
                return (
                    <div className="center-workspace-tabs">

        function validateStage2Elements(elements) {
            const safeElements = Array.isArray(elements) ? elements : [];

            if (!safeElements.length) {
                return 'Add at least one funnel element.';
            }

            if (safeElements.length > MAX_STAGE2_ELEMENTS) {
                return `You can add up to ${MAX_STAGE2_ELEMENTS} elements.`;
            }

            const seenKeys = new Set();

            for (const elementName of safeElements) {
                const safeName = String(elementName || '').trim();

                if (!safeName) {
                    return 'Element names cannot be empty.';
                }

                const key = safeName.toLowerCase();

                if (seenKeys.has(key)) {
                    return `Duplicate element name found: "${safeName}".`;
                }

                seenKeys.add(key);
            }

            return '';
        }

        function validateDraftAssets(assets) {
            const safeAssets = Array.isArray(assets) ? assets : [];

            if (!safeAssets.length) {
                return 'Add at least one draft asset.';
            }

            if (safeAssets.length > MAX_DRAFT_ASSETS) {
                return `You can add up to ${MAX_DRAFT_ASSETS} draft assets.`;
            }

            const seenKeys = new Set();

            for (const assetName of safeAssets) {
                const safeAssetName = String(assetName || '').trim();

                if (!safeAssetName) {
                    return 'Draft asset names cannot be empty.';
                }

                const key = safeAssetName.toLowerCase();

                if (seenKeys.has(key)) {
                    return `Duplicate draft asset name found: "${safeAssetName}".`;
                }

                seenKeys.add(key);
            }

            return '';
        }

        function validateDraftAssetAssignments(assetAssignments, funnelItems) {
            const safeAssignments = assetAssignments && typeof assetAssignments === 'object' ? assetAssignments : {};
            const safeFunnelItems = Array.isArray(funnelItems) ? funnelItems : [];
            const globalAssetKeys = new Set();

            if (!safeFunnelItems.length) {
                return 'Set Stage 2 funnel elements before configuring draft assets.';
            }

            for (const funnelItemName of safeFunnelItems) {
                const safeFunnelItemName = String(funnelItemName || '').trim();

                if (!safeFunnelItemName) {
                    return 'Funnel item name cannot be empty.';
                }

                const assets = Array.isArray(safeAssignments[safeFunnelItemName]) ? safeAssignments[safeFunnelItemName] : [];

                if (!assets.length) {
                    return `Add at least one draft asset for ${safeFunnelItemName}.`;
                }

                if (assets.length > MAX_DRAFT_ASSETS) {
                    return `You can add up to ${MAX_DRAFT_ASSETS} draft assets per funnel item.`;
                }

                const localAssetKeys = new Set();

                for (const assetName of assets) {
                    const safeAssetName = String(assetName || '').trim();

                    if (!safeAssetName) {
                        return `Draft asset names cannot be empty for ${safeFunnelItemName}.`;
                    }

                    const localKey = safeAssetName.toLowerCase();

                    if (localAssetKeys.has(localKey)) {
                        return `Duplicate draft asset name found in ${safeFunnelItemName}: "${safeAssetName}".`;
                    }

                    localAssetKeys.add(localKey);

                    if (globalAssetKeys.has(localKey)) {
                        return `Draft asset name must be unique across all funnel items: "${safeAssetName}".`;
                    }

                    globalAssetKeys.add(localKey);
                }
            }

            return '';
        }

        function sanitizeDocumentTabTitle(title, fallback = 'Draft') {
            const safeFallback = String(fallback || '').trim() || 'Draft';
            const safeTitle = String(title || '').trim() || safeFallback;
            const maxTitleLength = Math.max(8, Number(MAX_DOCUMENT_TAB_TITLE_LENGTH) || 50);
            return safeTitle.slice(0, maxTitleLength);
        }

        function buildUniqueTabTitle(baseTitle, usedTitleKeys) {
            const fallbackTitle = 'Draft';
            const safeBaseTitle = sanitizeDocumentTabTitle(baseTitle, fallbackTitle);
            const maxTitleLength = Math.max(8, Number(MAX_DOCUMENT_TAB_TITLE_LENGTH) || 50);
            const trimToLimit = (value, maxLength) => sanitizeDocumentTabTitle(
                String(value || '').trim().slice(0, Math.max(1, maxLength)),
                fallbackTitle
            );
            const baseWithinLimit = trimToLimit(safeBaseTitle, maxTitleLength);
            let nextTitle = baseWithinLimit || fallbackTitle;
            let suffix = 2;

            while (usedTitleKeys.has(nextTitle.toLowerCase())) {
                const suffixText = ` ${suffix}`;
                const maxBaseLength = Math.max(1, maxTitleLength - suffixText.length);
                const candidateBase = trimToLimit(baseWithinLimit || fallbackTitle, maxBaseLength);
                nextTitle = `${candidateBase}${suffixText}`;
                suffix += 1;
            }

            usedTitleKeys.add(nextTitle.toLowerCase());
            return nextTitle;
        }

        function rebuildProjectTasksForStage2(project, elementNames) {
            const previousTaskDefinitions = getProjectTaskDefinitions(project);
            const previousTasksByTemplateTaskId = {};

            previousTaskDefinitions.forEach((taskDefinition) => {
                if (taskDefinition.isGeneratedStage2) {
                    return;
                }

                const projectTask = getProjectTask(project, taskDefinition.taskId);

                if (!projectTask) {
                    return;
                }

                previousTasksByTemplateTaskId[String(taskDefinition.sourceTemplateTaskId || taskDefinition.taskId)] = projectTask;
            });

            const nextStage2 = normalizeStage2State({
                elements: elementNames,
                taskTabIds: {},
                generatedTabIds: []
            });
            const nextProjectDraft = { ...project, stage2: nextStage2 };
            const nextTaskDefinitions = getProjectTaskDefinitions(nextProjectDraft);
            const nextTasks = nextTaskDefinitions.map((taskDefinition) => {
                if (taskDefinition.isGeneratedStage2) {
                    return createDefaultProjectTask(taskDefinition.taskId, '', taskDefinition, nextProjectDraft);
                }

                const preservedTask = previousTasksByTemplateTaskId[String(taskDefinition.sourceTemplateTaskId || taskDefinition.taskId)] || null;
                return normalizeProjectTask(preservedTask, taskDefinition);
            });

            const currentTaskStillExists = nextTaskDefinitions.some((taskDefinition) => taskDefinition.taskId === project.lastOpenedTask);
            const firstGeneratedTaskId = nextTaskDefinitions.find((taskDefinition) => taskDefinition.isGeneratedStage2)?.taskId || STAGE2_START_TASK_ID;

            return {
                ...project,
                stage2: nextStage2,
                tasks: nextTasks,
                lastOpenedTask: currentTaskStillExists ? project.lastOpenedTask : firstGeneratedTaskId
            };
        }

        const GWS_BELL_SOUND_URL = 'https://cdn.freesound.org/previews/810/810191_17437502-lq.mp3';

        async function playGwsCompletionRingtone(audioContextRef) {
            try {
                const ringAudio = new Audio(GWS_BELL_SOUND_URL);
                ringAudio.preload = 'auto';
                ringAudio.loop = false;
                ringAudio.volume = 0.9;

                await ringAudio.play();
                return;
            } catch (error) {
                // Fall back to the synthetic completion ringtone when remote audio cannot play.
            }

            const AudioContextClass = window.AudioContext || window.webkitAudioContext;

            if (!AudioContextClass) {
                return;
            }

            if (!audioContextRef.current) {
                audioContextRef.current = new AudioContextClass();
            }

            const audioContext = audioContextRef.current;

            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            const startAt = audioContext.currentTime;
            const chimeOffsets = [0, 0.28, 0.56, 0.9, 1.18, 1.46];

            chimeOffsets.forEach((offset, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                const frequency = index % 2 === 0 ? 880 : 660;
                const toneStart = startAt + offset;
                const toneEnd = toneStart + 0.18;

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, toneStart);

                gainNode.gain.setValueAtTime(0.0001, toneStart);
                gainNode.gain.exponentialRampToValueAtTime(0.2, toneStart + 0.03);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, toneEnd);

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.start(toneStart);
                oscillator.stop(toneEnd);
            });
        }

        async function playGwsStartTone(audioContextRef) {
            try {
                const ringAudio = new Audio(GWS_BELL_SOUND_URL);
                ringAudio.preload = 'auto';
                ringAudio.loop = false;
                ringAudio.volume = 0.9;

                await ringAudio.play();
                return;
            } catch (error) {
                // Fall back to a single synthetic bell if the public sound cannot play.
            }

            const AudioContextClass = window.AudioContext || window.webkitAudioContext;

            if (!AudioContextClass) {
                return;
            }

            if (!audioContextRef.current) {
                audioContextRef.current = new AudioContextClass();
            }

            const audioContext = audioContextRef.current;

            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            const startAt = audioContext.currentTime;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            const toneStart = startAt;
            const toneEnd = toneStart + 0.55;

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, toneStart);
            oscillator.frequency.exponentialRampToValueAtTime(660, toneStart + 0.12);

            gainNode.gain.setValueAtTime(0.0001, toneStart);
            gainNode.gain.exponentialRampToValueAtTime(0.22, toneStart + 0.03);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, toneEnd);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(toneStart);
            oscillator.stop(toneEnd);
        }

                const uncheckedItems = taskChecklist
                    .map((item, index) => (taskProgress[index] ? null : String(item || '').trim()))

                distractionsCleared: false,
                timerMinutes: timerMinutes === 90 ? 90 : 60
                });
            };

            function updateProjectGws(projectId, updater) {
                if (!projectId) {
                    return;
                }

                setAppState((previousState) => {
                    const nextState = {
                        ...previousState,
                        projects: previousState.projects.map((project) => {
                            if (project.id !== projectId) {
                                return project;
                            }

                            const currentGws = normalizeGwsState(project.gws);
                            const nextGws = normalizeGwsState(updater(currentGws, project));

                            return {
                                ...project,
                                gws: nextGws
                            };
                        })
                    };

                    return saveState(nextState);
                });
            }

            function closeGwsSession(status) {
                const activeSession = gwsActiveSessionRef.current;

                if (!activeSession?.projectId || !activeSession?.sessionId) {
                    return;
                }

                const endedAt = Date.now();
                const remainingSeconds = Math.max(0, Number(gwsRemainingSeconds) || 0);
                const plannedSeconds = (Number(activeSession.plannedMinutes) === 90 ? 90 : 60) * 60;
                const actualSeconds = Math.max(0, plannedSeconds - remainingSeconds);

                updateProjectGws(activeSession.projectId, (currentGws, project) => {
                    const latestTask = getProjectTask(project, activeSession.taskId);
                    const latestTaskDefinition = getTaskDefinition(activeSession.taskId, project);
                    const checklistItems = Array.isArray(latestTaskDefinition?.checklist) ? latestTaskDefinition.checklist : [];
                    const latestChecklistState = Array.isArray(latestTask?.checklist) ? latestTask.checklist.map(Boolean) : [];
                    const checklistSnapshot = Array.isArray(activeSession.checklistSnapshot)
                        ? activeSession.checklistSnapshot.map(Boolean)
                        : [];
                    const achievedChecklistItems = checklistItems
                        .filter((item, index) => !Boolean(checklistSnapshot[index]) && Boolean(latestChecklistState[index]))
                        .map((item) => String(item || '').trim())
                        .filter(Boolean);
                    const completedChecklistItems = checklistItems
                        .filter((item, index) => Boolean(latestChecklistState[index]))
                        .map((item) => String(item || '').trim())
                        .filter(Boolean);

                    const finalizedSession = normalizeGwsSession({
                        ...activeSession,
                        endAt: endedAt,
                        remainingSeconds,
                        actualSeconds,
                        completedChecklistItems,
                        achievedTasks: achievedChecklistItems,
                        status
                    });

                    if (!finalizedSession) {
