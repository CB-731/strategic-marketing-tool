<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Marketing Bootcamp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --left-sidebar: #141414;
            --right-sidebar: #141414;
            --center-panel: #1a1a1a;
            --card: #1e1e1e;
            --accent: #d4a843;
            --text-primary: #f0f0f0;
            --text-secondary: #9a9a9a;
            --border: #2a2a2a;
            --hover: rgba(255, 255, 255, 0.04);
            --shadow: rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body,
        #root {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
            background: var(--bg);
            color: var(--text-primary);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        button {
            font: inherit;
        }

        .auth-shell {
            width: 100%;
            height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(212, 168, 67, 0.14), transparent 28%),
                radial-gradient(circle at bottom right, rgba(212, 168, 67, 0.08), transparent 32%),
                var(--bg);
        }

        .auth-card {
            width: min(460px, 100%);
            padding: 34px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.98), rgba(18, 18, 18, 0.98));
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.36);
            display: grid;
            gap: 18px;
        }

        .auth-kicker {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border: 1px solid rgba(212, 168, 67, 0.28);
            border-radius: 999px;
            background: rgba(212, 168, 67, 0.08);
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .auth-card h1 {
            margin: 0;
            font-size: clamp(34px, 6vw, 54px);
            line-height: 0.98;
            letter-spacing: -0.06em;
        }

        .auth-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.75;
        }

        .auth-message {
            padding: 13px 14px;
            border: 1px solid rgba(212, 168, 67, 0.22);
            border-radius: 14px;
            background: rgba(212, 168, 67, 0.06);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.6;
        }

        .google-auth-button {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(212, 168, 67, 0.42);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.2), rgba(212, 168, 67, 0.1));
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .google-auth-button:hover {
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.26), rgba(212, 168, 67, 0.14));
            border-color: rgba(212, 168, 67, 0.56);
            transform: translateY(-1px);
        }

        .google-auth-button:disabled,
        .mini-button:disabled,
        .task-pill:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        .new-project-button {
            cursor: pointer;
        }

        .scope-list {
            margin: 0;
            padding-left: 18px;
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.8;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .onboarding-modal {
            width: min(560px, calc(100vw - 48px));
            max-height: calc(100vh - 40px);
            padding: 28px;
            border: 1px solid rgba(212, 168, 67, 0.28);
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.98), rgba(18, 18, 18, 0.98));
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
            display: grid;
            gap: 16px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(212, 168, 67, 0.7) rgba(255, 255, 255, 0.04);
        }

        .onboarding-modal::-webkit-scrollbar {
            width: 10px;
        }

        .onboarding-modal::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 999px;
        }

        .onboarding-modal::-webkit-scrollbar-thumb {
            border: 2px solid rgba(18, 18, 18, 0.98);
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.9), rgba(212, 168, 67, 0.55));
        }

        .onboarding-modal::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(212, 168, 67, 1), rgba(212, 168, 67, 0.72));
        }

        .onboarding-modal h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .onboarding-modal p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.7;
        }

        .delete-modal {
            max-width: 480px;
        }

        .delete-modal-warning {
            padding: 13px 14px;
            border: 1px solid rgba(255, 120, 120, 0.24);
            border-radius: 14px;
            background: rgba(255, 120, 120, 0.08);
            color: #ffd1d1;
            font-size: 13px;
            line-height: 1.6;
        }

        .danger-action {
            border-color: rgba(255, 120, 120, 0.4);
            background: linear-gradient(180deg, rgba(255, 120, 120, 0.24), rgba(255, 120, 120, 0.1));
            color: #ffe1e1;
        }

        .danger-action:hover {
            border-color: rgba(255, 120, 120, 0.58);
            background: rgba(255, 120, 120, 0.16);
        }

        .modal-actions button:disabled {
            cursor: not-allowed;
            opacity: 0.62;
        }

        .project-name-input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            font: inherit;
        }

        .project-name-input:focus {
            border-color: rgba(212, 168, 67, 0.6);
            box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.12);
        }

        .stage2-element-builder {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
        }

        .stage2-push-button {
            width: 42px;
            height: 42px;
            border: 1px solid rgba(212, 168, 67, 0.45);
            border-radius: 12px;
            background: rgba(212, 168, 67, 0.14);
            color: var(--accent);
            font-size: 16px;
            font-weight: 800;
            line-height: 1;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .stage2-push-button:hover {
            transform: translateY(-1px);
            background: rgba(212, 168, 67, 0.2);
            border-color: rgba(212, 168, 67, 0.6);
        }

        .stage2-push-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stage2-element-list {
            display: grid;
            gap: 8px;
            max-height: 260px;
            overflow: auto;
            padding: 4px;
        }

        .stage2-element-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .stage2-element-row.dragging {
            opacity: 0.6;
        }

        .stage2-element-row.drag-over {
            border-color: rgba(212, 168, 67, 0.7);
            background: rgba(212, 168, 67, 0.1);
        }

        .stage2-element-name {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            word-break: break-word;
        }

        .stage2-element-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .stage2-icon-button {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .stage2-icon-button:hover {
            transform: translateY(-1px);
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.45);
            color: var(--text-primary);
        }

        .stage2-icon-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .stage2-empty-state {
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 13px;
            text-align: center;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .primary-action,
        .secondary-action {
            padding: 11px 14px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .primary-action {
            border: 1px solid rgba(212, 168, 67, 0.5);
            background: rgba(212, 168, 67, 0.18);
            color: var(--text-primary);
        }

        .secondary-action {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
        }

        .primary-action:hover,
        .secondary-action:hover {
            transform: translateY(-1px);
        }

        .primary-action:disabled,
        .secondary-action:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        .creation-status {
            display: grid;
            gap: 12px;
            justify-items: center;
            padding: 10px 0;
            text-align: center;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid rgba(212, 168, 67, 0.18);
            border-top-color: var(--accent);
            border-radius: 999px;
            animation: spin 800ms linear infinite;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: var(--accent);
            transition: width 180ms ease;
        }

        .error-box {
            padding: 12px 13px;
            border: 1px solid rgba(244, 67, 54, 0.36);
            border-radius: 12px;
            background: rgba(244, 67, 54, 0.08);
            color: #ffb4ae;
            font-size: 13px;
            line-height: 1.6;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .app-shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr) 320px;
            position: relative;
            width: 100%;
            height: 100vh;
            background: var(--bg);
        }

        .app-shell * {
            min-width: 0;
        }

        .left-sidebar,
        .right-sidebar,
        .center-panel {
            min-height: 0;
        }

        .left-sidebar,
        .right-sidebar {
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #313131 transparent;
        }

        .left-sidebar::-webkit-scrollbar,
        .right-sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .left-sidebar::-webkit-scrollbar-thumb,
        .right-sidebar::-webkit-scrollbar-thumb {
            background: #313131;
            border-radius: 999px;
        }

        .left-sidebar {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 16px;
            padding: 24px 18px;
            background: var(--left-sidebar);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .brand-block {
            display: grid;
            gap: 12px;
        }

        .brand-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: start;
        }

        .brand-label {
            margin: 0;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        .stage2-menu-wrap {
            position: relative;
        }

        .stage2-gear-button {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease;
        }

        .stage2-gear-button:hover,
        .stage2-gear-button:focus-visible {
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.4);
            outline: none;
        }

        .stage2-gear-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            z-index: 15;
            width: 240px;
            display: grid;
            gap: 6px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #181818;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
        }

        .stage2-menu-divider {
            height: 1px;
            margin: 2px 0;
            background: var(--border);
        }

        .stage2-menu-item {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease;
        }

        .stage2-menu-item:hover,
        .stage2-menu-item:focus-visible {
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.35);
            outline: none;
        }

        .stage2-menu-item.is-danger {
            color: #ffb8b8;
        }

        .stage2-menu-item.is-danger:hover,
        .stage2-menu-item.is-danger:focus-visible {
            border-color: rgba(255, 120, 120, 0.42);
            background: rgba(255, 120, 120, 0.08);
        }

        .stage2-menu-item:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .new-project-button {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(212, 168, 67, 0.35);
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.18), rgba(212, 168, 67, 0.08));
            color: var(--text-primary);
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
        }

        .new-project-button:hover {
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.24), rgba(212, 168, 67, 0.1));
            border-color: rgba(212, 168, 67, 0.5);
        }

        .project-section {
            display: grid;
            gap: 12px;
            min-height: 0;
        }

        .project-navigation-section {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 2px;
            scrollbar-width: thin;
            scrollbar-color: #313131 transparent;
        }

        .project-navigation-section::-webkit-scrollbar {
            width: 6px;
        }

        .project-navigation-section::-webkit-scrollbar-thumb {
            background: #313131;
            border-radius: 999px;
        }

        .auth-section {
            align-self: end;
            min-height: 0;
        }

        .auth-section .section-heading {
            display: none;
        }

        .section-heading {
            margin: 0;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .project-list-placeholder {
            padding: 16px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .project-accordion-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .project-accordion {
            flex: 0 0 auto;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
        }

        .project-accordion.is-current {
            border-color: rgba(212, 168, 67, 0.32);
            background: rgba(212, 168, 67, 0.045);
        }

        .project-accordion-header {
            width: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 12px;
            border: 0;
            background: transparent;
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
        }

        .project-accordion-header:hover {
            background: var(--hover);
        }

        .project-title {
            display: block;
            overflow: hidden;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 800;
            line-height: 1.35;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-meta {
            display: block;
            margin-top: 3px;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            line-height: 1.4;
        }

        .project-toggle {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 800;
        }

        .project-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 0 10px 10px;
        }

        .project-action-button {
            width: 34px;
            height: 34px;
            display: inline-grid;
            place-items: center;
            padding: 0;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 800;
            line-height: 1;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
        }

        .project-action-button:hover,
        .project-action-button:focus-visible {
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.4);
            outline: none;
        }

        .project-action-button.is-danger {
            color: #ffb8b8;
        }

        .project-action-button.is-danger:hover,
        .project-action-button.is-danger:focus-visible {
            border-color: rgba(255, 120, 120, 0.45);
            background: rgba(255, 120, 120, 0.08);
        }

        .project-phases {
            display: grid;
            gap: 12px;
            padding: 0 10px 12px;
        }

        .phase-group {
            display: grid;
            gap: 6px;
        }

        .phase-label {
            margin: 0;
            padding: 2px 4px;
            color: var(--text-secondary);
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .task-nav-button {
            width: 100%;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 9px;
            align-items: start;
            padding: 9px 10px 9px 12px;
            border: 1px solid transparent;
            border-left: 3px solid transparent;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.025);
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
        }

        .task-nav-button:hover {
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.24);
        }

        .task-nav-button.is-active {
            border-left-color: var(--accent);
            background: rgba(212, 168, 67, 0.1);
        }

        .task-nav-button.is-locked {
            color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.56;
        }

        .task-status-icon {
            font-size: 12px;
            line-height: 1.6;
        }

        .task-nav-title {
            display: block;
            color: inherit;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.35;
        }

        .task-nav-subtitle {
            display: block;
            margin-top: 2px;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 700;
            line-height: 1.35;
        }

        .locked-task-message {
            padding: 10px 11px;
            border: 1px solid rgba(212, 168, 67, 0.24);
            border-radius: 12px;
            background: rgba(212, 168, 67, 0.07);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.5;
        }

        .status-card {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.025);
            display: grid;
            gap: 12px;
        }

        .auth-section .status-card {
            padding: 0;
            gap: 0;
            overflow: hidden;
            background: rgba(20, 20, 20, 0.96);
            box-shadow: 0 -14px 30px rgba(0, 0, 0, 0.18);
        }

        .simple-sign-out-button {
            width: 100%;
            padding: 11px 12px;
            border: 0;
            background: transparent;

        function getStaticTaskDefinition(taskId) {
            return TASK_DEFINITIONS.find((task) => task.taskId === Number(taskId)) || null;
        }

        function formatLessonNumber(taskId) {
            return `LESSON ${taskId}`;
        }

        function normalizeStage2State(stage2) {
            const rawElements = Array.isArray(stage2?.elements) ? stage2.elements : [];
            const uniqueNameKeys = new Set();
            const elements = rawElements
                .map((elementName) => String(elementName || '').trim())
                .filter(Boolean)
                .filter((elementName) => {
                    const key = elementName.toLowerCase();
                    if (uniqueNameKeys.has(key)) {
                        return false;
                    }

                    uniqueNameKeys.add(key);
                    return true;
                })
                .slice(0, MAX_STAGE2_ELEMENTS);

            const taskTabIds = Object.entries(stage2?.taskTabIds || {}).reduce((accumulator, [taskIdKey, tabId]) => {
                const numericTaskId = Number(taskIdKey);
                const safeTabId = String(tabId || '').trim();

                if (Number.isFinite(numericTaskId) && safeTabId) {
                    accumulator[String(numericTaskId)] = safeTabId;
                }

                return accumulator;
            }, {});

            const generatedTabIds = Array.from(new Set(
                (Array.isArray(stage2?.generatedTabIds) ? stage2.generatedTabIds : [])
                    .map((tabId) => String(tabId || '').trim())
                    .filter(Boolean)
            ));

            return {
                elements,
                taskTabIds,
                generatedTabIds
            };
        }

        function normalizeDraftingState(drafting) {
            const rawAssets = Array.isArray(drafting?.assets) ? drafting.assets : [];
            const uniqueAssetKeys = new Set();
            const assets = rawAssets
                .map((assetName) => String(assetName || '').trim())
                .filter(Boolean)
                .filter((assetName) => {
                    const key = assetName.toLowerCase();

                    if (uniqueAssetKeys.has(key)) {
                        return false;
                    }

                    uniqueAssetKeys.add(key);
                    return true;
                })
                .slice(0, MAX_DRAFT_ASSETS);

            const assetAssignments = Object.entries(drafting?.assetAssignments || {}).reduce((accumulator, [funnelItemName, itemAssets]) => {
                const safeFunnelItemName = String(funnelItemName || '').trim();

                if (!safeFunnelItemName) {
                    return accumulator;
                }

                const uniqueAssignmentKeys = new Set();
                const normalizedAssets = (Array.isArray(itemAssets) ? itemAssets : [])
                    .map((assetName) => String(assetName || '').trim())
                    .filter(Boolean)
                    .filter((assetName) => {
                        const key = assetName.toLowerCase();

                        if (uniqueAssignmentKeys.has(key)) {
                            return false;
                        }

                        uniqueAssignmentKeys.add(key);
                        return true;
                    })
                    .slice(0, MAX_DRAFT_ASSETS);

                if (normalizedAssets.length) {
                    accumulator[safeFunnelItemName] = normalizedAssets;
                }

                return accumulator;
            }, {});

            const generatedTabIds = Array.from(new Set(
                (Array.isArray(drafting?.generatedTabIds) ? drafting.generatedTabIds : [])
                    .map((tabId) => String(tabId || '').trim())
                    .filter(Boolean)
            ));

            const parentTabIds = Object.entries(drafting?.parentTabIds || {}).reduce((accumulator, [elementName, tabId]) => {
                const safeElementName = String(elementName || '').trim();
                const safeTabId = String(tabId || '').trim();

                if (safeElementName && safeTabId) {
                    accumulator[safeElementName] = safeTabId;
                }

                return accumulator;
            }, {});

            return {
                assets,
                assetAssignments,
                generatedTabIds,
                parentTabIds
            };
        }

        function normalizeGwsSession(session) {
            if (!session || typeof session !== 'object') {
                return null;
            }

            const safeSessionId = String(session.sessionId || '').trim();
            const safeProjectId = String(session.projectId || '').trim();
            const safeTaskId = Number(session.taskId) || 0;

            if (!safeSessionId || !safeProjectId || !safeTaskId) {
                return null;
            }

            return {
                sessionId: safeSessionId,
                projectId: safeProjectId,
                taskId: safeTaskId,
                taskTitle: String(session.taskTitle || '').trim(),
                taskDocTabId: String(session.taskDocTabId || '').trim(),
                objective: String(session.objective || '').trim(),
                plannedTasks: Array.isArray(session.plannedTasks)
                    ? session.plannedTasks.map((taskName) => String(taskName || '').trim()).filter(Boolean)
                    : [],
                ritual: {
                    attitude: String(session.ritual?.attitude || '').trim(),
                    hydrated: Boolean(session.ritual?.hydrated),
                    caffeinated: Boolean(session.ritual?.caffeinated),
                    distractionsCleared: Boolean(session.ritual?.distractionsCleared),
                    timerMinutes: Number(session.ritual?.timerMinutes) === 90 ? 90 : 60
                },
                startAt: Number(session.startAt) || 0,
                pauseAt: Number(session.pauseAt) || 0,
                resumeAt: Number(session.resumeAt) || 0,
                endAt: Number(session.endAt) || 0,
                remainingSeconds: Math.max(0, Number(session.remainingSeconds) || 0),
                plannedMinutes: Number(session.plannedMinutes) === 90 ? 90 : 60,
                actualSeconds: Math.max(0, Number(session.actualSeconds) || 0),
                pauseSeconds: Math.max(0, Number(session.pauseSeconds) || 0),
                pauseCount: Math.max(0, Number(session.pauseCount) || 0),
                status: ['running', 'paused', 'completed', 'stopped', 'abandoned'].includes(session.status)
                    ? session.status
                    : 'running',
                checklistSnapshot: Array.isArray(session.checklistSnapshot)
                    ? session.checklistSnapshot.map(Boolean)
                    : [],
                completedChecklistItems: Array.isArray(session.completedChecklistItems)
                    ? session.completedChecklistItems.map((item) => String(item || '').trim()).filter(Boolean)
                    : [],
                achievedTasks: Array.isArray(session.achievedTasks)
                    ? session.achievedTasks.map((item) => String(item || '').trim()).filter(Boolean)
                    : [],
                notes: String(session.notes || '').trim(),
                reviewScore: Number(session.reviewScore) || 0,
                analyze: String(session.analyze || '').trim(),
                quickTweaks: String(session.quickTweaks || '').trim()
            };
        }

        function normalizeGwsState(gws) {
            const activeSession = normalizeGwsSession(gws?.activeSession);
            const sessions = Array.isArray(gws?.sessions)
                ? gws.sessions.map(normalizeGwsSession).filter(Boolean)
                : [];

            return {
                activeSession,
                sessions
            };
        }

        function normalizeGwsWizard(draft) {
            const plannedTasks = Array.isArray(draft?.plannedTasks)
                ? draft.plannedTasks.map((taskName) => String(taskName || '').trim()).filter(Boolean)
                : [];

            return {
                objective: String(draft?.objective || ''),
                plannedTasks,
                attitude: String(draft?.attitude || ''),
                hydrated: Boolean(draft?.hydrated),
                caffeinated: Boolean(draft?.caffeinated),
                distractionsCleared: Boolean(draft?.distractionsCleared),
                timerMinutes: Number(draft?.timerMinutes) === 90 ? 90 : 60
            };
        }

        function getProjectStage2Elements(project) {
            return normalizeStage2State(project?.stage2).elements;
        }

        function getProjectDraftAssets(project) {
            const draftingState = normalizeDraftingState(project?.drafting);
            const assignmentAssets = Object.values(draftingState.assetAssignments || {}).flat();

            if (assignmentAssets.length) {
                const seenKeys = new Set();

                return assignmentAssets.filter((assetName) => {
                    const safeAssetName = String(assetName || '').trim();
                    const key = safeAssetName.toLowerCase();

                    if (!safeAssetName || seenKeys.has(key)) {
                        return false;
                    }

                    seenKeys.add(key);
                    return true;
                });
            }

            return draftingState.assets;
        }

        function getProjectDraftAssetAssignments(project) {
            const draftingState = normalizeDraftingState(project?.drafting);
            const stage2Elements = getProjectStage2Elements(project);
            const assignments = {};

            stage2Elements.forEach((elementName) => {
                const safeElementName = String(elementName || '').trim();

                if (!safeElementName) {
                    return;
                }

                assignments[safeElementName] = [
                    ...(draftingState.assetAssignments[safeElementName] || draftingState.assets || [])
                ];
            });

            return assignments;
        }

        function getProjectTaskDefinitions(project) {
            const stage2Elements = getProjectStage2Elements(project);

            if (!stage2Elements.length) {
                return TASK_DEFINITIONS.map((taskDefinition) => ({
                    ...taskDefinition,
                    sourceTemplateTaskId: taskDefinition.taskId,
                    displayTaskNumber: taskDefinition.taskId,
                    isGeneratedStage2: false
                }));
            }

            const stage2TemplateTasks = STAGE2_TEMPLATE_TASK_IDS
                .map((taskId) => getStaticTaskDefinition(taskId))
                .filter(Boolean);
            const downstreamTemplateTasks = TASK_DEFINITIONS.filter((taskDefinition) => taskDefinition.taskId >= 9);
            const stage2Offset = (stage2Elements.length * STAGE2_TASKS_PER_ELEMENT) - STAGE2_TASKS_PER_ELEMENT;

            const foundationTasks = TASK_DEFINITIONS
                .filter((taskDefinition) => taskDefinition.taskId <= 5)
                .map((taskDefinition) => ({
                    ...taskDefinition,
                    sourceTemplateTaskId: taskDefinition.taskId,
                    displayTaskNumber: taskDefinition.taskId,
                    isGeneratedStage2: false
                }));

            const generatedStage2Tasks = stage2Elements.flatMap((elementName, elementIndex) => (
                stage2TemplateTasks.map((templateTaskDefinition, templateIndex) => {
                    const generatedTaskId = STAGE2_START_TASK_ID + (elementIndex * STAGE2_TASKS_PER_ELEMENT) + templateIndex;

                    return {
                        ...templateTaskDefinition,
                        taskId: generatedTaskId,
                        displayTaskNumber: generatedTaskId,
                        lessonNumber: formatLessonNumber(generatedTaskId),
                        fullDocTitle: `Phase 2 - Task ${generatedTaskId}: ${templateTaskDefinition.shortTitle}`,
                        sourceTemplateTaskId: templateTaskDefinition.taskId,
                        stage2ElementName: elementName,
                        stage2ElementIndex: elementIndex,
                        isGeneratedStage2: true,
                        tabId: ''
                    };
                })
            ));

            const shiftedDownstreamTasks = downstreamTemplateTasks.map((templateTaskDefinition) => {
                const shiftedTaskId = templateTaskDefinition.taskId + stage2Offset;

                return {
                    ...templateTaskDefinition,
                    taskId: shiftedTaskId,
                    displayTaskNumber: shiftedTaskId,
                    lessonNumber: formatLessonNumber(shiftedTaskId),
                    fullDocTitle: `Phase ${templateTaskDefinition.phase} - Task ${shiftedTaskId}: ${templateTaskDefinition.shortTitle}`,
                    sourceTemplateTaskId: templateTaskDefinition.taskId,
                    isGeneratedStage2: false
                };
            });

            return [...foundationTasks, ...generatedStage2Tasks, ...shiftedDownstreamTasks];
        }

        function getTaskDefinition(taskId, project = null) {
            const taskDefinitions = getProjectTaskDefinitions(project);
            return taskDefinitions.find((task) => task.taskId === Number(taskId)) || null;
        }

        function createDefaultProjectTask(taskId, docId = '', taskDefinitionOverride = null, project = null) {
            const taskDefinition = taskDefinitionOverride || getTaskDefinition(taskId, project);

            if (!taskDefinition) {
                throw new Error(`Unknown task definition for task ${taskId}.`);
            }

            return {
                taskId,
                docId,
                completed: false,
                checklist: taskDefinition.checklist.map(() => false)
            };
        }

        function isTaskComplete(task) {
            if (!task || !Array.isArray(task.checklist) || task.checklist.length === 0) {
                return false;
            }

            return Boolean(task.completed) && task.checklist.every(Boolean);
        }

        function isTaskUnlocked(project, taskId) {
            if (!project || !Array.isArray(project.tasks)) {
                return false;
            }

            const taskDefinitions = getProjectTaskDefinitions(project);
            const firstTaskId = taskDefinitions[0]?.taskId;

            if (!Number.isFinite(firstTaskId)) {
                return false;
            }

            if (taskId === firstTaskId) {
                return true;
            }

            return taskDefinitions
                .filter((taskDefinition) => taskDefinition.taskId < taskId)
                .every((taskDefinition) => {
                    const previousTask = project.tasks.find((task) => task.taskId === taskDefinition.taskId);
                    return isTaskComplete(previousTask);
                });
        }

        function getDefaultAppState() {
            return {
                projects: [],
                currentProjectId: null
            };
        }

        function normalizeTaskSelection(taskId, project = null) {
            const normalizedTaskId = Number(taskId);
            const taskDefinitions = getProjectTaskDefinitions(project);
            const fallbackTaskId = taskDefinitions[0]?.taskId || 1;
            return taskDefinitions.some((taskDefinition) => taskDefinition.taskId === normalizedTaskId)
                ? normalizedTaskId
                : fallbackTaskId;
        }

        function normalizeProjectTask(task, taskDefinition) {
            const fallbackTask = createDefaultProjectTask(taskDefinition.taskId, '', taskDefinition);
            const safeChecklist = Array.isArray(task?.checklist)
                ? task.checklist.slice(0, taskDefinition.checklist.length).map(Boolean)
                : [];
            const normalizedChecklist = taskDefinition.checklist.map((_, index) => safeChecklist[index] || false);

            return {
                ...fallbackTask,
                ...(task && typeof task === 'object' ? task : {}),
                taskId: taskDefinition.taskId,
                docId: typeof task?.docId === 'string' ? task.docId : '',
                completed: normalizedChecklist.length > 0 && normalizedChecklist.every(Boolean),
                checklist: normalizedChecklist
            };
        }

        function normalizeProject(project, index) {
            if (!project || typeof project !== 'object') {
                return null;
            }

            const safeId = typeof project.id === 'string' && project.id.trim()
                ? project.id
                : `local-project-${index + 1}`;
            const safeName = typeof project.name === 'string' && project.name.trim()
                ? project.name.trim()
                : `Project ${index + 1}`;
            const stage2 = normalizeStage2State(project.stage2);
            const drafting = normalizeDraftingState(project.drafting);
            const gws = normalizeGwsState(project.gws);
            const rawTasks = Array.isArray(project.tasks) ? project.tasks : [];
            const taskDefinitions = getProjectTaskDefinitions({ ...project, stage2 });
            const tasks = taskDefinitions.map((taskDefinition) => {
                const existingTask = rawTasks.find((task) => Number(task?.taskId) === taskDefinition.taskId);
                return normalizeProjectTask(existingTask, taskDefinition);
            });
            const safeLastOpenedTask = normalizeTaskSelection(project.lastOpenedTask, { ...project, stage2 });
            const recoveredLastOpenedTask = isTaskUnlocked({ tasks, stage2 }, safeLastOpenedTask)
                ? safeLastOpenedTask
                : (taskDefinitions[0]?.taskId || 1);

            return {
                id: safeId,
                name: safeName,
                folderId: typeof project.folderId === 'string' ? project.folderId : '',
                projectDocId: typeof project.projectDocId === 'string' ? project.projectDocId : '',
                lastOpenedTask: recoveredLastOpenedTask,
                stage2,
                drafting,
                gws,
                tasks
            };
        }

        function normalizeState(rawState) {
            if (!rawState || typeof rawState !== 'object') {
                return getDefaultAppState();
            }

            const projects = Array.isArray(rawState.projects)
                ? rawState.projects
                    .map(normalizeProject)
                    .filter(Boolean)
                    .filter((project) => !project.id.startsWith('demo-project-'))
                : [];
            const currentProjectId = typeof rawState.currentProjectId === 'string'
                ? rawState.currentProjectId
                : null;
            const hasCurrentProject = projects.some((project) => project.id === currentProjectId);

            return {
                projects,
                currentProjectId: hasCurrentProject ? currentProjectId : (projects[0]?.id || null)
            };
        }

        function loadState() {
            const fallbackState = getDefaultAppState();

            try {
                const rawValue = window.localStorage.getItem(STATE_STORAGE_KEY);

                if (!rawValue) {
                    window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(fallbackState));
                    return fallbackState;
                }

                const normalizedState = normalizeState(JSON.parse(rawValue));

                if (JSON.stringify(normalizedState) !== rawValue) {
                    window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(normalizedState));
                }

                return normalizedState;
            } catch (error) {
                console.warn('Unable to load local app state. Resetting to default.', error);
                window.localStorage.removeItem(STATE_STORAGE_KEY);
                window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(fallbackState));
                return fallbackState;
            }
        }

        function saveState(state) {
            const normalizedState = normalizeState(state);
            window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(normalizedState));
            return normalizedState;
        }

        function getCurrentProject(state) {
            const normalizedState = normalizeState(state);
            return normalizedState.projects.find((project) => project.id === normalizedState.currentProjectId) || null;
        }

            if (!project || !Array.isArray(project.tasks)) {

        function getGoogleDocEditUrl(docId, embedded = false, tabId = '') {
            const safeDocId = String(docId || '').trim();
            const safeTabId = String(tabId || '').trim();

            if (!safeDocId) {
                return '';
            }

            const queryParams = [];

            if (safeTabId) {
                queryParams.push(`tab=${encodeURIComponent(safeTabId)}`);
            }

            if (embedded) {
                queryParams.push('embedded=true');
            }

            return `https://docs.google.com/document/d/${encodeURIComponent(safeDocId)}/edit${queryParams.length ? `?${queryParams.join('&')}` : ''}`;
        }

        function getProjectDocumentReference(project, projectTask, taskDefinition) {
            const projectDocId = typeof project?.projectDocId === 'string'
                ? project.projectDocId.trim()
                : '';
            const taskDocId = typeof projectTask?.docId === 'string'
                ? projectTask.docId.trim()
                : '';
            const stage2TaskTabId = String(project?.stage2?.taskTabIds?.[String(taskDefinition?.taskId)] || '').trim();

            if (projectDocId) {
                return {
                    docId: projectDocId,
                    tabId: stage2TaskTabId || (typeof taskDefinition?.tabId === 'string' ? taskDefinition.tabId : ''),
                    source: 'projectDocId'
                };
            }

            if (taskDocId) {
                return {
                    docId: taskDocId,
                    tabId: '',
                    source: 'legacyTaskDocId'
                };

            return {

                tabId: '',

            };

        function selectProject(state, projectId) {
            const normalizedState = normalizeState(state);
            const hasProject = normalizedState.projects.some((project) => project.id === projectId);

            if (!hasProject) {
                return normalizedState;
            }

            return {
                ...normalizedState,
                currentProjectId: projectId
            };
        }

        function selectTask(state, taskId) {
            const normalizedState = normalizeState(state);
            const currentProject = getCurrentProject(normalizedState);

            if (!currentProject) {

            const safeTaskId = normalizeTaskSelection(taskId, currentProject);

            return {

        function renameProjectInState(state, projectId, nextName) {

            const currentProjectId = normalizedState.currentProjectId === projectId
                ? (projects[0]?.id || null)

        function updateTaskChecklistItem(state, projectId, taskId, checklistIndex, checked) {
            const normalizedState = normalizeState(state);

            return {
                ...normalizedState,
                projects: normalizedState.projects.map((project) => {
                    if (project.id !== projectId) {
                        return project;
                    }

                    let updatedTaskComplete = false;
                    const safeTaskId = normalizeTaskSelection(taskId, project);
                    const nextTasks = project.tasks.map((task) => {
                        if (task.taskId !== safeTaskId) {
                            return task;
                        }

                        const taskDefinition = getTaskDefinition(safeTaskId, project);
                        const nextChecklist = taskDefinition.checklist.map((_, index) => (
                            index === checklistIndex ? Boolean(checked) : Boolean(task.checklist[index])
                        ));
                        updatedTaskComplete = nextChecklist.every(Boolean);

                        return {
                            ...task,
                            checklist: nextChecklist,
                            completed: updatedTaskComplete
                        };
                    });

                    return {
                        ...project,
                        lastOpenedTask: !updatedTaskComplete && project.lastOpenedTask > safeTaskId ? safeTaskId : project.lastOpenedTask,
                        tasks: nextTasks
                    };
                })
            };
        }

        function getProjectTask(project, taskId) {
            if (!project || !Array.isArray(project.tasks)) {
                return null;
            }

            return project.tasks.find((task) => Number(task?.taskId) === Number(taskId)) || null;

            if (!project || !Array.isArray(project.tasks)) {

        function getUniqueProjectName(projectName, reservedNames = []) {
            const safeProjectName = String(projectName || '').trim();

            if (!safeProjectName) {
                return '';
            }

            const reservedNameKeys = new Set(reservedNames.map(normalizeProjectNameKey).filter(Boolean));
            let candidateName = safeProjectName;
            let suffix = 2;

            while (reservedNameKeys.has(normalizeProjectNameKey(candidateName))) {
                candidateName = `${safeProjectName} (${suffix})`;
                suffix += 1;

        async function driveRequest(token, path, options = {}) {
            if (!token?.access_token || isTokenExpired(token)) {
                window.StrategicMarketingBootcampAuthRuntime?.requireReauth('Google access needs to be refreshed before Drive changes. Reconnect Google, then try again.');
                throw new Error('Google access needs to be refreshed. Reconnect Google and try again.');
            }

            const response = await fetch(`${DRIVE_API_BASE_URL}${path}`, {
                ...options,
                headers: {
                    Authorization: `Bearer ${token.access_token}`,
                    ...(options.body ? { 'Content-Type': 'application/json' } : {}),
                    ...(options.headers || {})
                }
            });
            const responseText = await response.text();
            let data = null;

            try {
                data = responseText ? JSON.parse(responseText) : null;
            } catch (error) {
                data = responseText;
            }

            if (!response.ok) {
                if (window.StrategicMarketingBootcampAuthRuntime?.handleApiAuthFailure(response.status)) {
                    throw new Error('Google authorization needs to be refreshed. Reconnect Google and retry.');
                }

                const message = data?.error?.message || data?.message || `Google Drive API request failed with status ${response.status}.`;
                throw new Error(message);
            }

            return data;
        }

        async function findDriveFolder(token, folderName, parentId) {
            const query = [
                `name='${escapeDriveQueryValue(folderName)}'`,
                "mimeType='application/vnd.google-apps.folder'",
                `'${escapeDriveQueryValue(parentId)}' in parents`,
                'trashed=false'
            ].join(' and ');
            const result = await driveRequest(
                token,
                `/files?q=${encodeURIComponent(query)}&spaces=drive&fields=files(id,name)&pageSize=1`
            );

            return result?.files?.[0] || null;
        }

        async function createDriveFolder(token, folderName, parentId) {
            return driveRequest(token, '/files?fields=id,name', {
                method: 'POST',
                body: JSON.stringify({
                    name: folderName,
                    mimeType: 'application/vnd.google-apps.folder',
                    parents: [parentId]
                })
            });
        }

        async function getOrCreateDriveFolder(token, folderName, parentId) {
            const existingFolder = await findDriveFolder(token, folderName, parentId);
            return existingFolder || createDriveFolder(token, folderName, parentId);
        }

        async function getAvailableProjectFolderName(token, projectName, parentId, reservedNames = [], currentFolderId = '') {
            const safeProjectName = String(projectName || '').trim();

            if (!safeProjectName) {
                throw new Error('Project name is required.');
            }

            const reservedNameKeys = new Set(reservedNames.map(normalizeProjectNameKey).filter(Boolean));
            let candidateName = safeProjectName;
            let suffix = 2;

            while (true) {
                if (!reservedNameKeys.has(normalizeProjectNameKey(candidateName))) {
                    const existingFolder = await findDriveFolder(token, candidateName, parentId);

                    if (!existingFolder || existingFolder.id === currentFolderId) {
                        return candidateName;
                    }
                }

                candidateName = `${safeProjectName} (${suffix})`;
                suffix += 1;
            }
        }

        async function copyMasterProjectDoc(token, fileName, folderId) {
            return driveRequest(token, `/files/${encodeURIComponent(MASTER_PROJECT_TEMPLATE_FILE_ID)}/copy?fields=id,name`, {
                method: 'POST',
                body: JSON.stringify({
                    name: fileName,
                    parents: [folderId]
                })
            });
        }

        async function renameDriveFolder(token, folderId, folderName) {
            const safeFolderName = String(folderName || '').trim();

            if (!folderId || !safeFolderName) {
                return null;
            }

            return driveRequest(token, `/files/${encodeURIComponent(folderId)}?fields=id,name`, {
                method: 'PATCH',
                body: JSON.stringify({ name: safeFolderName })

        async function trashDriveFolder(token, folderId) {
            if (!folderId) {
                return null;

            return driveRequest(token, `/files/${encodeURIComponent(folderId)}?fields=id,name,trashed`, {
                method: 'PATCH',

        async function createProjectInDrive(token, projectName, onProgress, reservedProjectNames = []) {
            const safeProjectName = projectName.trim();

            if (!safeProjectName) {
                throw new Error('Project name is required.');
            }

            if (isMasterProjectTemplatePlaceholder()) {
                throw new Error('The master project template ID is still a placeholder. Replace it before creating Drive projects.');
            }

            onProgress?.({ createdCount: 0, message: 'Creating marketing-projects folder...' });
            const rootFolder = await getOrCreateDriveFolder(token, MARKETING_PROJECTS_FOLDER_NAME, 'root');
            onProgress?.({ createdCount: 0, message: 'Checking project name...' });
            const finalProjectName = await getAvailableProjectFolderName(token, safeProjectName, rootFolder.id, reservedProjectNames);
            onProgress?.({
                createdCount: 0,
                message: finalProjectName === safeProjectName
                    ? 'Creating project folder...'
                    : `Creating project folder as "${finalProjectName}" to avoid a duplicate...`
            });
            const projectFolder = await createDriveFolder(token, finalProjectName, rootFolder.id);
            const copiedProjectDoc = await copyMasterProjectDoc(
                token,
                finalProjectName,
                projectFolder.id
            );
            const projectTasks = TASK_DEFINITIONS.map((taskDefinition) => createDefaultProjectTask(taskDefinition.taskId, ''));
            onProgress?.({
                createdCount: 1,
                message: 'Creating your project document... (1/1 file created)'
            });

            return {
                id: createLocalId('project'),
                name: finalProjectName,
                folderId: projectFolder.id,
                projectDocId: copiedProjectDoc.id,
                lastOpenedTask: 1,
                stage2: normalizeStage2State({}),
                drafting: normalizeDraftingState({}),
                gws: normalizeGwsState({}),
                tasks: projectTasks
            };
        }

        function flattenDocumentTabs(tabs = [], parentTabId = '') {
            return tabs.flatMap((tab, index) => {
                const tabId = String(tab?.tabProperties?.tabId || '').trim();
                const title = String(tab?.tabProperties?.title || '').trim();
                const node = {
                    tabId,
                    title,
                    parentTabId: String(tab?.tabProperties?.parentTabId || parentTabId || '').trim(),
                    index
                };
                const children = flattenDocumentTabs(Array.isArray(tab?.childTabs) ? tab.childTabs : [], tabId);
                return [node, ...children];
            }).filter((tab) => tab.tabId);
        }

            return flattenDocumentTabs(Array.isArray(result?.tabs) ? result.tabs : []);

        function buildStage2TabTemplateText(templateTaskDefinition, generatedTaskNumber, elementName) {
            const heading = `Task ${generatedTaskNumber} — ${templateTaskDefinition.shortTitle}`;
            const headerLines = [

        function findTabNodeById(tabs = [], tabId = '') {
            const safeTabId = String(tabId || '').trim();

            if (!safeTabId || !Array.isArray(tabs)) {
                return null;
            }

            for (const tab of tabs) {
                const currentTabId = String(tab?.tabProperties?.tabId || '').trim();

                if (currentTabId === safeTabId) {
                    return tab;
                }

                const nestedMatch = findTabNodeById(tab?.childTabs || [], safeTabId);

                if (nestedMatch) {
                    return nestedMatch;
                }
            }

            return null;
        }

        function buildUpdateFieldsFromObject(source, rootKey = '') {
            const safeSource = source && typeof source === 'object' ? source : {};
            const fields = Object.entries(safeSource)
                .filter(([, value]) => value !== null && value !== undefined)
                .map(([key]) => (rootKey ? `${rootKey}.${key}` : key));

            return fields.join(',');
        }

        function sanitizeTextStyle(style) {
            const safeStyle = style && typeof style === 'object' ? style : {};

            return {
                bold: safeStyle.bold,
                italic: safeStyle.italic,
                underline: safeStyle.underline,
                strikethrough: safeStyle.strikethrough,
                smallCaps: safeStyle.smallCaps,
                backgroundColor: safeStyle.backgroundColor,
                foregroundColor: safeStyle.foregroundColor,
                fontSize: safeStyle.fontSize,
                weightedFontFamily: safeStyle.weightedFontFamily,
                baselineOffset: safeStyle.baselineOffset,
                link: safeStyle.link
            };
        }

        function sanitizeParagraphStyle(style) {
            const safeStyle = style && typeof style === 'object' ? style : {};

            return {
                namedStyleType: safeStyle.namedStyleType,
                alignment: safeStyle.alignment,
                lineSpacing: safeStyle.lineSpacing,
                direction: safeStyle.direction,
                spacingMode: safeStyle.spacingMode,
                spaceAbove: safeStyle.spaceAbove,
                spaceBelow: safeStyle.spaceBelow,
                borderBetween: safeStyle.borderBetween,
                borderTop: safeStyle.borderTop,
                borderBottom: safeStyle.borderBottom,
                borderLeft: safeStyle.borderLeft,
                borderRight: safeStyle.borderRight,
                indentFirstLine: safeStyle.indentFirstLine,
                indentStart: safeStyle.indentStart,
                indentEnd: safeStyle.indentEnd,
                keepLinesTogether: safeStyle.keepLinesTogether,
                keepWithNext: safeStyle.keepWithNext,
                avoidWidowAndOrphan: safeStyle.avoidWidowAndOrphan,
                shading: safeStyle.shading,
                pageBreakBefore: safeStyle.pageBreakBefore
            };
        }

        function getBulletPresetFromListProperties(listProperties = {}) {
            const firstLevel = Array.isArray(listProperties?.nestingLevels) ? listProperties.nestingLevels[0] : null;
            const glyphType = String(firstLevel?.glyphType || '').trim().toUpperCase();
            const glyphSymbol = String(firstLevel?.glyphSymbol || '').trim();

            if (glyphSymbol.includes('☐') || glyphSymbol.includes('✅') || glyphSymbol.includes('☑') || glyphSymbol.includes('✓')) {
                return 'BULLET_CHECKBOX';
            }

            if (['DECIMAL', 'ZERO_DECIMAL', 'ALPHA', 'UPPER_ALPHA', 'ROMAN', 'UPPER_ROMAN'].includes(glyphType)) {
                return 'NUMBERED_DECIMAL_ALPHA_ROMAN';
            }

            return 'BULLET_DISC_CIRCLE_SQUARE';
        }

        function buildTabBlueprintFromTemplateTab(templateTab) {
            const bodyContent = Array.isArray(templateTab?.documentTab?.body?.content)
                ? templateTab.documentTab.body.content
                : [];
            const listMap = templateTab?.documentTab?.lists || {};
            const namedStyles = Array.isArray(templateTab?.documentTab?.namedStyles?.styles)
                ? templateTab.documentTab.namedStyles.styles
                : [];

            const textChunks = [];
            const textStyles = [];
            const paragraphStyles = [];
            const bulletRanges = [];

            bodyContent.forEach((block) => {
                const paragraph = block?.paragraph;

                if (!paragraph) {
                    return;
                }

                const paragraphStart = Number(block?.startIndex) || 0;
                const paragraphEnd = Number(block?.endIndex) || 0;

                if (paragraphStart > 0 && paragraphEnd > paragraphStart) {
                    const sanitizedParagraphStyle = sanitizeParagraphStyle(paragraph.paragraphStyle || {});
                    const paragraphFields = buildUpdateFieldsFromObject(sanitizedParagraphStyle, 'paragraphStyle');

                    if (paragraphFields) {
                        paragraphStyles.push({
                            startIndex: paragraphStart,
                            endIndex: paragraphEnd,
                            paragraphStyle: sanitizedParagraphStyle,
                            fields: paragraphFields
                        });
                    }
                }

                if (paragraph?.bullet && paragraphStart > 0 && paragraphEnd > paragraphStart) {
                    const listId = String(paragraph.bullet.listId || '').trim();
                    const listProperties = listMap[listId]?.listProperties || {};

                    bulletRanges.push({
                        startIndex: paragraphStart,
                        endIndex: paragraphEnd,
                        bulletPreset: getBulletPresetFromListProperties(listProperties)
                    });
                }

                const elements = Array.isArray(paragraph?.elements) ? paragraph.elements : [];

                elements.forEach((element) => {
                    const textRun = element?.textRun;
                    const runText = String(textRun?.content || '');

                    if (!runText) {
                        return;
                    }

                    textChunks.push(runText);

                    const runStart = Number(element?.startIndex) || 0;
                    const runEnd = Number(element?.endIndex) || 0;

                    if (runStart > 0 && runEnd > runStart) {
                        const sanitizedTextStyle = sanitizeTextStyle(textRun.textStyle || {});
                        const textFields = buildUpdateFieldsFromObject(sanitizedTextStyle, 'textStyle');

                        if (textFields) {
                            textStyles.push({
                                startIndex: runStart,
                                endIndex: runEnd,
                                textStyle: sanitizedTextStyle,
                                fields: textFields
                            });
                        }
                    }
                });
            });

            const namedStyleUpdates = namedStyles
                .map((namedStyle) => {
                    const safeNamedStyleType = String(namedStyle?.namedStyleType || '').trim();

                    if (!safeNamedStyleType) {
                        return null;
                    }

                    const sanitizedNamedStyle = {
                        namedStyleType: safeNamedStyleType,
                        textStyle: sanitizeTextStyle(namedStyle.textStyle || {}),
                        paragraphStyle: sanitizeParagraphStyle(namedStyle.paragraphStyle || {})
                    };
                    const textStyleFields = buildUpdateFieldsFromObject(sanitizedNamedStyle.textStyle, 'textStyle');
                    const paragraphStyleFields = buildUpdateFieldsFromObject(sanitizedNamedStyle.paragraphStyle, 'paragraphStyle');
                    const fields = [textStyleFields, paragraphStyleFields].filter(Boolean).join(',');

                    if (!fields) {
                        return null;
                    }

                    return {
                        namedStyle: sanitizedNamedStyle,
                        fields
                    };
                })
                .filter(Boolean);

            return {
                text: textChunks.join(''),
                textStyles,
                paragraphStyles,
                bulletRanges,
                namedStyleUpdates
            };
        }

        async function getStage2TemplateBlueprintMap(token) {
            const templateDocument = await docsRequest(
                token,
                `/documents/${encodeURIComponent(MASTER_PROJECT_TEMPLATE_FILE_ID)}?includeTabsContent=true`
            );
            const tabs = Array.isArray(templateDocument?.tabs) ? templateDocument.tabs : [];

            return getStage2TemplateTaskDefinitions().reduce((accumulator, templateTaskDefinition) => {
                const sourceTabId = String(templateTaskDefinition?.tabId || '').trim();

                if (!sourceTabId) {
                    return accumulator;
                }

                const templateTab = findTabNodeById(tabs, sourceTabId);

                if (templateTab) {
                    accumulator[String(templateTaskDefinition.taskId)] = buildTabBlueprintFromTemplateTab(templateTab);
                }

                return accumulator;
            }, {});
        }

        async function applyBlueprintToTab(token, documentId, tabId, templateTaskDefinition, generatedTaskId, blueprint) {
            if (!blueprint || !blueprint.text) {
                throw new Error(
                    `Unable to load template content for Task ${templateTaskDefinition.taskId}. Stage 2 sync stopped to avoid writing incorrect tab content.`
                );
            }

            await insertTabContent(token, documentId, tabId, blueprint.text);

            const stylingRequests = [
                ...blueprint.namedStyleUpdates.map((namedStyleUpdate) => ({
                    updateNamedStyle: {
                        tabId,
                        namedStyle: namedStyleUpdate.namedStyle,
                        fields: namedStyleUpdate.fields
                    }
                })),
                ...blueprint.paragraphStyles.map((paragraphStyleRange) => ({
                    updateParagraphStyle: {
                        range: {
                            tabId,
                            startIndex: paragraphStyleRange.startIndex,
                            endIndex: paragraphStyleRange.endIndex
                        },
                        paragraphStyle: paragraphStyleRange.paragraphStyle,
                        fields: paragraphStyleRange.fields
                    }
                })),
                ...blueprint.textStyles.map((textStyleRange) => ({
                    updateTextStyle: {
                        range: {
                            tabId,
                            startIndex: textStyleRange.startIndex,
                            endIndex: textStyleRange.endIndex
                        },
                        textStyle: textStyleRange.textStyle,
                        fields: textStyleRange.fields
                    }
                })),
                ...blueprint.bulletRanges.map((bulletRange) => ({
                    createParagraphBullets: {
                        range: {
                            tabId,
                            startIndex: bulletRange.startIndex,
                            endIndex: bulletRange.endIndex
                        },
                        bulletPreset: bulletRange.bulletPreset
                    }
                }))
            ];

            if (stylingRequests.length) {
                await docsBatchUpdate(token, documentId, stylingRequests);
            }

            const sourceTaskId = Number(templateTaskDefinition.taskId) || 0;
            const sourceTitle = `Task ${sourceTaskId} — ${templateTaskDefinition.shortTitle}`;
            const targetTitle = `Task ${generatedTaskId} — ${templateTaskDefinition.shortTitle}`;
            const sourceLesson = `LESSON ${sourceTaskId}`;
            const targetLesson = `LESSON ${generatedTaskId}`;

            await docsBatchUpdate(token, documentId, [
                {
                    replaceAllText: {
                        tabsCriteria: { tabIds: [tabId] },
                        containsText: {
                            text: sourceTitle,
                            matchCase: true
                        },
                        replaceText: targetTitle
                    }
                },
                {
                    replaceAllText: {
                        tabsCriteria: { tabIds: [tabId] },
                        containsText: {
                            text: sourceLesson,
                            matchCase: true
                        },
                        replaceText: targetLesson
                    }
                }
            ]);
        }

        async function addDocumentTab(token, documentId, title, options = {}) {
            const parentTabId = String(options?.parentTabId || '').trim();
            const hasIndex = Number.isInteger(options?.index) && options.index >= 0;
            const request = {
                addDocumentTab: {
                    tabProperties: {
                        title,
                        ...(parentTabId ? { parentTabId } : {}),
                        ...(hasIndex ? { index: options.index } : {})
                    }
                }
            };

            const result = await docsBatchUpdate(token, documentId, [request]);
            const addedTab = result?.replies?.[0]?.addDocumentTab?.tabProperties || null;

            if (!addedTab?.tabId) {
                throw new Error(`Unable to create document tab: ${title}`);
            }

            return addedTab;
        }

        async function updateDocumentTabProperties(token, documentId, tabId, properties = {}, fields = '') {
            const safeTabId = String(tabId || '').trim();

            if (!safeTabId) {
                throw new Error('Unable to update document tab without a tab ID.');
            }

            const payload = {
                tabId: safeTabId,
                ...properties
            };
            const resolvedFields = String(fields || '').trim() || Object.keys(properties).join(',');

            if (!resolvedFields) {
                return;
            }

            await docsBatchUpdate(token, documentId, [{
                updateDocumentTabProperties: {
                    tabProperties: payload,
                    fields: resolvedFields
                }
            }]);
        }

        async function updateDocumentTabTitle(token, documentId, tabId, title) {
            await updateDocumentTabProperties(token, documentId, tabId, { title }, 'title');
        }

        async function retitleStage2TabContent(token, documentId, tabId, sourceTaskId, targetTaskId, shortTitle) {
            const safeShortTitle = String(shortTitle || '').trim();

            if (!tabId || !safeShortTitle) {
                return;
            }

            const sourceTitle = `Task ${sourceTaskId} — ${safeShortTitle}`;
            const targetTitle = `Task ${targetTaskId} — ${safeShortTitle}`;
            const sourceLesson = `LESSON ${sourceTaskId}`;
            const targetLesson = `LESSON ${targetTaskId}`;

            await docsBatchUpdate(token, documentId, [
                {
                    replaceAllText: {
                        tabsCriteria: { tabIds: [tabId] },
                        containsText: {
                            text: sourceTitle,
                            matchCase: true
                        },
                        replaceText: targetTitle
                    }
                },
                {
                    replaceAllText: {
                        tabsCriteria: { tabIds: [tabId] },
                        containsText: {
                            text: sourceLesson,
                            matchCase: true
                        },
                        replaceText: targetLesson
                    }
                }
            ]);
        }

        async function deleteDocumentTab(token, documentId, tabId) {

        async function insertTabContent(token, documentId, tabId, text) {
            if (!text) {
                return;

            await docsBatchUpdate(token, documentId, [{
                insertText: {
                    text,
                    endOfSegmentLocation: {

                    }

            }]);

        function isPlaceholderClientId() {
            return GOOGLE_OAUTH_CLIENT_ID.includes('YOUR_GOOGLE_OAUTH_CLIENT_ID');
