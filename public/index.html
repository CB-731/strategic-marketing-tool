<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Marketing Bootcamp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --left-sidebar: #141414;
            --right-sidebar: #141414;
            --center-panel: #1a1a1a;
            --card: #1e1e1e;
            --accent: #d4a843;
            --text-primary: #f0f0f0;
            --text-secondary: #9a9a9a;
            --border: #2a2a2a;
            --hover: rgba(255, 255, 255, 0.04);
            --shadow: rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body,
        #root {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
            background: var(--bg);
            color: var(--text-primary);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        button {
            font: inherit;
        }

        .auth-shell {
            width: 100%;
            height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(212, 168, 67, 0.14), transparent 28%),
                radial-gradient(circle at bottom right, rgba(212, 168, 67, 0.08), transparent 32%),
                var(--bg);
        }

        .auth-card {
            width: min(460px, 100%);
            padding: 34px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.98), rgba(18, 18, 18, 0.98));
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.36);
            display: grid;
            gap: 18px;
        }

        .auth-kicker {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border: 1px solid rgba(212, 168, 67, 0.28);
            border-radius: 999px;
            background: rgba(212, 168, 67, 0.08);
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .auth-card h1 {
            margin: 0;
            font-size: clamp(34px, 6vw, 54px);
            line-height: 0.98;
            letter-spacing: -0.06em;
        }

        .auth-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.75;
        }

        .auth-message {
            padding: 13px 14px;
            border: 1px solid rgba(212, 168, 67, 0.22);
            border-radius: 14px;
            background: rgba(212, 168, 67, 0.06);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.6;
        }

        .google-auth-button {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(212, 168, 67, 0.42);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.2), rgba(212, 168, 67, 0.1));
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .google-auth-button:hover {
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.26), rgba(212, 168, 67, 0.14));
            border-color: rgba(212, 168, 67, 0.56);
            transform: translateY(-1px);
        }

        .google-auth-button:disabled,
        .mini-button:disabled,
        .task-pill:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        .new-project-button {
            cursor: pointer;
        }

        .scope-list {
            margin: 0;
            padding-left: 18px;
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.8;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(10px);
        }

        .onboarding-modal {
            width: min(480px, 100%);
            padding: 28px;
            border: 1px solid rgba(212, 168, 67, 0.28);
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.98), rgba(18, 18, 18, 0.98));
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
            display: grid;
            gap: 16px;
        }

        .onboarding-modal h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .onboarding-modal p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.7;
        }

        .delete-modal {
            max-width: 480px;
        }

        .delete-modal-warning {
            padding: 13px 14px;
            border: 1px solid rgba(255, 120, 120, 0.24);
            border-radius: 14px;
            background: rgba(255, 120, 120, 0.08);
            color: #ffd1d1;
            font-size: 13px;
            line-height: 1.6;
        }

        .danger-action {
            border-color: rgba(255, 120, 120, 0.4);
            background: linear-gradient(180deg, rgba(255, 120, 120, 0.24), rgba(255, 120, 120, 0.1));
            color: #ffe1e1;
        }

        .danger-action:hover {
            border-color: rgba(255, 120, 120, 0.58);
            background: rgba(255, 120, 120, 0.16);
        }

        .modal-actions button:disabled {
            cursor: not-allowed;
            opacity: 0.62;
        }

        .project-name-input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            font: inherit;
        }

        .project-name-input:focus {
            border-color: rgba(212, 168, 67, 0.6);
            box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.12);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .primary-action,
        .secondary-action {
            padding: 11px 14px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .primary-action {
            border: 1px solid rgba(212, 168, 67, 0.5);
            background: rgba(212, 168, 67, 0.18);
            color: var(--text-primary);
        }

        .secondary-action {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
        }

        .primary-action:hover,
        .secondary-action:hover {
            transform: translateY(-1px);
        }

        .primary-action:disabled,
        .secondary-action:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        .creation-status {
            display: grid;
            gap: 12px;
            justify-items: center;
            padding: 10px 0;
            text-align: center;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid rgba(212, 168, 67, 0.18);
            border-top-color: var(--accent);
            border-radius: 999px;
            animation: spin 800ms linear infinite;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: var(--accent);
            transition: width 180ms ease;
        }

        .error-box {
            padding: 12px 13px;
            border: 1px solid rgba(244, 67, 54, 0.36);
            border-radius: 12px;
            background: rgba(244, 67, 54, 0.08);
            color: #ffb4ae;
            font-size: 13px;
            line-height: 1.6;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .app-shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr) 320px;
            position: relative;
            width: 100%;
            height: 100vh;
            background: var(--bg);
        }

        .app-shell * {
            min-width: 0;
        }

        .left-sidebar,
        .right-sidebar,
        .center-panel {
            min-height: 0;
        }

        .left-sidebar,
        .right-sidebar {
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #313131 transparent;
        }

        .left-sidebar::-webkit-scrollbar,
        .right-sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .left-sidebar::-webkit-scrollbar-thumb,
        .right-sidebar::-webkit-scrollbar-thumb {
            background: #313131;
            border-radius: 999px;
        }

        .left-sidebar {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 16px;
            padding: 24px 18px;
            background: var(--left-sidebar);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .brand-block {
            display: grid;
            gap: 12px;
        }

        .brand-label {
            margin: 0;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        .new-project-button {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(212, 168, 67, 0.35);
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.18), rgba(212, 168, 67, 0.08));
            color: var(--text-primary);
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
        }

        .new-project-button:hover {
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.24), rgba(212, 168, 67, 0.1));
            border-color: rgba(212, 168, 67, 0.5);
        }

        .project-section {
            display: grid;
            gap: 12px;
            min-height: 0;
        }

        .project-navigation-section {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 2px;
            scrollbar-width: thin;
            scrollbar-color: #313131 transparent;
        }

        .project-navigation-section::-webkit-scrollbar {
            width: 6px;
        }

        .project-navigation-section::-webkit-scrollbar-thumb {
            background: #313131;
            border-radius: 999px;
        }

        .auth-section {
            align-self: end;
            min-height: 0;
        }

        .auth-section .section-heading {
            display: none;
        }

        .section-heading {
            margin: 0;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .project-list-placeholder {
            padding: 16px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .project-accordion-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .project-accordion {
            flex: 0 0 auto;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
        }

        .project-accordion.is-current {
            border-color: rgba(212, 168, 67, 0.32);
            background: rgba(212, 168, 67, 0.045);
        }

        .project-accordion-header {
            width: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 12px;
            border: 0;
            background: transparent;
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
        }

        .project-accordion-header:hover {
            background: var(--hover);
        }

        .project-title {
            display: block;
            overflow: hidden;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 800;
            line-height: 1.35;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-meta {
            display: block;
            margin-top: 3px;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            line-height: 1.4;
        }

        .project-toggle {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 800;
        }

        .project-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 0 10px 10px;
        }

        .project-action-button {
            width: 34px;
            height: 34px;
            display: inline-grid;
            place-items: center;
            padding: 0;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 800;
            line-height: 1;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
        }

        .project-action-button:hover,
        .project-action-button:focus-visible {
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.4);
            outline: none;
        }

        .project-action-button.is-danger {
            color: #ffb8b8;
        }

        .project-action-button.is-danger:hover,
        .project-action-button.is-danger:focus-visible {
            border-color: rgba(255, 120, 120, 0.45);
            background: rgba(255, 120, 120, 0.08);
        }

        .project-phases {
            display: grid;
            gap: 12px;
            padding: 0 10px 12px;
        }

        .phase-group {
            display: grid;
            gap: 6px;
        }

        .phase-label {
            margin: 0;
            padding: 2px 4px;
            color: var(--text-secondary);
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .task-nav-button {
            width: 100%;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 9px;
            align-items: start;
            padding: 9px 10px 9px 12px;
            border: 1px solid transparent;
            border-left: 3px solid transparent;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.025);
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
        }

        .task-nav-button:hover {
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.24);
        }

        .task-nav-button.is-active {
            border-left-color: var(--accent);
            background: rgba(212, 168, 67, 0.1);
        }

        .task-nav-button.is-locked {
            color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.56;
        }

        .task-status-icon {
            font-size: 12px;
            line-height: 1.6;
        }

        .task-nav-title {
            display: block;
            color: inherit;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.35;
        }

        .task-nav-subtitle {
            display: block;
            margin-top: 2px;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 700;
            line-height: 1.35;
        }

        .locked-task-message {
            padding: 10px 11px;
            border: 1px solid rgba(212, 168, 67, 0.24);
            border-radius: 12px;
            background: rgba(212, 168, 67, 0.07);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.5;
        }

        .status-card {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.025);
            display: grid;
            gap: 12px;
        }

        .auth-section .status-card {
            padding: 0;
            gap: 0;
            overflow: hidden;
            background: rgba(20, 20, 20, 0.96);
            box-shadow: 0 -14px 30px rgba(0, 0, 0, 0.18);
        }

        .simple-sign-out-button {
            width: 100%;
            padding: 11px 12px;
            border: 0;
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-align: left;
            text-transform: uppercase;
            cursor: pointer;
        }

        .simple-sign-out-button:hover {
            background: var(--hover);
            color: var(--accent);
        }

        .auth-refresh-banner {
            position: absolute;
            top: 16px;
            left: 284px;
            right: 344px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(212, 168, 67, 0.28);
            border-radius: 14px;
            background: rgba(20, 20, 20, 0.94);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            color: var(--text-primary);
            font-size: 12px;
            line-height: 1.5;
        }

        .auth-refresh-banner button {
            flex: 0 0 auto;
            padding: 8px 11px;
            border: 1px solid rgba(212, 168, 67, 0.38);
            border-radius: 999px;
            background: rgba(212, 168, 67, 0.1);
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }

        .auth-refresh-banner button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .mini-actions,
        .project-switcher,
        .task-pill-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .mini-button,
        .project-chip,
        .task-pill {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .mini-button,
        .project-chip {
            padding: 9px 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .auth-section .mini-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .auth-section .mini-button {
            width: 100%;
            padding: 8px 10px;
            text-align: center;
        }

        .task-pill {
            padding: 8px 11px;
            font-size: 12px;
            font-weight: 700;
        }

        .mini-button:hover,
        .project-chip:hover,
        .task-pill:hover {
            background: var(--hover);
            border-color: rgba(212, 168, 67, 0.4);
            transform: translateY(-1px);
        }

        .project-chip.is-active,
        .task-pill.is-active {
            border-color: rgba(212, 168, 67, 0.6);
            background: rgba(212, 168, 67, 0.12);
            color: var(--accent);
        }

        .muted-note {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.6;
        }

        .center-panel {
            display: grid;
            padding: 32px;
            background:
                radial-gradient(circle at top left, rgba(212, 168, 67, 0.08), transparent 32%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
                var(--center-panel);
            overflow: hidden;
        }

        .center-panel.is-empty {
            place-items: center;
        }

        .doc-workspace {
            min-width: 0;
            min-height: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: minmax(0, 1fr);
        }

        .open-doc-button {
            padding: 10px 12px;
            border: 1px solid rgba(212, 168, 67, 0.32);
            border-radius: 999px;
            background: rgba(212, 168, 67, 0.08);
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            text-decoration: none;
            transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
        }

        .open-doc-button:hover {
            background: rgba(212, 168, 67, 0.14);
            border-color: rgba(212, 168, 67, 0.52);
            transform: translateY(-1px);
        }

        .floating-open-doc-button {
            position: absolute;
            right: 18px;
            bottom: 18px;
            z-index: 3;
            padding: 12px 15px;
            border-color: rgba(212, 168, 67, 0.5);
            background: rgba(20, 20, 20, 0.86);
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .doc-frame-shell {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(12, 12, 12, 0.92);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.25);
        }

        .doc-frame {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
            background: #ffffff;
        }

        .doc-loading-overlay,
        .doc-fallback-overlay {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(15, 15, 15, 0.86);
            text-align: center;
        }

        .doc-loading-card,
        .doc-fallback-card {
            width: min(360px, 100%);
            display: grid;
            gap: 12px;
            justify-items: center;
            padding: 22px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--card);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.26);
        }

        .doc-loading-card p,
        .doc-fallback-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .center-placeholder {
            width: min(560px, 100%);
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 18px;

        function getTaskDefinition(taskId) {
            return TASK_DEFINITIONS.find((task) => task.taskId === taskId) || null;
        }

        function createDefaultProjectTask(taskId, docId = '') {
            const taskDefinition = getTaskDefinition(taskId);

            if (!taskDefinition) {
                throw new Error(`Unknown task definition for task ${taskId}.`);
            }

            return {
                taskId,
                docId,
                completed: false,
                checklist: taskDefinition.checklist.map(() => false)
            };
        }

        function isTaskComplete(task) {
            if (!task || !Array.isArray(task.checklist) || task.checklist.length === 0) {
                return false;
            }

            return Boolean(task.completed) && task.checklist.every(Boolean);
        }

        function isTaskUnlocked(project, taskId) {
            if (taskId === 1) {
                return true;
            }

            if (!project || !Array.isArray(project.tasks)) {
                return false;
            }

            return TASK_DEFINITIONS
                .filter((taskDefinition) => taskDefinition.taskId < taskId)
                .every((taskDefinition) => {
                    const previousTask = project.tasks.find((task) => task.taskId === taskDefinition.taskId);
                    return isTaskComplete(previousTask);
                });
        }

        function getDefaultAppState() {
            return {
                projects: [],
                currentProjectId: null
            };
        }

        function normalizeTaskSelection(taskId) {
            const normalizedTaskId = Number(taskId);
            return getTaskDefinition(normalizedTaskId) ? normalizedTaskId : 1;
        }

        function normalizeProjectTask(task, taskDefinition) {
            const fallbackTask = createDefaultProjectTask(taskDefinition.taskId, '');
            const safeChecklist = Array.isArray(task?.checklist)
                ? task.checklist.slice(0, taskDefinition.checklist.length).map(Boolean)
                : [];
            const normalizedChecklist = taskDefinition.checklist.map((_, index) => safeChecklist[index] || false);

            return {
                ...fallbackTask,
                ...(task && typeof task === 'object' ? task : {}),
                taskId: taskDefinition.taskId,
                docId: typeof task?.docId === 'string' ? task.docId : '',
                completed: normalizedChecklist.length > 0 && normalizedChecklist.every(Boolean),
                checklist: normalizedChecklist
            };
        }

        function normalizeProject(project, index) {
            if (!project || typeof project !== 'object') {
                return null;
            }

            const safeId = typeof project.id === 'string' && project.id.trim()
                ? project.id
                : `local-project-${index + 1}`;
            const safeName = typeof project.name === 'string' && project.name.trim()
                ? project.name.trim()
                : `Project ${index + 1}`;
            const rawTasks = Array.isArray(project.tasks) ? project.tasks : [];
            const tasks = TASK_DEFINITIONS.map((taskDefinition) => {
                const existingTask = rawTasks.find((task) => Number(task?.taskId) === taskDefinition.taskId);
                return normalizeProjectTask(existingTask, taskDefinition);
            });
            const safeLastOpenedTask = normalizeTaskSelection(project.lastOpenedTask);
            const recoveredLastOpenedTask = isTaskUnlocked({ tasks }, safeLastOpenedTask)
                ? safeLastOpenedTask
                : 1;

            return {
                id: safeId,
                name: safeName,
                folderId: typeof project.folderId === 'string' ? project.folderId : '',
                projectDocId: typeof project.projectDocId === 'string' ? project.projectDocId : '',
                lastOpenedTask: recoveredLastOpenedTask,
                tasks
            };
        }

        function normalizeState(rawState) {
            if (!rawState || typeof rawState !== 'object') {
                return getDefaultAppState();
            }

            const projects = Array.isArray(rawState.projects)
                ? rawState.projects
                    .map(normalizeProject)
                    .filter(Boolean)
                    .filter((project) => !project.id.startsWith('demo-project-'))
                : [];
            const currentProjectId = typeof rawState.currentProjectId === 'string'
                ? rawState.currentProjectId
                : null;
            const hasCurrentProject = projects.some((project) => project.id === currentProjectId);

            return {
                projects,
                currentProjectId: hasCurrentProject ? currentProjectId : (projects[0]?.id || null)
            };
        }

        function loadState() {
            const fallbackState = getDefaultAppState();

            try {
                const rawValue = window.localStorage.getItem(STATE_STORAGE_KEY);

                if (!rawValue) {
                    window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(fallbackState));
                    return fallbackState;
                }

                const normalizedState = normalizeState(JSON.parse(rawValue));

                if (JSON.stringify(normalizedState) !== rawValue) {
                    window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(normalizedState));
                }

                return normalizedState;
            } catch (error) {
                console.warn('Unable to load local app state. Resetting to default.', error);
                window.localStorage.removeItem(STATE_STORAGE_KEY);
                window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(fallbackState));
                return fallbackState;
            }
        }

        function saveState(state) {
            const normalizedState = normalizeState(state);
            window.localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(normalizedState));
            return normalizedState;
        }

        function getCurrentProject(state) {
            const normalizedState = normalizeState(state);
            return normalizedState.projects.find((project) => project.id === normalizedState.currentProjectId) || null;
        }

        function getCurrentTask(project) {
            if (!project || !Array.isArray(project.tasks)) {
                return null;
            }

            return project.tasks.find((task) => task.taskId === normalizeTaskSelection(project.lastOpenedTask)) || project.tasks[0] || null;
        }

        function getGoogleDocEditUrl(docId, embedded = false, tabId = '') {
            const safeDocId = String(docId || '').trim();
            const safeTabId = String(tabId || '').trim();

            if (!safeDocId) {
                return '';
            }

            const queryParams = [];

            if (safeTabId) {
                queryParams.push(`tab=${encodeURIComponent(safeTabId)}`);
            }

            if (embedded) {
                queryParams.push('embedded=true');
            }

            return `https://docs.google.com/document/d/${encodeURIComponent(safeDocId)}/edit${queryParams.length ? `?${queryParams.join('&')}` : ''}`;
        }

        function getProjectDocumentReference(project, projectTask, taskDefinition) {
            const projectDocId = typeof project?.projectDocId === 'string'
                ? project.projectDocId.trim()
                : '';
            const taskDocId = typeof projectTask?.docId === 'string'
                ? projectTask.docId.trim()
                : '';

            if (projectDocId) {
                return {
                    docId: projectDocId,
                    tabId: typeof taskDefinition?.tabId === 'string' ? taskDefinition.tabId : '',
                    source: 'projectDocId'
                };
            }

            if (taskDocId) {
                return {
                    docId: taskDocId,
                    tabId: '',
                    source: 'legacyTaskDocId'
                };
            }

            return {
                docId: '',
                tabId: '',
                source: 'missing'
            };
        }

        function selectProject(state, projectId) {
            const normalizedState = normalizeState(state);
            const hasProject = normalizedState.projects.some((project) => project.id === projectId);

            if (!hasProject) {
                return normalizedState;
            }

            return {
                ...normalizedState,
                currentProjectId: projectId
            };
        }

        function selectTask(state, taskId) {
            const normalizedState = normalizeState(state);
            const currentProject = getCurrentProject(normalizedState);

            if (!currentProject) {
                return normalizedState;
            }

            const safeTaskId = normalizeTaskSelection(taskId);

            return {
                ...normalizedState,
                projects: normalizedState.projects.map((project) => (
                    project.id === currentProject.id
                        ? { ...project, lastOpenedTask: safeTaskId }
                        : project
                ))
            };
        }

        function renameProjectInState(state, projectId, nextName) {
            const normalizedState = normalizeState(state);
            const safeName = String(nextName || '').trim();

            if (!safeName) {
                return normalizedState;
            }

            return {
                ...normalizedState,
                projects: normalizedState.projects.map((project) => (
                    project.id === projectId ? { ...project, name: safeName } : project
                ))
            };
        }

        function deleteProjectFromState(state, projectId) {
            const normalizedState = normalizeState(state);
            const projects = normalizedState.projects.filter((project) => project.id !== projectId);
            const currentProjectId = normalizedState.currentProjectId === projectId
                ? (projects[0]?.id || null)
                : normalizedState.currentProjectId;

            return normalizeState({ projects, currentProjectId });
        }

        function updateTaskChecklistItem(state, projectId, taskId, checklistIndex, checked) {
            const normalizedState = normalizeState(state);

            return {
                ...normalizedState,
                projects: normalizedState.projects.map((project) => {
                    if (project.id !== projectId) {
                        return project;
                    }

                    let updatedTaskComplete = false;
                    const safeTaskId = normalizeTaskSelection(taskId);
                    const nextTasks = project.tasks.map((task) => {
                        if (task.taskId !== safeTaskId) {
                            return task;
                        }

                        const taskDefinition = getTaskDefinition(safeTaskId);
                        const nextChecklist = taskDefinition.checklist.map((_, index) => (
                            index === checklistIndex ? Boolean(checked) : Boolean(task.checklist[index])
                        ));
                        updatedTaskComplete = nextChecklist.every(Boolean);

                        return {
                            ...task,
                            checklist: nextChecklist,
                            completed: updatedTaskComplete
                        };
                    });

                    return {
                        ...project,
                        lastOpenedTask: !updatedTaskComplete && project.lastOpenedTask > safeTaskId ? safeTaskId : project.lastOpenedTask,
                        tasks: nextTasks
                    };
                })
            };
        }

        function getProjectTask(project, taskId) {
            if (!project || !Array.isArray(project.tasks)) {
                return null;
            }

            return project.tasks.find((task) => Number(task?.taskId) === Number(taskId)) || null;
        }

        function getProjectCompletion(project) {
            if (!project || !Array.isArray(project.tasks)) {
                return { completedCount: 0, totalCount: TASK_DEFINITIONS.length };
            }

            return {
                completedCount: project.tasks.filter(isTaskComplete).length,
                totalCount: TASK_DEFINITIONS.length
            };
        }

        function createLocalId(prefix = 'project') {
            if (window.crypto?.randomUUID) {
                return window.crypto.randomUUID();
            }

            return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        }

        function escapeDriveQueryValue(value) {
            return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        function isMasterProjectTemplatePlaceholder() {
            return MASTER_PROJECT_TEMPLATE_FILE_ID.includes('PASTE_') || MASTER_PROJECT_TEMPLATE_FILE_ID.includes('_HERE');
        }

        function normalizeProjectNameKey(projectName) {
            return String(projectName || '').trim().toLowerCase();
        }

        function getUniqueProjectName(projectName, reservedNames = []) {
            const safeProjectName = String(projectName || '').trim();

            if (!safeProjectName) {
                return '';
            }

            const reservedNameKeys = new Set(reservedNames.map(normalizeProjectNameKey).filter(Boolean));
            let candidateName = safeProjectName;
            let suffix = 2;

            while (reservedNameKeys.has(normalizeProjectNameKey(candidateName))) {
                candidateName = `${safeProjectName} (${suffix})`;
                suffix += 1;
            }

            return candidateName;
        }

        async function driveRequest(token, path, options = {}) {
            if (!token?.access_token || isTokenExpired(token)) {
                window.StrategicMarketingBootcampAuthRuntime?.requireReauth('Google access needs to be refreshed before Drive changes. Reconnect Google, then try again.');
                throw new Error('Google access needs to be refreshed. Reconnect Google and try again.');
            }

            const response = await fetch(`${DRIVE_API_BASE_URL}${path}`, {
                ...options,
                headers: {
                    Authorization: `Bearer ${token.access_token}`,
                    ...(options.body ? { 'Content-Type': 'application/json' } : {}),
                    ...(options.headers || {})
                }
            });
            const responseText = await response.text();
            let data = null;

            try {
                data = responseText ? JSON.parse(responseText) : null;
            } catch (error) {
                data = responseText;
            }

            if (!response.ok) {
                if (window.StrategicMarketingBootcampAuthRuntime?.handleApiAuthFailure(response.status)) {
                    throw new Error('Google authorization needs to be refreshed. Reconnect Google and retry.');
                }

                const message = data?.error?.message || data?.message || `Google Drive API request failed with status ${response.status}.`;
                throw new Error(message);
            }

            return data;
        }

        async function findDriveFolder(token, folderName, parentId) {
            const query = [
                `name='${escapeDriveQueryValue(folderName)}'`,
                "mimeType='application/vnd.google-apps.folder'",
                `'${escapeDriveQueryValue(parentId)}' in parents`,
                'trashed=false'
            ].join(' and ');
            const result = await driveRequest(
                token,
                `/files?q=${encodeURIComponent(query)}&spaces=drive&fields=files(id,name)&pageSize=1`
            );

            return result?.files?.[0] || null;
        }

        async function createDriveFolder(token, folderName, parentId) {
            return driveRequest(token, '/files?fields=id,name', {
                method: 'POST',
                body: JSON.stringify({
                    name: folderName,
                    mimeType: 'application/vnd.google-apps.folder',
                    parents: [parentId]
                })
            });
        }

        async function getOrCreateDriveFolder(token, folderName, parentId) {
            const existingFolder = await findDriveFolder(token, folderName, parentId);
            return existingFolder || createDriveFolder(token, folderName, parentId);
        }

        async function getAvailableProjectFolderName(token, projectName, parentId, reservedNames = [], currentFolderId = '') {
            const safeProjectName = String(projectName || '').trim();

            if (!safeProjectName) {
                throw new Error('Project name is required.');
            }

            const reservedNameKeys = new Set(reservedNames.map(normalizeProjectNameKey).filter(Boolean));
            let candidateName = safeProjectName;
            let suffix = 2;

            while (true) {
                if (!reservedNameKeys.has(normalizeProjectNameKey(candidateName))) {
                    const existingFolder = await findDriveFolder(token, candidateName, parentId);

                    if (!existingFolder || existingFolder.id === currentFolderId) {
                        return candidateName;
                    }
                }

                candidateName = `${safeProjectName} (${suffix})`;
                suffix += 1;
            }
        }

        async function copyMasterProjectDoc(token, fileName, folderId) {
            return driveRequest(token, `/files/${encodeURIComponent(MASTER_PROJECT_TEMPLATE_FILE_ID)}/copy?fields=id,name`, {
                method: 'POST',
                body: JSON.stringify({
                    name: fileName,
                    parents: [folderId]
                })
            });
        }

        async function renameDriveFolder(token, folderId, folderName) {
            const safeFolderName = String(folderName || '').trim();

            if (!folderId || !safeFolderName) {
                return null;
            }

            return driveRequest(token, `/files/${encodeURIComponent(folderId)}?fields=id,name`, {
                method: 'PATCH',
                body: JSON.stringify({ name: safeFolderName })
            });
        }

        async function trashDriveFolder(token, folderId) {
            if (!folderId) {
                return null;
            }

            return driveRequest(token, `/files/${encodeURIComponent(folderId)}?fields=id,name,trashed`, {
                method: 'PATCH',
                body: JSON.stringify({ trashed: true })
            });
        }

        async function createProjectInDrive(token, projectName, onProgress, reservedProjectNames = []) {
            const safeProjectName = projectName.trim();

            if (!safeProjectName) {
                throw new Error('Project name is required.');
            }

            if (isMasterProjectTemplatePlaceholder()) {
                throw new Error('The master project template ID is still a placeholder. Replace it before creating Drive projects.');
            }

            onProgress?.({ createdCount: 0, message: 'Creating marketing-projects folder...' });
            const rootFolder = await getOrCreateDriveFolder(token, MARKETING_PROJECTS_FOLDER_NAME, 'root');
            onProgress?.({ createdCount: 0, message: 'Checking project name...' });
            const finalProjectName = await getAvailableProjectFolderName(token, safeProjectName, rootFolder.id, reservedProjectNames);
            onProgress?.({
                createdCount: 0,
                message: finalProjectName === safeProjectName
                    ? 'Creating project folder...'
                    : `Creating project folder as "${finalProjectName}" to avoid a duplicate...`
            });
            const projectFolder = await createDriveFolder(token, finalProjectName, rootFolder.id);
            const copiedProjectDoc = await copyMasterProjectDoc(
                token,
                finalProjectName,
                projectFolder.id
            );
            const projectTasks = TASK_DEFINITIONS.map((taskDefinition) => createDefaultProjectTask(taskDefinition.taskId, ''));
            onProgress?.({
                createdCount: 1,
                message: 'Creating your project document... (1/1 file created)'
            });

            return {
                id: createLocalId('project'),
                name: finalProjectName,
                folderId: projectFolder.id,
                projectDocId: copiedProjectDoc.id,
                lastOpenedTask: 1,
                tasks: projectTasks
            };
        }

        function isPlaceholderClientId() {
            return GOOGLE_OAUTH_CLIENT_ID.includes('YOUR_GOOGLE_OAUTH_CLIENT_ID');

        function normalizeAuthToken(token) {
            if (!token || typeof token !== 'object' || typeof token.access_token !== 'string' || !token.access_token.trim()) {
                return null;
            }

            return {
                access_token: token.access_token,
                token_type: typeof token.token_type === 'string' ? token.token_type : 'Bearer',
                scope: typeof token.scope === 'string' ? token.scope : GOOGLE_OAUTH_SCOPES,
                expires_in: Number(token.expires_in) || 0,
                issued_at: Number(token.issued_at) || Date.now()
            };
        }

        function loadAuthToken() {
            try {
                const rawValue = window.localStorage.getItem(AUTH_STORAGE_KEY);
                if (!rawValue) {
                    return null;
                }

                const normalizedToken = normalizeAuthToken(JSON.parse(rawValue));

                if (!normalizedToken) {
                    window.localStorage.removeItem(AUTH_STORAGE_KEY);
                }

                return normalizedToken;
            } catch (error) {
                console.warn('Unable to load auth token from localStorage.', error);
                window.localStorage.removeItem(AUTH_STORAGE_KEY);
                return null;
            }
        }

        function saveAuthToken(token) {
            const normalizedToken = normalizeAuthToken(token);

            if (!normalizedToken) {
                throw new Error('Cannot save an invalid auth token.');
            }

            window.localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(normalizedToken));
            return normalizedToken;
        }

        function clearAuthToken() {
            window.localStorage.removeItem(AUTH_STORAGE_KEY);
        }

        function isTokenExpired(token) {
            if (!token || !token.issued_at || !token.expires_in) {
                return true;
            }

            const expiresAt = token.issued_at + (token.expires_in * 1000);
            return Date.now() >= (expiresAt - TOKEN_EXPIRY_BUFFER_MS);
        }

        function isRememberedAuthExpired(token) {
            if (!token?.issued_at) {
                return true;
            }

            return Date.now() >= (token.issued_at + AUTH_REMEMBER_DURATION_MS);
        }

        function isAuthFailureStatus(status) {
            return status === 401 || status === 403;
        }

        const INITIAL_STORED_AUTH_TOKEN = loadAuthToken();
        const INITIAL_AUTH_TOKEN = INITIAL_STORED_AUTH_TOKEN && !isRememberedAuthExpired(INITIAL_STORED_AUTH_TOKEN)
            ? INITIAL_STORED_AUTH_TOKEN
            : null;
        const INITIAL_AUTH_NOTICE = INITIAL_STORED_AUTH_TOKEN && isRememberedAuthExpired(INITIAL_STORED_AUTH_TOKEN)

                if (!embeddedDocUrl) {
                    setIsFrameLoading(false);
                    setShowFrameFallback(false);
                    return undefined;
                }

                setIsFrameLoading(true);
                setShowFrameFallback(false);

                fallbackTimerRef.current = window.setTimeout(() => {
                    setShowFrameFallback(true);
                }, 8000);

                return () => {
                    if (fallbackTimerRef.current) {
                        window.clearTimeout(fallbackTimerRef.current);
                    }
                };
            }, [embeddedDocUrl]);

            if (!currentProject) {
                return (
                    <div className="center-placeholder">
                        <div className="placeholder-kicker">Task Workspace</div>
                        <h2>Select a task to begin</h2>
                        <p>
                            Create a project first, then choose an unlocked task from the left sidebar to load its Google Doc here.
                        </p>
                    </div>
                );
            }

            if (!currentTask || !currentTaskDefinition || !embeddedDocUrl) {
                const isOneDocProject = Boolean(currentProject.projectDocId);

                return (
                    <div className="center-placeholder recovery-card">
                        <div className="placeholder-kicker">Recovery State</div>
                        <h2>{isOneDocProject ? 'Project document is missing' : 'Task document is missing'}</h2>
                        <p>
                            {isOneDocProject
                                ? 'This project exists, but its project-level Google Doc ID is missing or invalid. Create a new project or restore this project from a valid saved state.'
                                : 'This legacy project exists, but the selected task is missing its Google Doc ID. Create a new project or restore this project from a valid saved state.'}
                        </p>
                        <div className="recovery-actions">
                            <span className="recovery-action-link">Use + New Project in the sidebar</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="doc-workspace">
                    <div className="doc-frame-shell">
                        <iframe
                            className="doc-frame"
                            key={embeddedDocUrl}
                            title={`${currentProject.name} — ${currentTaskDefinition.fullDocTitle}`}
                            src={embeddedDocUrl}
                            onLoad={() => {
                                if (fallbackTimerRef.current) {
                                    window.clearTimeout(fallbackTimerRef.current);
                                }

                                setIsFrameLoading(false);
                                setShowFrameFallback(false);
                            }}
                        ></iframe>

                        <a className="open-doc-button floating-open-doc-button" href={docUrl} target="_blank" rel="noopener noreferrer">
                            Open in Google Docs ↗
                        </a>

                        {isFrameLoading && (
                            <div className="doc-loading-overlay" aria-live="polite">
                                <div className="doc-loading-card">
                                    <div className="spinner" aria-hidden="true"></div>
                                    <p>Loading {currentTaskDefinition.fullDocTitle}...</p>
                                </div>
                            </div>
                        )}

                        {showFrameFallback && (
                            <div className="doc-fallback-overlay" aria-live="polite">
                                <div className="doc-fallback-card">
                                    <p>If Google Docs is blocked in the iframe, open the task directly in Google Docs.</p>
                                    <a className="open-doc-button" href={docUrl} target="_blank" rel="noopener noreferrer">
                                        Open in Google Docs ↗
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

                <section className={`guidance-block is-${variant}`}>
                    <h3>{title}</h3>
                    {children}
                </section>

            }

                <section className="guidance-card checklist-card">
                    <div className="checklist-header">

                        <span className="checklist-count">{checkedCount}/{totalCount}</span>
                    </div>

                    <div className="checklist-progress-track" aria-hidden="true">

                    </div>

                    <div className="checklist-items">
                        {currentTaskDefinition.checklist.map((item, index) => {
                            const isChecked = Boolean(currentTask.checklist[index]);

                            return (
                                <label className={`checklist-item ${isChecked ? 'is-checked' : ''}`} key={`${currentTaskDefinition.taskId}-checklist-${index}`}>
                                    <input
                                        type="checkbox"
                                        checked={isChecked}
                                        onChange={(event) => onToggleChecklistItem(index, event.target.checked)}

                                    <span className="custom-checkbox" aria-hidden="true">{isChecked ? '✓' : ''}</span>
                                    <span>{item}</span>

        function GuidancePanel({ currentTask, currentTaskDefinition, onOpenDiagram, onToggleChecklistItem }) {
            const [hasDiagramError, setHasDiagramError] = useState(false);

            useEffect(() => {
                setHasDiagramError(false);
            }, [currentTaskDefinition?.taskId]);

            if (!currentTaskDefinition) {
                return (
                    <div className="guidance-card">
                        <h3>Task guidance will appear here</h3>
                        <p>Select a task to load lesson guidance.</p>

            return (
                <div className="task-guidance">
                    <section className="guidance-card guidance-header">
                        <div className="guidance-kicker">{currentTaskDefinition.lessonNumber}</div>
                        <h2>{currentTaskDefinition.shortTitle}</h2>
                        <p className="guidance-tagline">{currentTaskDefinition.tagline}</p>

                    <TaskChecklist
                        currentTask={currentTask}
                        currentTaskDefinition={currentTaskDefinition}

                            {currentTaskDefinition.what.map((item) => <li key={item}>{item}</li>)}
                        </ul>
                    </GuidanceBlock>

                    <GuidanceBlock title="Why" variant="why">
                        <p>{currentTaskDefinition.why}</p>
                    </GuidanceBlock>

                    <GuidanceBlock title="How" variant="how">
                        <ul className="guidance-bullets">
                            {currentTaskDefinition.how.map((item) => <li key={item}>{item}</li>)}
                        </ul>
                    </GuidanceBlock>

                    <GuidanceBlock title="Mistakes" variant="mistakes">
                        <ul className="guidance-bullets">
                            {currentTaskDefinition.mistakes.map((item) => <li key={item}>{item}</li>)}
                        </ul>
                    </GuidanceBlock>

                    <section className="guidance-card">
                        <h3>Diagram</h3>
                        <div className="diagram-frame">
                            {!hasDiagramError ? (
                                <img
                                    className="diagram-image-clickable"
                                    src={currentTaskDefinition.diagram.src}
                                    alt={currentTaskDefinition.diagram.caption}
                                    onClick={() => onOpenDiagram(currentTaskDefinition)}
                                    onError={() => setHasDiagramError(true)}

                        {hasDiagramError && <p className="diagram-caption">{currentTaskDefinition.diagram.caption}</p>}

                    {(currentTaskDefinition.templateLink || currentTaskDefinition.externalLinks?.length > 0) && (
                        <section className="guidance-card">

                                    <span className="template-label">Template: {currentTaskDefinition.templateLink}</span>

                                {(currentTaskDefinition.externalLinks || []).map((link) => (

                                        className="resource-link"
                                        href={link.url}
                                        key={`${currentTaskDefinition.taskId}-${link.label}`}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                    >
                                        {link.label} ↗
