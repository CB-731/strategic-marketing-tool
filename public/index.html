                    }

                    if (!nextAssetName) {
                        return {
                            ...previousState,
                            error: 'Draft asset names cannot be empty.'
                        };
                    }

                    const currentAssets = Array.isArray(previousState.assetAssignments?.[safeFunnelItemName])
                        ? previousState.assetAssignments[safeFunnelItemName]
                        : [];

                    const duplicateExists = currentAssets.some((assetName, assetIndex) => (
                        assetIndex !== index && String(assetName || '').trim().toLowerCase() === nextAssetName.toLowerCase()
                    ));

                    if (duplicateExists) {
                        return {
                            ...previousState,
                            error: `Duplicate draft asset name found: "${nextAssetName}".`
                        };
                    }

                    didUpdate = true;

                    return {
                        ...previousState,
                        assetAssignments: {
                            ...(previousState.assetAssignments || {}),
                            [safeFunnelItemName]: currentAssets.map((assetName, assetIndex) => (
                                assetIndex === index ? nextAssetName : assetName
                            ))
                        },
                        error: ''
                    };
                });

                return didUpdate;
            };

            const handleDraftAssetAdd = (funnelItemName, value) => {
                const safeFunnelItemName = String(funnelItemName || '').trim();
                const nextAssetName = String(value || '').trim();
                let didAdd = false;

                setDraftAssetsSetupState((previousState) => {
                    if (!safeFunnelItemName) {
                        return previousState;
                    }

                    if (!nextAssetName) {
                        return {
                            ...previousState,
                            error: 'Enter a draft asset name before adding.'
                        };
                    }

                    const currentAssets = Array.isArray(previousState.assetAssignments?.[safeFunnelItemName])
                        ? previousState.assetAssignments[safeFunnelItemName]
                        : [];

                    if (currentAssets.length >= MAX_DRAFT_ASSETS) {
                        return {
                            ...previousState,
                            error: `You can add up to ${MAX_DRAFT_ASSETS} draft assets for ${safeFunnelItemName}.`
                        };
                    }

                    const duplicateExists = currentAssets.some((assetName) => (
                        String(assetName || '').trim().toLowerCase() === nextAssetName.toLowerCase()
                    ));

                    if (duplicateExists) {
                        return {
                            ...previousState,
                            error: `Duplicate draft asset name found: "${nextAssetName}".`
                        };
                    }

                    didAdd = true;

                    return {
                        ...previousState,
                        assetAssignments: {
                            ...(previousState.assetAssignments || {}),
                            [safeFunnelItemName]: [...currentAssets, nextAssetName]
                        },
                        error: ''
                    };
                });

                return didAdd;
            };

            const handleDraftAssetRemove = (funnelItemName, index) => {
                const safeFunnelItemName = String(funnelItemName || '').trim();

                setDraftAssetsSetupState((previousState) => {
                    const currentAssets = Array.isArray(previousState.assetAssignments?.[safeFunnelItemName])
                        ? previousState.assetAssignments[safeFunnelItemName]
                        : [];

                    if (!safeFunnelItemName || !currentAssets.length) {
                        return previousState;
                    }

                    return {
                        ...previousState,
                        assetAssignments: {
                            ...(previousState.assetAssignments || {}),
                            [safeFunnelItemName]: currentAssets.filter((_, assetIndex) => assetIndex !== index)
                        },
                        error: ''
                    };
                });
            };

            const syncDraftingDocumentTabs = async (driveToken, projectBeforeSync, projectAfterSync, assetAssignments) => {
                if (!projectAfterSync.projectDocId) {
                    return normalizeDraftingState(projectAfterSync.drafting);
                }

                const documentId = projectAfterSync.projectDocId;
                const funnelItems = getProjectStage2Elements(projectAfterSync);

                if (!funnelItems.length) {
                    throw new Error('Set Stage 2 funnel elements before configuring draft assets.');
                }

                const validationError = validateDraftAssetAssignments(assetAssignments, funnelItems);

                if (validationError) {
                    throw new Error(validationError);
                }

                const draftingRootTabId = String(getStaticTaskDefinition(9)?.tabId || '').trim();

                if (!draftingRootTabId) {
                    throw new Error('Task 9 drafting tab ID is missing.');
                }

                const existingGeneratedTabIds = [...(projectBeforeSync.drafting?.generatedTabIds || [])].reverse();
                const tabsBeforeCleanup = await listDocumentTabs(driveToken, documentId);
                const tabBeforeCleanupById = new Map(tabsBeforeCleanup.map((tab) => [tab.tabId, tab]));
                const generatedParentTabIds = new Set(
                    Object.values(projectBeforeSync.drafting?.parentTabIds || {})
                        .map((tabId) => String(tabId || '').trim())
                        .filter(Boolean)
                );

                existingGeneratedTabIds.forEach((tabId) => {
                    const safeTabId = String(tabId || '').trim();
                    const tabMeta = tabBeforeCleanupById.get(safeTabId);

                    if (tabMeta?.parentTabId === draftingRootTabId) {
                        generatedParentTabIds.add(safeTabId);
                    }
                });

                let nextTemplateSlot = tabsBeforeCleanup.filter((tab) => tab.parentTabId === draftingRootTabId).length;

                for (const tabId of existingGeneratedTabIds) {
                    const safeTabId = String(tabId || '').trim();

                    if (!safeTabId || generatedParentTabIds.has(safeTabId) || !tabBeforeCleanupById.has(safeTabId)) {
                        continue;
                    }

                    const poolTitle = `Task 9 Template ${String(nextTemplateSlot + 1).padStart(2, '0')}`;

                    try {
                        await updateDocumentTabProperties(
                            driveToken,
                            documentId,
                            safeTabId,
                            {
                                parentTabId: draftingRootTabId,
                                index: nextTemplateSlot,
                                title: poolTitle
                            },
                            'parentTabId,index,title'
                        );
                        nextTemplateSlot += 1;
                    } catch (error) {
                        // Keep flow resilient if a tab is stale or already deleted.
                    }
                }

                for (const tabId of existingGeneratedTabIds) {
                    const safeTabId = String(tabId || '').trim();

                    if (!safeTabId || !generatedParentTabIds.has(safeTabId)) {
                        continue;
                    }

                    try {
                        await deleteDocumentTab(driveToken, documentId, safeTabId);
                    } catch (error) {
                        // Ignore stale tab IDs from earlier runs.
                    }
                }

                const totalAssetCount = funnelItems.reduce((count, funnelItemName) => {
                    const safeName = String(funnelItemName || '').trim();
                    return count + ((assetAssignments[safeName] || []).length || 0);
                }, 0);

                if (!totalAssetCount) {
                    return normalizeDraftingState({
                        assets: [],
                        assetAssignments: {},
                        generatedTabIds: [],
                        parentTabIds: {}
                    });
                }

                const tabsAfterCleanup = await listDocumentTabs(driveToken, documentId);
                const rootTabExists = tabsAfterCleanup.some((tab) => tab.tabId === draftingRootTabId);

                if (!rootTabExists) {
                    throw new Error('Task 9 drafting tab was not found in the document.');
                }

                const tabsById = new Map(tabsAfterCleanup.map((tab) => [tab.tabId, tab]));
                const getTabDepth = (tabId) => {
                    const visitedTabIds = new Set();
                    let currentTabId = String(tabId || '').trim();
                    let depth = 0;

                    while (currentTabId) {
                        if (visitedTabIds.has(currentTabId)) {
                            break;
                        }

                        visitedTabIds.add(currentTabId);
                        const tabMeta = tabsById.get(currentTabId);
                        depth += 1;

                        if (!tabMeta) {
                            break;
                        }

                        currentTabId = String(tabMeta.parentTabId || '').trim();
                    }

                    return depth;
                };

                const draftingRootMeta = tabsById.get(draftingRootTabId) || null;
                const draftingRootDepth = getTabDepth(draftingRootTabId);

                // Task 9 creates two nested levels below the Drafting root (funnel parent + asset child),
                // so keep Drafting at top-level to stay within Docs' max nesting depth.
                if (draftingRootMeta?.parentTabId && draftingRootDepth > 1) {
                    try {
                        await updateDocumentTabProperties(
                            driveToken,
                            documentId,
                            draftingRootTabId,
                            { parentTabId: '' },
                            'parentTabId'
                        );
                    } catch (error) {
                        throw new Error('Task 9 Drafting tab is nested too deep. Move it to top-level (not under backup tabs) and retry.');
                    }
                }

                const tabsAfterRootRestore = await listDocumentTabs(driveToken, documentId);
                const tabsAfterRootRestoreById = new Map(tabsAfterRootRestore.map((tab) => [tab.tabId, tab]));
                const restoredDraftingRoot = tabsAfterRootRestoreById.get(draftingRootTabId) || null;

                if (restoredDraftingRoot?.parentTabId) {
                    throw new Error('Task 9 Drafting tab is still nested. Move it to top-level and retry.');
                }

                const generatedTabIds = [];
                const parentTabIds = {};
                const existingTitles = new Set(tabsAfterRootRestore.map((tab) => String(tab.title || '').trim().toLowerCase()).filter(Boolean));
                const templatePoolTabs = tabsAfterRootRestore
                    .filter((tab) => tab.parentTabId === draftingRootTabId)
                    .sort((leftTab, rightTab) => leftTab.index - rightTab.index);

                let templateBackupTab = tabsAfterRootRestore.find((tab) => (
                    !tab.parentTabId && TEMPLATE_BACKUP_TAB_TITLE_KEYS.includes(String(tab.title || '').trim().toLowerCase())
                )) || null;

                if (!templateBackupTab?.tabId) {
                    templateBackupTab = await addDocumentTab(driveToken, documentId, TEMPLATE_BACKUP_TAB_TITLE_FALLBACK);
                }

                let task09BackupTab = tabsAfterRootRestore.find((tab) => (
                    tab.parentTabId === templateBackupTab.tabId
                    && String(tab.title || '').trim().toLowerCase() === TASK_09_BACKUP_TAB_TITLE.toLowerCase()
                )) || null;

                const templateBackupChildren = tabsAfterRootRestore
                    .filter((tab) => tab.parentTabId === templateBackupTab.tabId)
                    .sort((leftTab, rightTab) => leftTab.index - rightTab.index);

                if (!task09BackupTab?.tabId) {
                    task09BackupTab = await addDocumentTab(driveToken, documentId, TASK_09_BACKUP_TAB_TITLE, {
                        parentTabId: templateBackupTab.tabId,
                        index: templateBackupChildren.length
                    });
                } else if (Number.isInteger(task09BackupTab.index) && task09BackupTab.index !== templateBackupChildren.length - 1) {
                    try {
                        await updateDocumentTabProperties(
                            driveToken,
                            documentId,
                            task09BackupTab.tabId,
                            {
                                parentTabId: templateBackupTab.tabId,
                                index: templateBackupChildren.length - 1
                            },
                            'parentTabId,index'
                        );
                    } catch (error) {
                        // Keep cleanup resilient if ordering cannot be updated.
                    }
                }

                if (templatePoolTabs.length < totalAssetCount) {
                    throw new Error(
                        `Not enough Task 9 draft template duplicates. Expected ${totalAssetCount}, found ${templatePoolTabs.length}.`
                    );
                }

                let templateCursor = 0;

                for (let funnelIndex = 0; funnelIndex < funnelItems.length; funnelIndex += 1) {
                    const funnelItemName = String(funnelItems[funnelIndex] || '').trim();

                    if (!funnelItemName) {
                        continue;
                    }

                    const uniqueParentTitle = buildUniqueTabTitle(funnelItemName, existingTitles);

                    const parentTab = await addDocumentTab(driveToken, documentId, uniqueParentTitle, {
                        parentTabId: draftingRootTabId,
                        index: funnelIndex
                    });

                    generatedTabIds.push(parentTab.tabId);
                    parentTabIds[uniqueParentTitle] = parentTab.tabId;

                    const funnelAssets = assetAssignments[funnelItemName] || [];

                    for (let assetIndex = 0; assetIndex < funnelAssets.length; assetIndex += 1) {
                        const assetName = String(funnelAssets[assetIndex] || '').trim();

                        if (!assetName) {
                            continue;
                        }

                        const poolTemplateTab = templatePoolTabs[templateCursor] || null;

                        if (!poolTemplateTab?.tabId) {
                            throw new Error(`Unable to locate a Task 9 draft template tab for ${funnelItemName}.`);
                        }

                        templateCursor += 1;

                        const previousTitleKey = String(poolTemplateTab.title || '').trim().toLowerCase();

                        if (previousTitleKey) {
                            existingTitles.delete(previousTitleKey);
                        }

                        const nextChildTitle = buildUniqueDraftTabTitle(assetName, poolTemplateTab.title || 'Draft', existingTitles);
                        const nextChildTitleKey = nextChildTitle.toLowerCase();

                        if (existingTitles.has(nextChildTitleKey)) {
                            throw new Error(`Draft tab title already exists in this document: "${nextChildTitle}". Use a unique asset name.`);
                        }

                        await updateDocumentTabProperties(
                            driveToken,
                            documentId,
                            poolTemplateTab.tabId,
                            {
                                parentTabId: parentTab.tabId,
                                index: assetIndex,
                                title: nextChildTitle
                            },
                            'parentTabId,index,title'
                        );

                        existingTitles.add(nextChildTitleKey);

                        generatedTabIds.push(poolTemplateTab.tabId);
                    }
                }

                const unusedTemplateTabs = templatePoolTabs.slice(templateCursor);

                for (let unusedIndex = 0; unusedIndex < unusedTemplateTabs.length; unusedIndex += 1) {
                    const templateTab = unusedTemplateTabs[unusedIndex];

                    if (!templateTab?.tabId) {
                        continue;
                    }

                    try {
                        await updateDocumentTabProperties(
                            driveToken,
                            documentId,
                            templateTab.tabId,
                            {
                                parentTabId: task09BackupTab.tabId,
                                index: unusedIndex
                            },
                            'parentTabId,index'
                        );
                    } catch (error) {
                        // Keep the cleanup resilient if a template tab is already missing or protected.
                    }
                }

                return normalizeDraftingState({
                    assets: [],
                    assetAssignments,
                    generatedTabIds,
                    parentTabIds
                });
            };

            const handleSubmitDraftAssetsSetup = async () => {
                if (!currentProject || !isTaskEightComplete || draftAssetsSetupState.isSubmitting) {
                    return;
                }

                const funnelItems = getProjectStage2Elements(currentProject);
                const normalizedAssignments = funnelItems.reduce((accumulator, funnelItemName) => {
                    const safeFunnelItemName = String(funnelItemName || '').trim();
                    const rawAssets = draftAssetsSetupState.assetAssignments?.[safeFunnelItemName] || [];
                    const seenKeys = new Set();

                    accumulator[safeFunnelItemName] = rawAssets
                        .map((assetName) => String(assetName || '').trim())
                        .filter(Boolean)
                        .filter((assetName) => {
                            const key = assetName.toLowerCase();

                            if (seenKeys.has(key)) {
                                return false;
                            }

                            seenKeys.add(key);
                            return true;
                        })
                        .slice(0, MAX_DRAFT_ASSETS);

                    return accumulator;
                }, {});
                const validationError = validateDraftAssetAssignments(normalizedAssignments, funnelItems);

                if (validationError) {
                    setDraftAssetsSetupState((previousState) => ({ ...previousState, error: validationError }));
                    return;
                }

                if (!funnelItems.length) {
                    setDraftAssetsSetupState((previousState) => ({
                        ...previousState,
                        error: 'Set Stage 2 funnel elements before configuring draft assets.'
                    }));
                    return;
                }

                setDraftAssetsSetupState((previousState) => ({ ...previousState, isSubmitting: true, error: '' }));

                try {
                    const nextProjectState = {
                        ...currentProject,
                        drafting: normalizeDraftingState({
                            assets: [],
                            assetAssignments: normalizedAssignments,
                            generatedTabIds: [],
                            parentTabIds: {}
                        })
                    };
                    let nextDraftingState = normalizeDraftingState(nextProjectState.drafting);

                    if (nextProjectState.projectDocId) {
                        const driveToken = await getValidGoogleToken('Reconnect Google before applying draft asset tabs. Your project has not been changed yet.');
                        nextDraftingState = await syncDraftingDocumentTabs(driveToken, currentProject, nextProjectState, normalizedAssignments);
                    }

                    const finalProject = {
                        ...nextProjectState,
                        drafting: nextDraftingState
                    };
                    const nextState = {
                        ...appState,
                        projects: appState.projects.map((project) => (
                            project.id === currentProject.id ? finalProject : project
                        ))
                    };

                    persistState(nextState);
                    setDraftAssetsSetupState({
                        isOpen: false,
                        isSubmitting: false,
                        error: '',
                        assetAssignments: {}
                    });
                    setLockedTaskMessage('Task 9 draft asset tabs created for all funnel items.');
                } catch (error) {
                    setDraftAssetsSetupState((previousState) => ({
                        ...previousState,
                        isSubmitting: false,
                        error: error.message || 'Unable to apply draft assets setup. Please retry.'
                    }));
                }
            };

            const syncStage2DocumentTabs = async (driveToken, projectBeforeSync, projectAfterTaskRebuild, elementNames) => {
                if (!projectAfterTaskRebuild.projectDocId) {
                    return normalizeStage2State(projectAfterTaskRebuild.stage2);
                }

                const documentId = projectAfterTaskRebuild.projectDocId;
                const stage2TemplateTasks = getStage2TemplateTaskDefinitions();
                const templatePoolRootByTaskId = stage2TemplateTasks.reduce((accumulator, templateTaskDefinition) => {
                    const templateTaskId = Number(templateTaskDefinition.taskId);
                    const poolRootTabId = String(getStaticTaskDefinition(templateTaskId)?.tabId || '').trim();

                    if (templateTaskId && poolRootTabId) {
                        accumulator[String(templateTaskId)] = poolRootTabId;
                    }

                    return accumulator;
                }, {});
                const previousElements = getProjectStage2Elements(projectBeforeSync);
                const previousGeneratedTaskIds = previousElements.flatMap((_, elementIndex) => (
                    stage2TemplateTasks.map((__, templateIndex) => STAGE2_START_TASK_ID + (elementIndex * STAGE2_TASKS_PER_ELEMENT) + templateIndex)
                ));

                // Release previously assigned Stage 2 child tabs back into their template pools.
                if (previousGeneratedTaskIds.length) {
                    const tabsBeforeRelease = await listDocumentTabs(driveToken, documentId);
                    const tabById = new Map(tabsBeforeRelease.map((tab) => [tab.tabId, tab]));
                    const nextPoolIndexByTaskId = stage2TemplateTasks.reduce((accumulator, templateTaskDefinition) => {
                        const templateTaskId = Number(templateTaskDefinition.taskId);
                        const poolRootTabId = templatePoolRootByTaskId[String(templateTaskId)];
                        const existingPoolChildrenCount = tabsBeforeRelease.filter((tab) => tab.parentTabId === poolRootTabId).length;

                        accumulator[String(templateTaskId)] = existingPoolChildrenCount;
                        return accumulator;
                    }, {});

                    for (const generatedTaskId of previousGeneratedTaskIds) {
                        const assignedTabId = String(projectBeforeSync.stage2?.taskTabIds?.[String(generatedTaskId)] || '').trim();

                        if (!assignedTabId || !tabById.has(assignedTabId)) {
                            continue;
                        }

                        const templateIndex = (generatedTaskId - STAGE2_START_TASK_ID) % STAGE2_TASKS_PER_ELEMENT;
                        const templateTaskDefinition = stage2TemplateTasks[templateIndex] || null;
                        const templateTaskId = Number(templateTaskDefinition?.taskId) || 0;
                        const templateTaskTitle = String(templateTaskDefinition?.shortTitle || '').trim();
                        const poolRootTabId = templatePoolRootByTaskId[String(templateTaskId)] || '';

                        if (!templateTaskId || !poolRootTabId) {
                            continue;
                        }

                        const slotIndex = Number(nextPoolIndexByTaskId[String(templateTaskId)] || 0);
                        const poolTitle = `Task ${templateTaskId} Template ${String(slotIndex + 1).padStart(2, '0')}`;

                        try {
                            await updateDocumentTabProperties(
                                driveToken,
                                documentId,
                                assignedTabId,
                                {
                                    parentTabId: poolRootTabId,
                                    index: slotIndex,
                                    title: poolTitle
                                },
                                'parentTabId,index,title'
                            );

                            if (templateTaskTitle) {
                                await retitleStage2TabContent(
                                    driveToken,
                                    documentId,
                                    assignedTabId,
                                    generatedTaskId,
                                    templateTaskId,
                                    templateTaskTitle
                                );
                            }

                            nextPoolIndexByTaskId[String(templateTaskId)] = slotIndex + 1;
                        } catch (error) {
                            // Keep flow resilient if a previously assigned tab is missing or protected.
                        }
                    }
                }

                // Delete only previously generated parent tabs after children are returned to pools.
                const existingGeneratedTabIds = [...(projectBeforeSync.stage2?.generatedTabIds || [])].reverse();

                if (existingGeneratedTabIds.length) {
                    const tabsAfterRelease = await listDocumentTabs(driveToken, documentId);
                    const tabsAfterReleaseMap = new Map(tabsAfterRelease.map((tab) => [tab.tabId, tab]));
                    const previousElementNameKeys = new Set(previousElements.map((elementName) => String(elementName || '').trim().toLowerCase()));

                    for (const tabId of existingGeneratedTabIds) {
                        const tabMeta = tabsAfterReleaseMap.get(tabId);

                        if (!tabMeta || tabMeta.parentTabId) {
                            continue;
                        }

                        const titleKey = String(tabMeta.title || '').trim().toLowerCase();

                        if (!titleKey || !previousElementNameKeys.has(titleKey)) {
                            continue;
                        }

                        try {
                            await deleteDocumentTab(driveToken, documentId, tabId);
                        } catch (error) {
                            // Ignore stale tab IDs from earlier runs.
                        }
                    }
                }

                const tabsAfterCleanup = await listDocumentTabs(driveToken, documentId);
                const taskFiveTabId = String(getStaticTaskDefinition(5)?.tabId || '').trim();
                const taskFiveTabMeta = tabsAfterCleanup.find((tab) => tab.tabId === taskFiveTabId && !tab.parentTabId);
                const stage2RootStartIndex = Number.isInteger(taskFiveTabMeta?.index) ? taskFiveTabMeta.index + 1 : null;
                const generatedTabIds = [];
                const taskTabIds = {};

                const templatePoolChildrenByTaskId = stage2TemplateTasks.reduce((accumulator, templateTaskDefinition) => {
                    const templateTaskId = Number(templateTaskDefinition.taskId);
                    const poolRootTabId = templatePoolRootByTaskId[String(templateTaskId)] || '';
                    const candidates = tabsAfterCleanup
                        .filter((tab) => tab.parentTabId === poolRootTabId)
                        .sort((leftTab, rightTab) => leftTab.index - rightTab.index);

                    accumulator[String(templateTaskId)] = candidates;
                    return accumulator;
                }, {});

                for (const templateTaskDefinition of stage2TemplateTasks) {
                    const templateTaskId = Number(templateTaskDefinition.taskId);
                    const availableTemplateTabs = templatePoolChildrenByTaskId[String(templateTaskId)] || [];

                    if (availableTemplateTabs.length < elementNames.length) {
                        if (previousElements.length > 0) {
                            throw new Error(
                                'Stage 2 templates were already consumed and removed in this project. Restore Task 6/7/8 template pools before reconfiguring Stage 2.'
                            );
                        }

                        throw new Error(
                            `Not enough Task ${templateTaskId} template duplicates. Expected ${elementNames.length}, found ${availableTemplateTabs.length}.`
                        );
                    }
                }

                for (let elementIndex = 0; elementIndex < elementNames.length; elementIndex += 1) {
                    const elementName = elementNames[elementIndex];
                    const parentTab = await addDocumentTab(driveToken, documentId, elementName, {
                        index: Number.isInteger(stage2RootStartIndex) ? stage2RootStartIndex + elementIndex : undefined
                    });
                    generatedTabIds.push(parentTab.tabId);

                    for (let templateIndex = 0; templateIndex < stage2TemplateTasks.length; templateIndex += 1) {
                        const templateTaskDefinition = stage2TemplateTasks[templateIndex];
                        const templateTaskId = Number(templateTaskDefinition.taskId);
                        const poolCandidate = templatePoolChildrenByTaskId[String(templateTaskId)]?.[elementIndex] || null;
                        const generatedTaskId = STAGE2_START_TASK_ID + (elementIndex * STAGE2_TASKS_PER_ELEMENT) + templateIndex;
                        const childTitle = getStage2SubtaskTitle(generatedTaskId, templateTaskDefinition);

                        if (!poolCandidate?.tabId) {
                            throw new Error(`Unable to locate a Task ${templateTaskId} template tab for funnel element ${elementIndex + 1}.`);
                        }

                        await updateDocumentTabProperties(
                            driveToken,
                            documentId,
                            poolCandidate.tabId,
                            {
                                parentTabId: parentTab.tabId,
                                index: templateIndex,
                                title: childTitle
                            },
                            'parentTabId,index,title'
                        );
                        await retitleStage2TabContent(
                            driveToken,
                            documentId,
                            poolCandidate.tabId,
                            templateTaskId,
                            generatedTaskId,
                            templateTaskDefinition.shortTitle
                        );
                        taskTabIds[String(generatedTaskId)] = poolCandidate.tabId;
                    }
                }

                const stage2Offset = (elementNames.length * STAGE2_TASKS_PER_ELEMENT) - STAGE2_TASKS_PER_ELEMENT;
                const downstreamTasks = TASK_DEFINITIONS.filter((taskDefinition) => taskDefinition.taskId >= 9);

                for (const downstreamTaskDefinition of downstreamTasks) {
                    const shiftedTaskId = downstreamTaskDefinition.taskId + stage2Offset;
                    const shiftedTitle = `Task ${shiftedTaskId} — ${downstreamTaskDefinition.shortTitle}`;
                    const tabId = String(downstreamTaskDefinition.tabId || '').trim();

                    if (!tabId) {
                        continue;
                    }

                    try {
                        await updateDocumentTabTitle(driveToken, documentId, tabId, shiftedTitle);
                    } catch (error) {
                        // Keep flow resilient if a downstream tab is missing.
                    }

                    taskTabIds[String(shiftedTaskId)] = tabId;
                }

                const isFirstStage2Setup = previousElements.length === 0;

                if (isFirstStage2Setup) {
                    const tabsBeforeArchive = await listDocumentTabs(driveToken, documentId);
                    let templateBackupTab = tabsBeforeArchive.find((tab) => (
                        !tab.parentTabId && TEMPLATE_BACKUP_TAB_TITLE_KEYS.includes(String(tab.title || '').trim().toLowerCase())
                    ));

                    if (!templateBackupTab?.tabId) {
                        templateBackupTab = await addDocumentTab(driveToken, documentId, TEMPLATE_BACKUP_TAB_TITLE_FALLBACK);
                    }

                    let archiveIndex = tabsBeforeArchive.filter((tab) => tab.parentTabId === templateBackupTab.tabId).length;

                    for (const templateTaskDefinition of stage2TemplateTasks) {
                        const templateTaskId = Number(templateTaskDefinition.taskId);
                        const poolRootTabId = templatePoolRootByTaskId[String(templateTaskId)] || '';

                        if (!poolRootTabId) {
                            continue;
                        }

                        try {
                            await updateDocumentTabProperties(
                                driveToken,
                                documentId,
                                poolRootTabId,
                                {
                                    parentTabId: templateBackupTab.tabId,
                                    index: archiveIndex
                                },
                                'parentTabId,index'
                            );
                            archiveIndex += 1;
                        } catch (error) {
                            // Ignore if template root was already moved or missing.
                        }
                    }
                }

                return normalizeStage2State({
                    elements: elementNames,
                    generatedTabIds,
                    taskTabIds
                });
            };

            const handleSubmitStage2Setup = async () => {
                if (!currentProject || !isTaskFiveComplete || stage2SetupState.isSubmitting) {
                    return;
                }

                const normalizedElements = stage2SetupState.elements.map((elementName) => String(elementName || '').trim());
                const validationError = validateStage2Elements(normalizedElements);

                if (validationError) {
                    setStage2SetupState((previousState) => ({ ...previousState, error: validationError }));
                    return;
                }

                if (stage2SetupState.isReconfigure && stage2SetupState.confirmText.trim().toLowerCase() !== STAGE2_CONFIRM_TEXT) {
                    setStage2SetupState((previousState) => ({ ...previousState, error: `Type ${STAGE2_CONFIRM_TEXT} to continue.` }));
                    return;
                }

                setStage2SetupState((previousState) => ({ ...previousState, isSubmitting: true, error: '' }));

                try {
                    const nextProjectTaskState = rebuildProjectTasksForStage2(currentProject, normalizedElements);
                    let nextStage2State = normalizeStage2State(nextProjectTaskState.stage2);

                    if (nextProjectTaskState.projectDocId) {
                        const driveToken = await getValidGoogleToken('Reconnect Google before applying Stage 2 tabs. Your project has not been changed yet.');
                        nextStage2State = await syncStage2DocumentTabs(driveToken, currentProject, nextProjectTaskState, normalizedElements);
                    }

                    const finalProject = {
                        ...nextProjectTaskState,
                        stage2: nextStage2State
                    };

                    const nextState = {
                        ...appState,
                        projects: appState.projects.map((project) => (
                            project.id === currentProject.id ? finalProject : project
                        ))
                    };

                    persistState(nextState);
                    setStage2SetupState({
                        isOpen: false,
                        isReconfigure: false,
                        isSubmitting: false,
                        error: '',
                        elements: [],
                        confirmText: ''
                    });
                    setLockedTaskMessage('Stage 2 funnel elements saved and synced to your document tabs.');
                } catch (error) {
                    setStage2SetupState((previousState) => ({
                        ...previousState,
                        isSubmitting: false,
                        error: error.message || 'Unable to apply Stage 2 setup. Please retry.'
                    }));
                }
            };

            const resetCreationState = () => {
                setCreationState({
                    isCreating: false,
                    createdCount: 0,
                    message: '',
                    error: ''
                });
            };

            const handleOpenNewProject = () => {
                resetCreationState();
                setIsOnboardingOpen(true);
            };

            const handleCancelOnboarding = () => {
                if (appState.projects.length === 0 || creationState.isCreating) {
                    return;
                }

                resetCreationState();
                setIsOnboardingOpen(false);
            };

            const handleCreateProject = async (projectName) => {
                setCreationState({
                    isCreating: true,
                    createdCount: 0,
                    message: 'Checking Google connection...',
                    error: ''
                });

                try {
                    const driveToken = await getValidGoogleToken('Reconnect Google before creating a project. Your saved projects were not changed.');
                    setCreationState({
                        isCreating: true,
                        createdCount: 0,
                        message: 'Creating your project document... (0/1 file created)',
                        error: ''
                    });
                    const createdProject = await createProjectInDrive(
                        driveToken,
                        projectName,
                        (progress) => {
                            setCreationState({
                                isCreating: true,
                                createdCount: progress.createdCount || 0,
                                message: progress.message || `Creating your project document... (${progress.createdCount || 0}/${PROJECT_DOCUMENT_COPY_COUNT} file created)`,
                                error: ''
                            });
                        },
                        appState.projects.map((project) => project.name)
                    );
                    const nextState = saveState({
                        projects: [...appState.projects, createdProject],
                        currentProjectId: createdProject.id
                    });

                    setAppState(nextState);
                    setCreationState({
                        isCreating: false,
                        createdCount: PROJECT_DOCUMENT_COPY_COUNT,
                        message: '',
                        error: ''
                    });
                    setIsOnboardingOpen(false);
                } catch (error) {
                    setCreationState((previousState) => ({
                        ...previousState,
                        isCreating: false,
                        error: error.message || 'Unable to create the project. Please retry.'
                    }));
                }
            };

            const handleContinueWithGoogle = () => {
                requestGoogleAccess(authToken ? '' : 'consent').catch(() => {});
            };

            const handleSignOut = () => {
                clearAuthToken();
                setAuthToken(null);
                setAuthProfile(null);
                setIsProfileMenuOpen(false);
                setIsGwsDashboardOpen(false);
                setWorkspaceTab('docs');
                setIsGwsHistoryOpen(false);
                setAuthNotice('You have been signed out. Continue with Google to sign in again.');
            };

            const handleOpenGwsWizard = () => {
                gwsWizardTaskIdRef.current = Number(currentTaskDefinition?.taskId || 0);
                setGwsWizardDraft(createGwsWizardDraftForTask(currentTaskDefinition, currentTask, gwsMinutes));
                setGwsWizardStep(0);
                setIsGwsWizardOpen(true);
                setIsGwsMenuOpen(false);
            };

            const handleCancelGwsWizard = () => {
                setIsGwsWizardOpen(false);
                setGwsWizardStep(0);
                gwsWizardTaskIdRef.current = null;
            };

            const handleChangeGwsWizardDraft = (updates) => {
                setGwsWizardDraft((previousState) => normalizeGwsWizard({
                    ...previousState,
                    ...updates
                }));
            };

            const handleGwsWizardBack = () => {
                setGwsWizardStep((previousStep) => Math.max(previousStep - 1, 0));
            };

            const handleGwsWizardNext = () => {
                setGwsWizardStep((previousStep) => Math.min(previousStep + 1, 3));
            };

            const handleOpenGwsHistory = () => {
                setIsGwsMenuOpen(false);
                setIsGwsDashboardOpen(true);
                setWorkspaceTab('gws');
                setIsGwsHistoryOpen(true);
            };

            const handleCloseGwsHistory = () => {
                setIsGwsDashboardOpen(false);
                setWorkspaceTab('docs');
                setIsGwsHistoryOpen(false);
            };

            const handleStartGwsSession = () => {
                if (!currentProject || !currentTaskDefinition) {
                    return;
                }

                const durationMinutes = gwsWizardDraft.timerMinutes === 90 ? 90 : 60;
                const startedAt = Date.now();
                const sessionId = `gws-${startedAt}-${Math.random().toString(36).slice(2, 8)}`;
                const sessionSnapshot = normalizeGwsSession({
                    sessionId,
                    projectId: currentProject.id,
                    taskId: Number(currentTaskDefinition.taskId) || 0,
                    taskTitle: String(currentTaskDefinition.shortTitle || currentTaskDefinition.fullDocTitle || '').trim(),
                    taskDocTabId: String(currentTaskDefinition.tabId || '').trim(),
                    objective: gwsWizardDraft.objective,
                    plannedTasks: gwsWizardDraft.plannedTasks,
                    ritual: {
                        attitude: gwsWizardDraft.attitude,
                        hydrated: gwsWizardDraft.hydrated,
                        caffeinated: gwsWizardDraft.caffeinated,
                        distractionsCleared: gwsWizardDraft.distractionsCleared,
                        timerMinutes: durationMinutes
                    },
                    startAt: startedAt,
                    remainingSeconds: durationMinutes * 60,
                    plannedMinutes: durationMinutes,
                    actualSeconds: 0,
                    pauseCount: 0,
                    status: 'running',
                    checklistSnapshot: Array.isArray(currentTask?.checklist) ? currentTask.checklist.map(Boolean) : [],
                    completedChecklistItems: [],
                    achievedTasks: []
                });

                gwsActiveSessionRef.current = sessionSnapshot;

                if (sessionSnapshot) {
                    updateProjectGws(currentProject.id, (currentGws) => ({
                        ...currentGws,
                        activeSession: sessionSnapshot
                    }));
                }

                playGwsStartTone(gwsAudioContextRef).catch(() => {});
                setGwsRemainingSeconds(durationMinutes * 60);
                setIsGwsRunning(true);
                setIsGwsPaused(false);
                setGwsMinutes(durationMinutes);
                setIsGwsWizardOpen(false);
                setIsGwsMenuOpen(false);
                setIsGwsHistoryOpen(false);
                gwsWizardTaskIdRef.current = null;
            };

            const handlePauseGwsSession = () => {
                if (!isGwsRunning || gwsRemainingSeconds <= 0) {
                    return;
                }

                setIsGwsRunning(false);
                setIsGwsPaused(true);

                if (gwsActiveSessionRef.current?.projectId && gwsActiveSessionRef.current?.sessionId) {
                    updateProjectGws(gwsActiveSessionRef.current.projectId, (currentGws) => ({
                        ...currentGws,
                        activeSession: normalizeGwsSession({
                            ...gwsActiveSessionRef.current,
                            remainingSeconds: Math.max(0, Number(gwsRemainingSeconds) || 0),
                            actualSeconds: Math.max(0, ((Number(gwsActiveSessionRef.current.plannedMinutes) === 90 ? 90 : 60) * 60) - Math.max(0, Number(gwsRemainingSeconds) || 0)),
                            pauseCount: Math.max(0, Number(gwsActiveSessionRef.current.pauseCount) || 0) + 1,
                            status: 'paused'
                        })
                    }));

                    gwsActiveSessionRef.current = {
                        ...gwsActiveSessionRef.current,
                        remainingSeconds: Math.max(0, Number(gwsRemainingSeconds) || 0),
                        actualSeconds: Math.max(0, ((Number(gwsActiveSessionRef.current.plannedMinutes) === 90 ? 90 : 60) * 60) - Math.max(0, Number(gwsRemainingSeconds) || 0)),
                        pauseCount: Math.max(0, Number(gwsActiveSessionRef.current.pauseCount) || 0) + 1,
                        status: 'paused'
                    };
                }
            };

            const handleResumeGwsSession = () => {
                if (!isGwsPaused || gwsRemainingSeconds <= 0) {
                    return;
                }

                setIsGwsRunning(true);
                setIsGwsPaused(false);

                if (gwsActiveSessionRef.current?.projectId && gwsActiveSessionRef.current?.sessionId) {
                    updateProjectGws(gwsActiveSessionRef.current.projectId, (currentGws) => ({
                        ...currentGws,
                        activeSession: normalizeGwsSession({
                            ...gwsActiveSessionRef.current,
                            remainingSeconds: Math.max(0, Number(gwsRemainingSeconds) || 0),
                            actualSeconds: Math.max(0, ((Number(gwsActiveSessionRef.current.plannedMinutes) === 90 ? 90 : 60) * 60) - Math.max(0, Number(gwsRemainingSeconds) || 0)),
                            status: 'running'
                        })
                    }));

                    gwsActiveSessionRef.current = {
                        ...gwsActiveSessionRef.current,
                        remainingSeconds: Math.max(0, Number(gwsRemainingSeconds) || 0),
                        actualSeconds: Math.max(0, ((Number(gwsActiveSessionRef.current.plannedMinutes) === 90 ? 90 : 60) * 60) - Math.max(0, Number(gwsRemainingSeconds) || 0)),
                        status: 'running'
                    };
                }
            };

            const handleStopGwsSession = () => {
                setIsGwsRunning(false);
                setIsGwsPaused(false);
                closeGwsSession('stopped');
                setGwsRemainingSeconds(0);
                setIsGwsMenuOpen(false);
            };

            const handleDeleteGwsSession = (sessionId) => {
                const safeSessionId = String(sessionId || '').trim();

                if (!currentProject?.id || !safeSessionId) {
                    return;
                }

                const isDeletingActiveSession = String(gwsActiveSessionRef.current?.sessionId || '').trim() === safeSessionId
                    || String(currentProject?.gws?.activeSession?.sessionId || '').trim() === safeSessionId;

                updateProjectGws(currentProject.id, (currentGws) => {
                    const nextSessions = (currentGws.sessions || []).filter((session) => String(session?.sessionId || '').trim() !== safeSessionId);
                    const nextActiveSession = isDeletingActiveSession
                        ? null
                        : currentGws.activeSession;

                    return {
                        ...currentGws,
                        activeSession: nextActiveSession,
                        sessions: nextSessions
                    };
                });

                if (isDeletingActiveSession) {
                    gwsActiveSessionRef.current = null;
                    setIsGwsRunning(false);
                    setIsGwsPaused(false);
                    setGwsRemainingSeconds(0);
                    setIsGwsMenuOpen(false);
                    setLockedTaskMessage('Active session deleted from dashboard history.');
                }
            };

            if (!authToken) {
                return (
                    <LoginScreen
                        authReady={authReady}
                        authLoading={authLoading}
                        authNotice={authNotice}
                        onContinueWithGoogle={handleContinueWithGoogle}
                    />
                );
            }

            return (
                <main className="app-shell">
                    {authToken && authNotice && (
                        <div className="auth-refresh-banner" role="status">
                            <span>{authNotice}</span>
                            <button type="button" disabled={authLoading || !authReady} onClick={handleContinueWithGoogle}>
                                {authLoading ? 'Connecting...' : 'Reconnect Google'}
                            </button>
                        </div>
                    )}

                    <aside className="left-sidebar" aria-label="Project navigation">
                        <div className="brand-block">
                            <div className="brand-header">
                                <h1 className="brand-label">Strategic Marketing Bootcamp</h1>
                                <div className="stage2-menu-wrap" ref={stage2MenuRef}>
                                    <button
                                        className="stage2-gear-button"
                                        type="button"
                                        aria-label="Open quick actions menu"
                                        title="Quick actions"
                                        onClick={() => setIsStage2MenuOpen((isOpen) => !isOpen)}
                                    >
                                        ⚙
                                    </button>
                                    {isStage2MenuOpen && (
                                        <div className="stage2-gear-menu" role="menu" aria-label="Quick actions">
                                            <button
                                                className="stage2-menu-item"
                                                type="button"
                                                role="menuitem"
                                                onClick={() => {
                                                    setIsStage2MenuOpen(false);
                                                    handleOpenNewProject();
                                                }}
                                            >
                                                Create New Project
                                            </button>
                                            <button
                                                className="stage2-menu-item is-danger"
                                                type="button"
                                                role="menuitem"
                                                disabled={!currentProject}
                                                onClick={() => {
                                                    if (!currentProject) {
                                                        return;
                                                    }

                                                    setIsStage2MenuOpen(false);
                                                    handleDeleteProject(currentProject.id);
                                                }}
                                            >
                                                Delete Current Project
                                            </button>

                                            <div className="stage2-menu-divider" aria-hidden="true" />

                                            <button
                                                className="stage2-menu-item"
                                                type="button"
                                                role="menuitem"
                                                disabled={!currentProject || !isTaskFiveComplete}
                                                onClick={() => {
                                                    setIsStage2MenuOpen(false);
                                                    handleOpenStage2Reconfigure();
                                                }}
                                            >
                                                {currentProject && getProjectStage2Elements(currentProject).length ? 'Reconfigure Funnel' : 'Set Funnel Elements'}
                                            </button>
                                            <button
                                                className="stage2-menu-item"
                                                type="button"
                                                role="menuitem"
                                                disabled={!currentProject || !isTaskEightComplete || getProjectStage2Elements(currentProject).length === 0}
                                                onClick={() => {
                                                    setIsStage2MenuOpen(false);
                                                    handleOpenDraftAssetsSetup();
                                                }}
                                            >
                                                {currentProject && getProjectDraftAssets(currentProject).length ? 'Reconfigure Draft Assets' : 'Set Draft Assets'}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <section className="project-section project-navigation-section" aria-label="Projects">
                            <h2 className="section-heading">Projects</h2>
                            <ProjectNavigation
                                projects={appState.projects}
                                currentProjectId={appState.currentProjectId}
                                expandedProjectIds={expandedProjectIds}
                                lockedTaskMessage={lockedTaskMessage}
                                onToggleProject={handleToggleProject}
                                onSelectTask={handleSelectProjectTask}
                                onLockedTaskClick={handleLockedTaskClick}
                                onRenameProject={handleRenameProject}
                                onDeleteProject={handleDeleteProject}
                            />
                        </section>

                    </aside>

                    <section className={`center-panel ${currentProject ? '' : 'is-empty'}`} aria-label="Main workspace">
                        <CenterWorkspace
                            currentProject={currentProject}
                            currentTask={currentTask}
                            currentTaskDefinition={currentTaskDefinition}
                            workspaceTab={workspaceTab}
                            isDashboardTabOpen={isGwsDashboardOpen}
                            isGwsRunning={isGwsRunning}
                            isGwsPaused={isGwsPaused}
                            gwsRemainingSeconds={gwsRemainingSeconds}
                            onStartSession={handleOpenGwsWizard}
                            onPauseSession={handlePauseGwsSession}
                            onResumeSession={handleResumeGwsSession}
                            onEndSession={handleStopGwsSession}
                            onDeleteSession={handleDeleteGwsSession}
                            onSelectWorkspaceTab={(nextTab) => setWorkspaceTab(nextTab === 'gws' ? 'gws' : 'docs')}
                            onCloseDashboardTab={() => {
                                setIsGwsDashboardOpen(false);
                                setWorkspaceTab('docs');
                                setIsGwsHistoryOpen(false);
                            }}
                        />
                    </section>

                    <aside className="right-sidebar" aria-label="Task guidance panel">
                        <div className="right-sidebar-shell">
                            <div className="right-sidebar-profile">
                                <div className="right-sidebar-profile-copy">
                                    <p className="right-sidebar-profile-label">Account</p>
                                    <p className="right-sidebar-profile-name">{authProfile?.name || 'Google account'}</p>
                                    <p className="right-sidebar-profile-email">{authProfile?.email || 'Signed in with Google'}</p>
                                </div>
                                <div className="profile-menu-wrap" ref={profileMenuRef}>
                                    <button
                                        className="profile-avatar-button"
                                        type="button"
                                        aria-label="Open profile menu"
                                        title="Profile menu"
                                        onClick={() => setIsProfileMenuOpen((isOpen) => !isOpen)}
                                    >
                                        {authProfile?.picture ? (
                                            <img src={authProfile.picture} alt="Profile avatar" />
                                        ) : (
                                            <span className="profile-avatar-fallback">{getProfileInitials(authProfile)}</span>
                                        )}
                                    </button>

                                    {isProfileMenuOpen && (
                                        <div className="profile-menu" role="menu" aria-label="Profile menu">
                                            <button
                                                className="profile-menu-item"
                                                type="button"
                                                role="menuitem"
                                                onClick={() => {
                                                    setIsProfileMenuOpen(false);
                                                    setIsGwsDashboardOpen(true);
                                                    setWorkspaceTab('gws');
                                                    setIsGwsHistoryOpen(true);
                                                }}
                                            >
                                                GWS Dashboard
                                            </button>
                                            <button
                                                className="profile-menu-item is-danger"
                                                type="button"
                                                role="menuitem"
                                                onClick={() => {
                                                    setIsProfileMenuOpen(false);
                                                    handleSignOut();
                                                }}
                                            >
                                                Logout
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="gws-sidebar-launcher">
                                <button className="gws-action-button" type="button" onClick={handleOpenGwsWizard}>
                                    Start GWS
                                </button>
                            </div>

                            <GuidancePanel
                                currentTask={currentProject ? currentTask : null}
                                currentTaskDefinition={currentProject ? currentTaskDefinition : null}
                                onOpenDiagram={handleOpenDiagram}
                                onToggleChecklistItem={handleToggleChecklistItem}
                                onStartGwsSession={handleOpenGwsWizard}
                            />
                        </div>
                    </aside>

                    {diagramLightboxTask && (
                        <DiagramLightbox
                            taskDefinition={diagramLightboxTask}
                            zoomIndex={diagramZoomIndex}
                            onClose={handleCloseDiagram}
                            onCycleZoom={handleCycleDiagramZoom}
                        />
                    )}

                    {isOnboardingOpen && (
                        <OnboardingModal
                            isFirstProject={appState.projects.length === 0}
                            creationState={creationState}
                            onCreateProject={handleCreateProject}
                            onCancel={handleCancelOnboarding}
                        />
                    )}

                    {projectPendingDelete && (
                        <DeleteProjectModal
                            project={projectPendingDelete}
                            deleteState={deleteProjectState}
                            onCancel={handleCancelDeleteProject}
                            onConfirm={handleConfirmDeleteProject}
                        />
                    )}

                    {projectPendingRename && (
                        <RenameProjectModal
                            project={projectPendingRename}
                            renameState={renameProjectState}
                            onCancel={handleCancelRenameProject}
                            onConfirm={handleConfirmRenameProject}
                        />
                    )}

                    <Stage2SetupModal
                        isOpen={stage2SetupState.isOpen}
                        isReconfigure={stage2SetupState.isReconfigure}
                        elements={stage2SetupState.elements}
                        isSubmitting={stage2SetupState.isSubmitting}
                        error={stage2SetupState.error}
                        confirmText={stage2SetupState.confirmText}
                        onChangeElement={handleStage2ElementChange}
                        onAddElement={handleStage2AddElement}
                        onRemoveElement={handleStage2RemoveElement}
                        onReorderElements={handleStage2ReorderElements}
                        onChangeConfirmText={(value) => setStage2SetupState((previousState) => ({ ...previousState, confirmText: value, error: '' }))}
                        onCancel={handleCancelStage2Setup}
                        onSubmit={handleSubmitStage2Setup}
                    />

                    <DraftAssetsSetupModal
                        isOpen={draftAssetsSetupState.isOpen}
                        funnelItems={currentProject ? getProjectStage2Elements(currentProject) : []}
                        assetAssignments={draftAssetsSetupState.assetAssignments || {}}
                        isSubmitting={draftAssetsSetupState.isSubmitting}
                        error={draftAssetsSetupState.error}
                        onChangeAsset={handleDraftAssetChange}
                        onAddAsset={handleDraftAssetAdd}
                        onRemoveAsset={handleDraftAssetRemove}
                        onCancel={handleCancelDraftAssetsSetup}
                        onSubmit={handleSubmitDraftAssetsSetup}
                    />

                    <GwsWizardModal
                        isOpen={isGwsWizardOpen}
                        step={gwsWizardStep}
                        draft={gwsWizardDraft}
                        wizardTaskKey={String(currentTask?.taskId || currentTaskDefinition?.taskId || 0)}
                        onChangeDraft={handleChangeGwsWizardDraft}
                        onBack={handleGwsWizardBack}
                        onNext={handleGwsWizardNext}
                        onCancel={handleCancelGwsWizard}
                        onStart={handleStartGwsSession}
                    />

                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
